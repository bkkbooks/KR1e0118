body:
  text: 春秋地理考實春秋類提要臣等謹案春秋地理考實四卷國朝江永撰永字慎修休寧人所著有周禮疑義舉要儀禮釋宫增注禮記訓義擇言深衣考誤古韻標準四聲切韻譜諸書皆别著録是編所列春秋山川國邑地名悉從經傳之次凡杜預以下舊說已得者仍之其未得者始加辨證皆確指今為何地俾學者按現在之輿圖即可以驗當時列國疆域及㑹盟侵伐之迹悉得其道里方向意主簡明不事旁托逺引故名曰考實於名同地異注家牽合混淆者辨證尤晰如謂隱元年左傳費伯帥師城郎其地在今魚臺縣去曲阜二百里許而九年經書城郎及桓十年齊侯衛侯鄭伯來戰於郎莊十年齊侯宋師次於郎者别為魯近郊地名則公羊傳所謂吾近邑左傳記公子偃自雩門出先犯宋師與哀十一年師及齊師戰於郊檀弓作戰於郎者皆無疑矣僖三十年左傳燭之武見秦伯曰許君焦瑕杜預以焦瑕為晉河外列城之二邑與傳所云晉惠公賂秦以河外列城五東盡虢略南及華山內及解梁者不合永則謂燭之武所言乃於河外列城舉焦於內及解梁城者舉瑕以該所許之邑引水經注云涑水西徑郇城又西南徑解縣故城南解梁即斯城也又西南徑瑕城晉大夫詹嘉之故邑也云云為證且考定郇城在解故城東北二十四里瑕城在解西南五里二地相距三十里許杜預於成六年絳大夫言郇瑕氏之地沃饒近盬合郇瑕為一於僖十一年瑕吕飴甥以瑕吕為姓皆失之其訂訛補闕多有可取雖卷帙不及髙士竒春秋左傳地名考之富而精核較勝之矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋地理考實原序讀詩者以鳥獸草木為緒餘讀春秋者亦當以列國地名為緒餘春秋暨左氏傳二百五十餘年地名千數百有竒或同名而異地或一地而殊名古今稱謂不同隸屬沿革不一有文字語音之訛有傳聞解說之誤欲一一核實無差雖博洽通儒猶難之杜當陽癖於左號武庫集解外有釋例土地名别為部地志之學號專長然闕略不審者已多所指紕繆者亦間有後出地理諸家隨代加詳視當陽孤守漢晉紀載宜有增擴春秋傳說彚纂國朝儒臣所修俱經睿鑒欽定地理考訂彌精詳杜所不知援古證今能確指其所在杜有乖違隨事辨正併杜注録出可别成一書然而學殖無涯搜討難遍更考前賢地志之書及近代二三名家之說核其虛實精者益精詳者益詳從來著述家踵事增華或亦功令所不禁也家貧不能儲書聊據所見聞者輯成春秋地理考實四卷竊取多識緒餘之意或可為麟經之一助云爾年力衰頺黽勉為之藁屢刋削乃成定本中間或遺或誤知不免摘瑕指疵則俟淹通博雅之君子乾隆二十三年戊寅仲夏月婺源江永慎修氏書
