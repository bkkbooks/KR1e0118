錫韓侯其追其貊奄受北國者正相符使韓國在關中豈役燕師為之築城又何能受追貊北國乎或又以梁山在韓城為可據然而燕地亦自有梁山水經注鮑丘水過潞縣西髙梁水注之水首受濕水于戾陵堰堰水枝分東徑梁山南按潞縣今之通州其西有梁山正當固安縣之東北也禹治冀州水恆衛既定則燕地之山因其所奠定者近韓城有梁山名偶同耳蔣傳凡蔣邢茅胙祭周公之􅏷也杜注蔣在弋陽期思縣彚纂今開封府尉氏縣西六十里有蔣城今按期思故城在今光州固始縣西北七十里一統志云古蔣國春秋時為弦子邑又文十年期思杜注亦云古蔣國楚滅之期思去尉氏甚逺而尉氏亦有蔣城豈蔣國有兩都與茅傳見上杜注髙乎昌邑縣西有茅鄉彚纂今兖州府金鄉縣西北四十里有昌邑城其西有茅鄉古茅國也胙傳見上杜注東郡燕縣西南有胙亭彚纂今河南衛輝府胙城縣是也縣東有東燕故城今按胙城今省入衛輝府汲縣祭傳見上今按祭一在長垣一在鄭州說見隱元年召傳召穆公思周德之不類杜注召穆公采地扶風雍縣東南有召亭彚纂案此召亭今陜西鳳翔府境其山西平陽府垣曲縣之召原則東遷後别受采地也甘傳甘昭公有寵於惠后杜注甘昭公王子帶也食邑於甘河南縣西南有甘水又云西二十五里有故甘城彚纂今河南府洛陽縣即河南縣也甘城甘水俱在縣西南今按水經注甘水東二十許里洛城南有故甘城北對河南故城為王子帶之故邑坎欿傳王遂出及坎欿杜注周地在河南鞏縣東今按後漢志鞏縣有坎欿聚服䖍亦以為鞏東邑名汜傳王出適鄭處于汜釋文汜音汜杜注鄭南邑也在襄城縣南彚纂今屬開封府今按襄城今屬許州府因襄王居此故名二十五年洮經公㑹衛子莒慶盟于洮杜注魯地疏八年盟于洮杜云曹地三十一年魯始得曹田此時不得為魯地注誤耳今按疏說非也傳云衛人平莒于我且及莒平則此洮為魯之內地東近莒即莊二十七年公㑹杞伯姬于洮者也當為卞縣洮墟在泗水縣阪泉傳遇黃帝戰于阪泉之兆杜注黃帝與神農之後姜氏戰于阪泉之野今按括地志阪泉今名黃帝泉在媯州懷戎縣東五里又晉地志云涿鹿城東一里有阪泉阪泉之野則平野之地也唐媯州懷戎縣今為懷來縣地涿鹿城在保安州皆屬直𨽻宣化府陽樊傳與之陽樊溫原攢茅之田今按陽樊即樊也注見隱十一年南陽傳晉於是始啓南陽杜注在晉山南河北故曰南陽又文元年晉伐衛及南陽杜注云今河內地今按水經注修武亦曰南陽馬融云晉地自朝歌以北至中山為東陽朝歌以南至軑為南陽應邵云河內殷國也周名之為南陽鄀傳秦晉伐鄀杜注本在商密秦楚界上小國其後遷於南郡鄀縣疏言本在商密者據在後移都稱舊鄀以為本耳其實此時在商密後始遷于鄀縣此時國名為鄀所都之邑名商密彚纂今河南南陽府淅川縣西有丹水故城古鄀國也今按南郡鄀縣今湖廣襄陽府宜城縣也鄀故城在縣東南楚昭王嘗徙鄀水經注謂之鄢郢楚鄢縣漢改宜城商密傳楚闕克屈禦冦以申息之師戍商密杜注鄀别邑今南鄉丹水縣今按水經注云丹水又徑丹水縣故城南縣有密陽鄉古商密之地楚申息之師所戍也春秋之三户矣三户在今內鄉縣見哀四年析傳秦人過析隈杜注楚邑一名白羽今南鄉析縣隈隱蔽之處彚纂今鄧州內鄉縣即其地也屬河南南陽府析隈山在鄧州南七十里今按又見昭十八年哀四年二十六年向經公㑹莒子衛寧速盟于向杜注莒地彚纂寰宇記曰莒州南七十里有向城今屬山東青州府今按隱二年莒人入向即此地也說見隱二年酅經公追齊師于酅杜注齊地濟北榖城縣西有地名酅下彚纂今兖州府東阿縣西南有酅下聚今按東阿今屬泰安府夔經楚人滅夔杜注楚同姓國今建平秭歸縣彚纂荆州府歸州志云州西南三里有夔子城地名夔沱今按歸州今屬湖廣宜昌府二十七年暌傳使子文治兵于暌杜注楚邑蒍傳子玉復治兵于蒍杜注楚邑被廬傳搜于被廬杜注晉地二十八年南河傳還自南河濟杜注從汲郡南渡出衛南而東彚纂水經注云河水徑東燕縣故城北有棘津之名即此也棘津在衛輝府汲縣南七里斂盂傳晉侯齊侯盟于斂盂杜注衛地彚纂今大名府開州東南有斂盂聚即其地也襄牛傳衛侯出居于襄牛杜注衛地彚纂秦置襄邑縣明初省縣併入睢州今屬河南歸德府今按衛人出君當不出其國境以襄邑為襄牛應劭之說也顔師古引圈稱說辨之曰襄邑宋地本承匡襄陵鄉也宋襄公所葬故曰襄陵然則應說以為襄牛誤也今考水經注叙濮水徑濮陽縣之東有襄丘此為衛之東鄙今曹州府濮州之地襄牛其在此與城濮經晉侯齊師宋師曹師戰于城濮杜注衛地今按說見下有莘之虛傳晉侯登有莘之虛以觀師晉師陳于莘杜注有莘故國名彚纂括地志陳留縣東五里有莘城即古莘國今開封府陳留縣有莘城兖州府曹縣有莘仲集其地接二縣界也今按城濮未審的在何地晉師陳于莘莘在陳留則城濮亦在陳留但陳留去曹縣頗逺不得接界莘仲集當别是一地酅傳楚師背酅而舍杜注丘陵險阻名衡雍傳至于衡雍杜注鄭地今滎陽卷縣彚纂今開封府原武縣西北五里有衡雍城即衡雍也今按原武今屬懷慶府踐土經公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土杜注鄭地彚纂括地志滎澤縣西北十五里有王宫城城內東北隅有踐土臺滎澤今屬開封府河陽經天王狩于河陽杜注晉地今河內有河陽縣彚纂今懷慶府古河陽城在孟縣西三十里孟諸之麋傳余賜女孟諸之麋杜注宋藪澤彚纂郭璞云梁國睢陽東北今歸德府治東北有孟諸澤今按孟諸澤禹貢作孟豬周禮作望諸史記作明都在今商邱虞城間屢被黃河衝决今無存寰宇記云虞城孟諸澤俗呼為湄臺蓋澤中有臺也胡渭云今虞城西北十里有孟諸臺接商邱界即此爾雅水草交曰麋麋古湄字臺蓋以孟諸之麋得名也連榖傳及連榖而死杜注楚地彚纂當在楚方城之外宛濮傳寧武子與衛人盟于宛濮杜注陳留長垣縣西北有宛亭近濮水今按長垣今屬大名府故城在今縣西南三十五里二十九年介經介葛盧來朝杜注東夷國也在城陽黔陬縣彚纂今山東萊州府膠州西南七十里有黔陬城古介國也黔陬有東西二城東城秦置即介亭其在髙密縣境者乃後漢時所遷之西城也昌衍傳舍于昌衍之上杜注魯縣東南有昌平城彚纂今在兖州府曲阜縣東南八十里翟泉經盟于翟泉杜注洛陽城內大倉西南池水也彚纂今古城在河南洛陽縣東北二十里今按又見昭二十三年狄泉三十年函陵傳晉軍函陵彚纂寰宇記函陵在新鄭縣北十三里山形如函故名函陵今屬開封府泛南傳秦軍泛南杜注此東泛也在滎陽中牟縣南疏釋例土地名僖二十四年泛下云此南泛也周王出居于泛楚戍鄭師于泛襄城縣南泛城是也此年泛下云此東泛也秦軍泛南晉伐鄭師于泛滎陽中牟縣南泛澤是也彚纂今屬開封府燭傳若使燭之武見泰君今按燭邑名水經注七里溝水南歷燭城西即鄭大夫燭之武邑又南注于洧其地在新鄭縣焦瑕傳許君焦瑕杜注晉河外五城之二邑彚纂地理志陜縣有故焦城今在陜州南二里文十三年使詹嘉處瑕以守桃林之塞蓋與桃林相近之地今按焦又見宣二年焦為姬姓國晉滅之見襄二十九年又按杜以焦瑕為河外五城之二非也惠公賂秦以河外列城五東盡虢略南及華山內及解梁城既而弗與在河外者焦固其一然內及解梁城則亦有河北之邑水經注河東解縣西南五里有故瑕城晉大夫詹嘉之故邑則瑕在今之解州非河外也此文於河外邑舉焦內及解梁者舉瑕以該所舉之邑耳瑕在解與河南之桃林塞亦相近故詹嘉處瑕亦可守桃林之塞又成六年晉人謀去故絳諸大夫曰必居郇瑕氏之地郇與瑕皆在解杜併為一地亦非又瑕吕飴甥亦曰隂飴甥蓋飴甥嘗食采於瑕兼食於吕吕即隂故曰瑕吕飴甥杜以瑕吕為姓亦非是皆不考解有瑕城而失之者也河外無瑕顧炎武求之不得謂瑕有乎音以漢𢎞農郡之湖縣為瑕謬矣三十一年濟西田經取濟西田傳分曹地自洮以南東傅于濟杜注濟水自滎陽東過魯之西至樂安入海今按洮在今濮州南五十里水經注叙濟水徑定陶縣又東至乘氏縣西引此年分曹地東傅于濟是也重館傳使臧文仲往宿于重館杜注髙平方與縣有重鄉城今按方與今兖州府金鄉縣清原傳晉搜于清原杜注河東聞喜縣北有清原彚纂今在平陽府稷山縣北二十里今按稷山縣今屬絳州帝丘傳衛遷于帝丘今按昭十七年傳衛顓頊之虛也故為帝丘杜注今濮陽縣昔帝顓頊居之其城內有顓頊冡彚纂今大名府開州有顓頊城是也三十二年陽傳晉陽處父報之今按一統志山西太原府太谷縣東十五里有故陽城漢為陽邑縣晉大夫陽處父邑今考文六年云陽處父至自溫成十一年云溫邑狐氏陽氏先處之則處父食邑先在陽後在溫與殽傳晉人禦師必于殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也杜注殽在𢎞農澠池縣西此道在二殽之間南谷中谷深委曲兩山相嶔故可以辟風雨古道由此魏武帝西討巴漢惡其險而更開北山髙道疏此遒見在殽是山名俗呼為土殽石殽彚纂魏太和十一年置崤縣唐改硤石廢崤縣為石濠鎮其北有崤山今崤縣故城在河南府永寧縣北五十里三十三年周北門傳秦師過周北門今按門名乾祭見昭二十四年原圃傳鄭之有原圃猶秦之有具囿也杜注原圃具囿皆囿名滎陽中牟縣西有圃田澤今按水經注云原圃在原武縣原武今屬懷慶府水經注又云圃田澤西限長城東極官渡北佩渠水東西四十許里南北二百許里姜戎經晉人及姜戎敗秦師于殽杜注姜姓之戎居晉南鄙訾婁經公伐邾取訾婁彚纂邾地當在濟寧州界箕經晉人敗狄于箕杜注太原陽邑縣南有箕城彚纂今在太谷縣東南三十五里今按此年伐狄者白狄也白狄在西河渡河而伐晉箕地當近河成十三年傳云秦入我河縣焚我箕郜是近河有箕今山西隰州蒲縣本漢河東郡蒲子縣地東北有箕城隋初移治此後改蒲縣唐移今治而箕城在縣東北晉人敗狄于箕當在此若太谷之箕去白狄逺别是一地白狄傳卻缺獲白狄子杜注白狄狄别種也故西河郡有白部胡今按白狄在西河之西今陜西延安府地也傳云余從狄君以田渭濵則其地南至渭水又告秦人云白狄及君同州是與秦同在雍州也冀傳臼季使過冀見冀缺耨其妻饁之敬相待如賔杜注晉地彚纂今平陽府河津縣東有冀亭水經注云臼季見卻缺耨處今名如賔鄉是也今按河津今屬絳州鄶城傳文夫人斂而葬之鄶城之下杜注鄶城故鄶國在滎陽密縣東北彚纂今縣屬開封府今按密縣今屬許州府又見襄二十九年汦傳與晉師夾汦而軍杜注汦水出魯陽縣東經襄城定陵入汝今按魯陽今汝州魯山縣襄城屬許州府定陵在南陽府舞陽縣汦水即滍水也春秋地理考實卷一
