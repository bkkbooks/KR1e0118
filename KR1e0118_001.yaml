body:
  text: 春秋地理考實卷一婺源江永撰隱公元年魯孔頴達疏杜預采太史公書世本旁引傳記以為世族譜略記國之興滅譜云魯姬姓文王子周公旦之後也周公股肱周室成王封其子伯禽於曲阜為魯侯今魯國是也自哀以下九世二百一十七年而楚滅魯春秋傳說彚纂括地志兗州曲阜縣外城即伯禽所築古魯城也曲阜縣今屬山東兗州府今按曲阜夲奄國都成王滅奄乃封魯又按明堂位言封周公於曲阜地方七百里魯頌言奄有龜蒙遂荒大東保有毚繹遂荒徐宅則魯之封域蓋廣矣約略計之北與齊分泰山西與曹分濟水南近邾滕而西南至金鄉魚臺單縣鄰於宋東跨蒙隂抵諸城濱海東南與莒為鄰則七百里有過之無不及也雖其間不無後世增損然亦止能侵小豈能并大其附庸之國則任宿須句顓㬰根牟鄫鄅牟極鄟邿所占地固多然謂魯之實封儉於百里則魯豈止曲阜一縣乎孟子蓋為當時諸侯土地過制者狹小言之非實録也齊百里意亦同宋傳宋武公生仲子疏宋國公爵譜云宋子姓其先契佐唐虞為司徒封於商成湯受命王有天下及紂無道周武王滅之而封其子武庚以紹殷後武庚作亂周公伐而誅之更封紂兄帝乙之元子微子啓為宋公都商丘今梁國睢陽縣是也微子卒其後微仲代立穆公七年魯隱公之元年景公三十六年魯哀公之十四年獲麟之嵗也昭公得之元年春秋之傳終矣其後五世百七十年而齊魏楚共滅宋彚纂今河南歸德府治商丘縣即漢睢陽故城在縣南今按又見昭元年商丘邾經公及邾儀父盟于蔑杜注邾今魯國鄒縣也疏譜云邾曹姓顓頊之後有陸終産六子其第五子曰安邾即安之後也周武王封其苗裔邾俠為附庸居邾今魯國鄒縣是也自安至儀父十二世始見春秋齊桓行霸儀父附從進爵稱子文公徙於繹桓公以下春秋後八世而楚滅之彚纂今鄒縣屬山東兗州府今按公羊傳邾皆作邾婁檀弓亦然婁者邾之餘聲也戴侗六書故曰邾鄒同聲實一地春秋時邾用夷故謂之邾婁合邾婁之音為鄒故邾改名鄒又按孟子題辭邾國至孟子時魯穆公改曰鄒非也當時邾人自改之耳魯穆公或是鄒穆公之訛史記通作騶又按輿地廣記淄州鄒平縣古鄒國兗州鄒縣邾文公所遷邑此本是二國鄒平屬濟南府水經漯水徑鄒平縣故城北注云有鄒侯國舜後姚姓非邾國明矣鄒平距鄒縣數百里地非相接豈能越逺而遷都魯文公十三年邾文公遷于繹蓋自其國都遷于繹山之下必非自鄒平來徙也蔑經見上杜注姑蔑魯地魯國下縣南有姑蔑城彚纂今兗州府泗水縣東姑蔑故城是也今按姑蔑見定十二年鄭經鄭伯克段于鄢杜注鄭在滎陽宛陵縣西南疏鄭國伯爵譜云鄭姬姓周厲王子宣王母弟桓公友之後也宣王封友於鄭今京兆鄭縣是也及幽王無道友遷其民於虢鄶虢鄶之君分其地遂國焉今河南新鄭縣是也莊公二十二年魯隱公之元年聲公二十年獲麟之嵗也三十三年而春秋之傳終矣聲公三十七年卒自聲以下五世八十七年而韓滅鄭彚纂朱子詩傳鄭本在西都畿內咸林之地武公得虢鄶之地乃徙其封而施舊號於新邑是為新鄭今新鄭縣屬河南開封府其東北有宛陵城即古宛陵縣也今按京兆鄭縣今陜西同州府華州治是也咸林或作棫林新鄭今屬河南許州府又詳隱十一年新邑鄢經見上杜注今頴川鄢陵縣彚纂今屬河南開封府今按又見成十六年鄢陵周經天王使宰咺疏譜云周黃帝之苗裔姬姓后稷之後也后稷封於邰及夏之衰后稷之子不窋失其官竄於西戎至太王為狄所逼去邠居岐文王受命武王克殷而王有天下幽王為犬戎所殺平王遷都王城今河南縣是也平王四十九年魯隱公之元年也敬王又遷成周今洛陽是也敬王三十九年獲麟之嵗也四十三年而敬王崩敬王子元王九年春秋之傳終矣元王以下十一世二百二十六年而周亡今按詳見王朝興廢說宿經及宋人盟于宿杜注宿小國東平無鹽縣也彚纂今無鹽故城在兗州府東平州東二十里今按宿男爵風姓太皞之後司有濟之祀故封於此莊十年宋人遷之東平州今屬泰安府祭經祭伯來杜注祭國伯爵也疏富辰云郉茅胙祭則祭之初封畿外之國也穆王時有祭公謀父今有祭伯世仕王朝蓋本封絶滅食采於王畿也彚纂路史周圻內管城東北有古祭城今開封府東北十五里有祭伯城是也今按路史之說是成四年汜祭彚纂又謂中牟有祭亭為周祭伯之邑與此不相應蓋誤說見後祭注又按開封府東北無祭城管城為今之鄭州蓋開封府下脫鄭州二字費傳費伯帥師城郎彚纂魯大夫費㕂父之食邑讀如字與季氏費邑讀如祕者有别魏武封費亭侯即此今魚臺縣西南有費亭今按費伯者費㕂父也見隱二年郎亦在魚臺縣故知此費為其食邑陸德明釋文音祕非也季氏之費見僖元年郎傳見上杜注魯邑髙平方與縣東南有郁郎亭彚纂今兗州府魚臺縣東北有郎城今按魯懿公孫費伯城郎居之因氏郎見廣韻注又說見隱九年申傳鄭武公娶于申杜注申國今南陽宛縣疏外傳說伯夷之後曰申吕雖衰齊許猶在則申吕與齊許俱同出伯夷同為姜姓又曰齊許申吕由太姜言由太姜而封也然則申之始封亦在周興之初其後申絶至宣王時申伯以王舅改封于謝地理志南陽郡宛縣故申伯國謂宣王改封之後也以前則不知其地彚纂今河南南陽府南陽縣北有故申城今按謝在南陽府鄧州境申伯雖封于謝而其後仍國于申鄧州在南陽府之西南莊六年傳云楚文王伐申過鄧是以知申在南陽縣也楚既滅申以為縣子重請申吕為賞田申公巫臣曰不可此申吕所以邑吕亦在南陽縣故合言之又汝寧府信陽州漢之平氏縣後周及唐皆以為申州豈申之始封在此與制傳為之請制按此年杜無注五年制人注制鄭邑今河南成臯縣也一名虎牢彚纂今河南開封府汜水縣西有虎牢城今按穆天子傳云七萃之士生捕虎即獻天子天子畜之東虢號曰虎牢虢傳制巖邑也虢叔死焉杜注虢叔東虢君也恃險而不修德鄭滅之虢國今滎陽縣彚纂此為東虢國虢叔所封後並於鄭有故城在今汜水縣東十里近滎陽界今按虢仲虢叔為王季之子文王之弟姓氏書云仲曰西虢後遷上陽為南虢晉滅之叔曰東虢平王奪其地與鄭據此則虢叔國在東也此年疏云虢叔封西虢仲封東而此云虢叔東虢君者言所滅之君字叔此孔氏姑從賈逵說也僖五年疏云據傳鄭滅一虢晉滅一虢不知誰是仲後誰是叔後賈逵云虢仲封東虢制是也虢叔封西虢虢公是也賈之言亦無證不可審知據此則賈說亦非定說矣京傳請京使居之杜注鄭邑今滎陽京縣彚纂今開封府滎陽東南二十里有京故縣城祭傳祭仲曰按此年杜無注桓十一年祭封人仲足注云陳留長垣縣東北有祭城彚纂括地志謂故祭城在管城東北十五里即祭仲邑路史以管城之祭為周祭伯采地或疑鄭并祭以封仲考隱元年祭公來桓八年祭公逆王后于紀莊二十三年祭叔來聘祭未嘗滅也鄭安得取以封仲乎蓋鄭國自有祭邑不在畿內今按祭地有三一為直𨽻大名府長垣縣之祭城一為管城之祭城管城今為鄭州一為開封府中牟縣之祭亭長垣去鄭逺衛之匡蒲宛濮皆在其縣地當屬衛鄭何能有其地以封祭仲杜說非是路史以管城之祭為祭伯采地路史之說為長蓋鄭州近王畿也但其後鄭亦并之耳若中牟正為鄭地祭仲之邑當在此彚纂於成四年汜祭又以中牟祭亭為祭伯邑與此違異前後失考訂然則長垣何由有祭城意周初以此封周公之子其後祭公入為卿士而周又遷東都祭公遂改食邑於管城與廪延傳至于廪延杜注鄭邑陳留酸棗縣北有延津彚纂開封府延津縣古酸棗城在縣北一說衛輝府汲縣有延津城蓋壤地相接也共傳太叔出奔共杜注共國今汲郡共縣彚纂今河南衛輝府輝縣治今按此共伯和之國後蓋為衛所并閔二年有共滕之民杜云衛别邑城潁傳遂置姜氏于城潁杜注鄭地彚纂史記正義曰疑許州臨潁縣是今開封府臨潁縣西北十五里有臨潁故城今按臨潁今屬許州府潁谷傳潁考叔為潁谷封人彚纂水經注潁水出陽城陽乾山之潁谷今河南府登封縣即陽城也紀傳紀人伐夷杜注紀國在東莞劇縣疏世族譜紀姜姓侯爵莊四年齊滅之彚纂今山東青州府夀光縣東南有紀城齊乘云即劇城是也夷傳見上杜注夷國在城陽莊武縣疏世本云夷妘姓傳無其人不知誰所滅莊十六年晉武公伐夷執夷詭諸杜云詭諸周大夫夷采地名則二夷别也世族譜於夷詭諸之下注云妘姓更無夷國則以二夷為一是譜誤彚纂今山東萊州府即墨縣西有莊武故城今按史記云晏平仲嬰者萊之夷濰人也即此夷國之地漢置夷安縣在今萊州府髙密縣境與即墨西之莊武相近則夷地後屬之齊非齊滅即紀先滅之後入於齊耳黃傳惠公之季年敗宋師于黃杜注宋邑陳留外黃縣東有黃城彚纂今外黃故縣在開封府杞縣北衛傳衛侯來㑹葬杜注衛國在汲郡朝歌縣疏譜云衛姬姓文王子康叔封之後也周公既誅祿父以其地封康叔為衛侯居殷墟今朝歌是也狄滅衛文公徙居楚丘成公徙帝丘今東郡濮陽是也桓公十三年魯隱公之元年也出公輒十二年獲麟之嵗也悼公二年春秋之傳終矣悼公二年卒自悼以下十一世二百五十五年而秦滅衛彚纂今朝歌故城在衛輝府淇縣東北虢傳鄭人以王師虢師伐衛南鄙杜注西虢國也𢎞農陜縣東南有虢城彚纂今河南府陜州即陜縣也今按文王弟虢仲初封於虢為西虢故城在陜西鳳翔府寶雞縣東六十里後改封於陜今陜州為直𨽻州翼傳及邾人鄭人盟于翼杜注邾地彚纂今在山東兖州府費縣西南今按費縣今屬沂州府二年戎經公㑹戎于潛杜注陳留濟陽縣東南有戎城彚纂今山東兖州府曹縣故戎城是也今按曹縣今屬曹州府潛經見上杜注魯地彚纂蓋近戎之地當在今兖州府西南境莒經莒人入向疏世本莒己姓文八年傳稱穆伯奔莒從己氏是莒己姓也譜莒云莒嬴姓少昊之後周武王封兹與於莒初都計後徙今城陽莒縣是也世本自紀公以下為己姓不知誰賜之姓者十一世兹平公方見春秋共公以下微弱不復見四世楚滅之彚纂今山東青州府莒州是也今按莒州今屬沂州府莒初都計漢琅邪郡之計斤縣也莒為介根邑見襄二十四年向經見上杜注譙國龍亢縣東南有向城彚纂今江南鳳陽府懷逺西四十里有故縣村漢置向縣龍亢在其西今按傳莒子娶于向向姜不安莒而歸莒人入向以姜氏還向國當近莒考向地在山東者二宣四年杜注東海承縣東南有向城于欽齊乘謂向城鎮在沂州西南一百里當為一地此一向也寰宇志莒州南七十里有向城此又一向也二地不知孰為向國以近莒言之則寰宇志為是蓋莒人向後遂有其地至宣四年魯又伐莒取向也若龍亢之向去莒甚逺襄十四年諸國大夫㑹吳于向當是此向耳極經無駭帥師入極杜注附庸小國彚纂今兖州府魚臺縣西有極亭唐經公及戎盟于唐杜注髙平方與縣西有武唐亭彚纂今在兖州府魚臺縣東十二里密經紀子帛莒子盟于密杜注莒邑城陽淳于縣東北有密鄉彚纂今山東萊州府昌邑縣東南十五里有密鄉故城三年石門經齊侯鄭伯盟于石門傳尋盧之盟也杜注石門齊地或曰濟北盧縣故城西南濟水之門盧齊地彚纂盧縣故城在今山東濟南府長清西南二十五里盧見上溫傳鄭祭足帥師取溫之麥杜注今河內溫縣彚纂今屬懷慶府古溫城在縣西南三十里成周傳又取成周之禾杜注洛陽縣也彚纂今河南府洛陽縣東北有洛陽故城今按又詳昭二十六年濟傳鄭伯之車僨于濟疏釋例曰濟自滎陽卷縣東經陳留至濟隂北經髙平東經濟北東北經濟南至樂安博昌縣入海按檢水流之道今古或殊杜既考校元由據當時所見載於釋例今一皆依社雖與水經乖異亦不復根尋也彚纂蔡沈書傳濟水出河東郡垣曲縣王屋山至青州博興縣入海今垣曲屬平陽府博興屬青州府齊傳衛莊公娶于齊東宫得臣之妹曰莊姜疏齊國侯爵譜云姜姓太公望之後其先四嶽佐禹有功或封於吕或封於申故太公曰吕望也太公股肱周室成王封之於營丘今臨淄是也僖公九年魯隱公之元年也簡公四年獲麟之嵗也簡公弟平公十三年春秋之傳終矣平公二十五年卒後二世七十年而田氏奪齊太公之後滅矣彚纂太公所封國都今青州府臨淄縣西北營丘城也後胡公徙都薄姑則在今青州府博興縣東北今按臨淄故城今在青州府北五十里又名齊城漢書臣瓚注謂臨淄城中有丘即營丘故營丘與臨淄為一地若北海郡治之營陵臣瓚謂即春秋之緣陵其非營丘明矣應劭以營陵為營丘今昌樂縣漢為營陵縣地隋於此置營丘縣一統志謂昌樂縣東南五十里營丘社即太公受封之地又於臨淄縣注云本齊營丘地漢置營陵縣為北海郡治誤矣陳傳又娶于陳杜注今陳國陳縣疏陳國侯爵譜云媯姓虞舜之後當周之興有虞遏父者為周陶正武王賴其利器用與其先聖之後以元女大姬妃遏父之子滿封於陳賜姓曰媯號胡公桓公二十三年魯隱公之元年也湣公二十一年獲麟之嵗也二十四年楚滅陳彚纂即今河南開封府陳州今按今為陳州府附郭設淮寧縣四年杞經莒人伐杞取牟婁杜注杞國本都陳留雍丘縣推尋事跡桓六年淳于公亡國杞似并之遷都淳于僖十四年又遷緣陵襄二十九年晉人城杞之淳于又遷都淳于疏譜云杞姒姓夏禹之苗裔武王克殷求禹之後得東樓公而封之於杞今陳留雍丘縣是也九世及成公遷緣陵文公居淳于成公始見春秋湣公六年獲麟之嵗也湣公弟哀公三年春秋之傳終矣哀公十年卒自哀公以下二世十三年而楚滅杞彚纂雍丘今河南開封府杞縣是也淳于今青州府安丘縣有淳于故城今按史記索隱云周封杞居雍丘至春秋時杞已遷東國故隱四年莒人伐杞取牟婁牟婁者東邑也據此則春秋之前已遷青州而近莒矣青州去雍丘甚逺杞得國於此或由周王改封之疏謂雍丘淳于郡别而境連者大誤牟婁經見上杜注祀邑城陽諸縣東北有婁鄉彚纂今婁鄉城在青州府諸城縣境清經公及宋公遇于清杜注衛邑濟北東阿縣有清亭彚纂今東阿縣屬兖州府今按水經注京相璠曰東阿東北四十里有故清亭所謂遇于清者也東阿今屬泰安府當是齊地濮經衛人殺州吁于濮杜注濮陳地水名疏釋例土地名此濮下注云闕哀二十七年傳濮下注云濮自陳留酸棗縣受河東北經濟隂至髙平距野縣入濟與此名同實異故杜於此不言闕直云濮陳地水名今按濮水本在衛傳謂陳人執州吁而請涖于衛衛人使石宰醜涖殺州吁于濮蓋陳人執州吁送至衛之濮水衛人於是涖殺之故經詳其地若濮是陳地水名則經當書殺于陳不必言其地也陳地恐無濮水蔡傳於是陳蔡方睦于衛杜注蔡今汝南上蔡縣疏蔡國侯爵譜云蔡姬姓文王子叔度之後也武王封之於汝南上蔡為蔡侯作亂見誅其子蔡仲武王復封之於蔡至平侯徙新蔡昭侯徙九江下蔡宣侯二十八年魯隱公之元年也昭侯子成侯十年獲麟之嵗也成侯子聲侯四年春秋之傳終矣聲侯十四年卒自聲侯以下二世二十八年而楚滅蔡彚纂上蔡今屬河南汝寧府縣西南十里有故蔡國城今按平侯徙新蔡今亦屬汝寧府下蔡見成七年五年棠經公矢魚于棠杜注今髙平方與縣北有武唐亭魯侯觀魚臺彚纂今兖州府魚臺縣魚亭山是其處也今按魚臺縣北十三里有武唐亭水經注云有髙臺二丈許下臨渮水長葛經宋人伐鄭圍長葛杜注潁川長社縣北有長葛城彚纂今河南開封府許州長葛縣北十二里有故城今按長葛屬許州府曲沃傳曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨杜注曲沃晉别封成師之邑在河南聞喜縣彚纂聞喜今屬山西平陽府今按秦改曲沃為左邑漢武帝經邑之桐鄉聞破南粵因置聞喜縣東漢罷左邑移聞喜治此故聞喜為曲沃舊屬平陽府解州今屬絳州翼傳見上杜注晉舊都在平陽絳邑縣東疏晉國侯爵譜云姬姓武王子唐叔虞之後也成王滅唐而封之今太原晉陽縣是也燮父改之曰晉燮父孫成侯徙都曲沃今河東聞喜縣是也穆侯徙都絳鄂侯二年魯隱公之元年也定公三十一年獲麟之嵗也出公八年而春秋之傳終矣出公十七年卒自出公以下五世八十二年而韓趙魏滅晉彚纂今平陽府翼城縣是也縣東南有古翼城今按晉詳見列國興廢說郉傳見上杜注邢國在廣平襄國縣彚纂今直𨽻順德府邢臺縣西南襄國故城即其地今按邢國周公之子所封僖二十五年衛滅之尹傳見上今按詳見昭二十三年隨傳見上杜注晉地彚纂今介休縣有古隨城屬山西汾州府今按後為士㑹食邑牧傳鄭人侵衛牧杜注衛邑彚纂今汲縣地也屬河南衛輝府今按即牧野也燕傳衛人以燕師伐鄭杜注南燕國今東郡燕縣疏燕有二國一稱北燕故言南燕以别之地理志東郡燕縣南燕國姞姓黃帝之後彚纂今汲縣西有古燕城郕傳郕人侵衛故衛師入郕杜注郕國東平剛父縣西南有郕鄉疏史記稱郕叔武文王子武王之母弟後世無所見唯文十二年書郕伯來奔則郕國伯爵也彚纂今兖州府寧陽縣北有盛鄉城是也堽城壩即剛父故縣今按括地志濮州雷澤縣漢濟隂郡成陽縣古郕伯姬姓之國其後遷於成之地然則郕始封不在寧陽北制傳鄭二公子以制人敗燕師于北制注見元年六年艾經公㑹齊侯盟于艾杜注泰山牟縣東南有艾山彚纂今在山東青州府蒙隂縣西北今按蒙隂今屬沂州府鄂傳翼九宗五正頃父之子嘉父逆晉侯于隨納諸鄂杜注鄂晉别邑今按史記晉世家注引世本云唐叔虞居鄂宋忠曰鄂地今在大夏張守節正義曰括地志云故鄂城在慈州昌寧縣東二里與絳州夏縣相近故云在大夏唐慈州今為吉州昌寧今為鄉寧縣在平陽府太平縣之西吉州之東南近黃河也周傳周桓公言於王曰杜注周采邑扶風雍縣東北有周城彚纂今在陜西鳳翔府岐山縣南今按周既東遷當别食邑而猶稱周公七年滕經滕侯卒杜注滕國在沛國公丘縣東南疏譜云滕姬姓文王子錯叔繡之後武王封之居滕今沛郡公丘縣是也自叔繡至宣公十七世乃見春秋隱公以下春秋後六世而齊滅之彚纂今兖州府滕縣西南十五里有古滕城即滕國也中丘經城中丘杜注在琅邪臨沂縣東北彚纂今兖州府沂州東北二十里有中丘城今按沂州今改沂州府附郭設蘭山縣凡經天王使几伯來聘杜注凡國伯爵也汲郡共縣東南有凡城彚纂今凡故城在河南衛輝府輝縣西南二十里今按凡國周公子所封楚丘經戎伐凡伯于楚丘以歸杜注衛地在濟隂城武縣西南彚纂今兖州府曹縣東楚丘亭是也今按曹縣今屬曹州府一統志楚丘城在曹縣東南五十里春秋時戎州己氏之邑漢改為己氏縣隋改曰楚丘明省入曹州又考二年戎城亦在曹縣則此楚丘為戎邑凡伯經其地戎遂伐之以歸非衛邑也因此楚丘與滑縣楚丘衛文公所居者同名杜遂以為衛地不知此楚丘去衛逺衛不得有此說者因杜注遂謂于楚丘者罪衛不能救王臣之患考之亦不詳矣若論近楚丘之國則曹都定陶者為最近凡伯經戎人之邑而戎伐之雖曹亦不能救也春秋書于楚丘詳其為戎地以見戎之橫周之微耳於曹衛乎何責八年垂經宋公衛侯遇于垂杜注衛地濟陽句陽縣東北有垂亭彚纂今兖州府曹州北句陽店是其地也今按曹州今改為府垂地近定陶疑當屬曹戰國時屬魏魏公子無忌所謂秦伐魏文臺墮垂都焚者此也犬丘傳齊侯將平宋衛有㑹期宋公以幣請於衛請先相見衛侯許之故遇于犬丘杜注犬丘垂也地有兩名疏釋例曰若一地二名當時竝有則直兩文互見黑壞犬丘時來之屬是也祊經鄭伯使宛來歸祊杜注鄭祀泰山之邑在琅邪費縣東南彚纂今兖州府費縣治故祊城是也今按費縣今屬沂州府瓦屋經宋公齊侯衛侯盟于瓦屋傳齊人卒平宋衛于鄭㑹于溫盟于瓦屋以釋東門之後杜注瓦屋周地疏瓦屋既闕知是周地者以其㑹于溫盟于瓦屋㑹盟不得相逺溫是周地知瓦屋亦周地也彚纂今開封府洧川縣南二十里瓦屋里是其地今按杜以㑹于溫故意瓦屋為周地今考瓦屋里在洧川南其地在新鄭之東當為鄭地非周地也蓋此㑹此盟三國本欲就鄭是時莊公為周卿士故先㑹于河內之溫猶欲盟於近鄭之瓦屋鄭竟不至三國遂自為盟蓋鄭怨宋衛深陽許而實不欲平也是以十年鄭復伐宋觀㑹與盟之地可得其情矣浮來經公及莒人盟于浮來杜注紀邑東莞縣北有邳鄉邳鄉西有公來山號邳來間彚纂今莒州西二十里有浮來今按浮來莒邑非紀邑許田傳鄭伯請釋泰山之祀而祀周公以泰山之祊易許田杜注成王營王城有遷都之志故賜周公許田以為魯朝宿之邑後世因而立周公别廟焉鄭桓公周宣王之母弟封鄭有助祭泰山湯沐之邑在祊鄭以天子不能復巡狩故欲以祊易許田各從本國所近之宜許田近許之田彚纂今許川西南有魯城後置邑寰宇志謂在許昌城南四十里者是也今按魯頌居嘗與許復周公之宇許即許田也許州今為府九年郎經夏城郎今按隱元年費伯已城郎而此年又城郎蓋魯有兩郎也費伯城者為魚臺縣東北之郎去魯逺此年城者蓋魯近郊之邑莊十年齊師宋師次于郎公敗宋師于乘丘則郎近乘丘而括地志謂乘丘在瑕丘西北瑕丘為兖州府滋陽縣與曲阜近則郎可知矣且哀十一年吳伐我不言四鄙傳謂戰于郊而檀弓云戰于郎則郎豈非近郊之地乎十年齊衛鄭來戰于郎公羊傳云郎者何吾近邑也得之矣若魚臺之郎去魯約二百里防經公㑹齊侯于防杜注魯地在琅邪華縣東南彚纂今兖州府費縣東北六十里有華城即華縣也今按費縣見前祊北戎傳北戎侵鄭今按釋例杜以北戎山戎無終為一皆為今直𨽻之永平府地去鄭甚逺何以侵鄭此北戎當在河北莊二十八年之大戎小戎今考其地在太原之交城成元年之第戎在解州平陸北戎蓋此等戎耳十年菅經公敗宋師于菅辛未取郜辛巳取防杜注菅宋地今按蓋在兖州府之西南金鄉城武之間郜經見上杜注濟隂城武縣東南有郜城彚纂今在兖州府城武縣東南八十里今按此南郜也北郜見桓二年城武今屬曹州府防經見上杜注髙平昌邑縣西有西防城彚纂今在兖州府金鄉縣西戴經宋人蔡人衛人伐戴鄭伯伐取之杜注戴國今陳留外黃縣東南有戴城疏地理志梁國災縣故戴國應劭曰章帝改曰考城古者災戴聲相近彚纂今河南歸德府考城縣東南五里考城故城是也今按疏說非也災同災章帝因其名不美故改之見水經注一統志云鄭取戴改名榖城秦置災縣東漢改考城鄧傳公㑹齊侯鄭伯于中丘盟于鄧為師期杜注鄧魯地彚纂路史黃帝臣鄧伯溫國當在兖州府境老桃傳公㑹齊侯鄭伯于老桃杜注宋地彚繤戰國䇿髙誘注曰任城有桃聚今兖州府濟寧州北有桃鄉城今按老桃若在濟寧州北則為齊魯境上地非宋地十一年薛經滕侯薛侯來朝杜注魯國薛縣疏譜云薛任姓黃帝之苖裔奚仲封為薛侯今魯國薛縣是也奚仲遷於邳仲虺居薛以為湯左相武王復以其胄為薛侯齊桓霸諸侯黜為伯獻公始與魯同盟小國無記世不可知亦不知為誰所滅彚纂今薛城在兖州府滕縣南四十里今按滕文公言齊人將築薛又薛為齊田嬰食邑則薛當是田齊所滅時來經公㑹鄭伯于時來傳公㑹鄭伯于郲杜注時來郲也滎陽縣東有釐城鄭地也彚纂在今開封府東四十里今按水經注京相璠曰滎陽縣東四十里有故釐城則釐城不在開封府東彚纂缺滎陽縣三字耳許經公及齊侯鄭伯伐許杜注潁川許昌縣疏譜云許姜姓與齊同祖堯四嶽伯夷之後也周武王封其苖裔文叔于許今潁川許昌是也靈公徙葉悼公遷夷一名城父又居析一名白羽許男斯處容城自文叔至莊公十一世始見春秋元公子結元年獲麟之歲也當戰國初楚滅之彚纂今開封府許州故許城在州東北四十里今按許州今為府附郭設石梁縣大逵傳及大逵杜注逵道方軌也疏爾雅九達謂之逵說爾雅者皆以為四道交出復有旁道今以為道方九軌者蓋以九出之道世俗所希不應城內得有此道以考工記經涂九軌故以逵當之亦是九達之義涂方九軌天子之制諸侯之國不得皆有唯鄭城獨有其涂故桓十四年焚渠門入及大逵莊二十八年衆軍入自純門及逵市宣十二年入自皇門至于逵路劉炫以國國皆有逵道以規杜氏非也新邑傳吾先君新邑於此杜注此今河南新鄭舊鄭在京兆疏地理志河南郡新鄭縣鄭桓公之子武公所國是知新邑於此謂新鄭也志又云京兆鄭縣周宣王弟鄭桓公邑是知舊鄭在京兆也志又云本周宣王弟友為周司徒食采於宗周畿內是為鄭桓公桓公問於史伯王室多故何所可以逃死史伯為桓公謀取虢鄶之地令寄帑與賄而虢鄶受之後幽王敗桓公死其子武公與平王東遷卒定虢鄶之地然則傳云先君新邑於此謂武公始居此也塢傳王取塢劉蒍䢴之田于鄭杜注塢劉二邑在河南緱氏縣西南有塢聚西北有劉亭彚纂塢聚在今河南府偃師縣西南五十里劉傳注見上彚纂緱氏今屬偃師縣今按此時劉邑入周後為畿內大夫之采邑蒍傳見上杜注蒍䢴鄭二邑彚纂蒍當在今河南懷慶府偃師孟縣之間䢴傳見上彚纂今懷慶府河內縣西北三十里䢴臺鎮古䢴城也今按故䢴國僖二十四年䢴武之穆即此也溫傳而與鄭人蘇忿生之田溫原絺樊隰城攢茅向盟州陘隤懷杜注蘇忿生周武王司寇蘇公也疏成十一年傳曰蘇忿生以溫為司冦今按溫詳見三年原傳見上杜注在沁水縣西彚纂今懷慶府濟源縣西北有原鄉絺傳見上杜注在野王彚纂今懷慶府河內縣西南三十里有絺城今按一統志絺城一名付逯城樊傳見上杜注一名陽樊野王縣西南有陽城彚纂在今濟源縣東南三十八里隰城傳見上杜注在懷縣西南彚纂今懷慶府武陟縣西南十五里隰城是也欑茅傳見上杜注在修武縣北彚纂修武今屬懷慶府縣北二十里大陸村即其地也向傳見上杜注軹縣西有地名向上彚纂今懷慶府濟源縣西南有向城今按軹城今名軹村在濟源縣南十三里闞駰曰軹縣南山西曲有故向城盟傳見上音孟杜注今盟津彚纂在今懷慶府孟縣南十八里州傳見上杜注今州縣彚纂今故城在懷慶府河內縣東五十里陘傳見上杜注闕彚纂輿地太行陘在懷慶府西北三十里一名丹陘隤傳見上杜注在修武縣北彚纂京相璠曰河內修武縣北有故隤城懷傳見上杜注今懷縣凡十二邑皆蘇忿生之田攢茅隤屬汲郡餘皆屬河內彚纂今武陟縣西十一里有懷縣故城息傳息侯伐鄭杜注息國汝南新息縣疏世本息國姬姓莊十四傳楚文王滅息地理志汝南郡有新息縣蓋自他國而徙此彚纂今河南汝寧府息縣西南七里有息城今按河南以光州為直𨽻州息縣屬之一統志又謂古息國在息縣北三十里莵裘傳使營莵裘杜注魯邑在泰山梁父縣南彚纂今兖州府泰安州南泗水縣北有梁父城莵裘聚狐壤傳與鄭人戰于狐壤杜注鄭地彚纂後漢潁隂縣有狐宗鄉疑即此今按漢潁隂縣在今許州府社圃傳齊于社圃杜注園名桓公元年越經公及鄭伯盟于越杜注垂犬丘衛地也越近垂地名彚纂當在兖州府曹州附近今按當為曹地曹州今為府二年稷經公㑹齊侯陳侯鄭伯于稷以成宋亂杜注宋地彚纂當在今歸德府境郜經取郜大鼎于宋杜注郜國濟隂城武縣東南有北郜城彚纂蓋郜有二城北郜城則為郜國又南二里曰南郜城則為宋邑隱十年取郜是也俱在兖州府城武縣今按富辰言郜為文之昭而郜地有三其二在城武縣其一在晉成十三年焚我箕郜是也姓氏書言告分南北南後入晉北入宋有告氏郜氏然則郜分二國一滅於晉一滅於宋其南郜城為宋邑者亦郜國别城耳但晉宋當言西東不當言南北城武今屬曹州府鄧經蔡侯鄭伯㑹于鄧傳始懼楚也杜注潁川召陵縣西南有鄧城疏賈服以鄧為國言蔡鄭㑹於鄧之國都釋例以此潁川鄧城為蔡地其鄧國則義陽鄧縣是也以鄧是小國去蔡逺蔡鄭不宜逺㑹其都且蔡鄭懼楚始為此㑹何當反求近楚小國而與之結援故知非鄧國也彚纂今鄧襄城在開封府郾城縣東南三十五里公羊以鄧為國則後五年鄧侯來朝即其君也今按郾城今屬許州府此鄧地在蔡之北鄭之南正是蔡鄭相㑹之處昭十三年蔡朝吳奉蔡公召子干子晳盟于鄧亦此地也孔疏說是公羊賈服說非雒邑傳武王克商遷九鼎于雒邑杜注武王但營雒邑未有都城周公乃卒營雒邑謂之王城即河南城也彚纂今河南府洛陽城內西偏即王城之故址楚傳始懼楚也杜注楚國今南郡江陵縣紀南城也疏地理志南郡江陵縣故楚郢都楚文王自丹陽徙此世本云楚鬻熊居丹陽武王徙郢丹陽在南郡枝江縣今江陵縣北有郢城史記稱文王徙都于郢地理志依史記為說譜云楚芈姓顓頊之後也其後有鬻熊事周文王早卒成王封其曽孫熊繹於楚以子男之田居丹陽今南郡枝江是也熊逵始稱武王武王十九年魯隱公之元年也武王居郢今江陵是也昭王徙鄀惠王八年獲麟之嵗也惠王二十一年春秋之傳終矣惠王五十七年卒自惠王以下十一世二百九年而秦滅之彚纂今江陵縣屬荆州府紀南城在府北十里枝江縣亦屬荆州府今按一統志丹陽城在歸州東七里熊繹始封於此後又移枝江亦曰丹陽今歸州屬宜昌府昭十二年子革云昔先王熊繹僻在荆山此據境內大山言之其實歸州去荆山逺然以較之枝江在江之南則歸州為差近矣文莊十年荆敗蔡師于莘杜注云荆楚本號後改為楚疏云荆楚一木二名故以為國號亦得二名終莊公之世經皆書荆僖之元年乃書楚人伐鄭蓋於爾時始改為楚按詩言奮伐荆楚荆楚之名由來久矣春秋之初傳言楚經書荆後乃易之各隨時史所書耳條傳以條之役生大子杜注晉地彚纂今山西平陽府解州安邑縣有中條山縣北三十里有鳴條岡今按解州今直𨽻山西安邑屬之千畝傳其弟以千畝之戰生杜注西河介休縣南有地名千畝彚纂今平陽介休縣有千畝原今按介休今屬汾州府國語云宣王三十九年戰于千畝王師敗績于姜氏之戎史記年表千畝戰在晉穆侯十年己亥當宣王之二十六年若以共和之年為宣王之年從共和元年庚申數之則是宣王之四十年僅差一年然則此千畝戰從宣王而戰也陘庭傳哀侯侵陘庭之田陘庭南鄙啓曲沃伐翼杜注翼南鄙邑彚纂翼即今平陽府翼城縣縣東南七十五里有熒庭城志云即陘庭也今按史記白起傳攻韓陘城正義謂陘庭故城在曲沃縣西北二十里在絳州東北三十五里如此則陘庭不在翼城之南矣襄二十三年齊莊公伐晉入孟門登大行張武軍於熒庭戍郫邵地皆近翼城又水經注紫谷水出白馬山西徑滎庭城南西入澮亦在翼城南則陘庭即熒庭亦即滎庭在翼城東南者為是而白起攻韓之陘城者别是一地非此陘庭也三年嬴經公㑹齊侯于嬴杜注齊邑今泰山嬴縣彚纂今故城在泰安州東南五十里今按泰安州今為府附郭設泰安縣一云嬴縣故城在萊蕪縣西北四十里蓋各據其縣之地望言之實一地也蒲經齊侯衛侯胥命于蒲杜注衛地在陳留長垣縣西南彚纂今直隸大名府長垣縣治故蒲城是也歡經齊侯送姜氏于歡杜注魯地濟北蛇丘縣西有下歡亭彚纂今濟南府肥城縣西南有故城水經注云俗訛為夏暉城今按肥城今屬泰安府汾隰傳逐翼侯于汾隰杜注汾水邊疏釋例汾水出太原故汾陽縣東南至晉陽縣西南經西河平陽至河東汾隂縣入河彚纂今汾水出太原府靜樂縣西南至府城西東南流經汾州平陽二府至滎河縣北入河靜樂漢汾陽滎河漢汾隂也今按滎河今屬蒲州府欒傳及欒共叔彚纂欒晉地晉大夫欒氏封邑今直𨽻真定府欒城縣是也今按此年杜無此注謂欒為晉地者哀四年注也今正定府之欒城去晉甚逺晉後漸大能有其地春秋之初未能擴地至此而曲沃桓叔時已有靖侯之孫欒賓孔疏謂欒氏蓋其父字欒則以字氏非以邑氏正定之欒城或别有其故姓氏書姬姓國有欒則欒城或其故國必非晉大夫欒氏之邑也芮傳芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居于魏杜注芮國在馮翊臨晉縣疏世本芮魏皆姬姓彚纂今陜西西安府同州朝邑縣有芮故城在黃河西岸今按朝邑縣今屬同州府魏傳見上杜注魏國河東河北縣彚纂括地志魏故國在芮城縣北五里今平陽府解州芮城縣河北故城是也今按解州今為直𨽻州芮城屬之四年郎經公狩于郎今按公羊云譏逺也當為隱元年所城之郎秦傳秦師侵芮彚纂詩譜曰秦隴西谷名徐廣曰天水隴西縣有秦亭今鞏昌府泰州清水縣故秦城是也史記秦之先伯翳佐禹平水土賜姓嬴氏後有大駱生非子為周孝王主馬汧渭間分土為附庸邑之秦今按秦州今為直𨽻州清水屬之又按一統志鳳翔府隴州南三里亦有秦城非子所封此地本漢之汧源縣豈非子始食邑於此後復封之清水與又詳見列國興廢說五年祝丘傳城祝丘彚纂漢郎邱縣孟康曰春秋時之祝丘也今沂州東南五十里有郎丘城今按沂州今為府州經州公如曹疏此州公及僖五年晉人執虞公竝是小國而得稱公者或以嘗為三公之官若虢公之屬故稱公也世本州國姜姓彚纂今青州府安丘縣淳于城州所都也淳于傳淳于公如曹度其國危遂不復杜注淳于州國所都城陽淳于縣也彚纂今安丘縣東北三十里有淳于城今按杜前言州公之國杞似并之遷都淳子此說是也或謂州稱公與蔡公同此為畿內之地河內州縣按河內之州蘇忿生邑隱十一年桓王既與鄭矣此時豈復有州公乎曹經見上杜注曹國今濟隂定陶縣疏譜云曹姬姓文王子叔振鐸之後也武王封之陶丘今濟隂定陶縣是也桓公三十五年魯隱公之元年也伯陽六十五年魯哀公之八年而宋滅曹彚纂定陶今屬兖州府縣西北四里有定陶故城即曹國也今按定陶今屬曹州府繻葛傳戰于繻葛杜注鄭地彚纂或云即長葛也今開封府長葛縣北十二里有故城今按長葛今屬許州府六年成經公㑹紀侯于成杜注魯地在泰山巨平縣東南彚纂今兖州府寧陽縣東北九十里有故城社即古成城也今按後為孟氏邑隨傳楚武王侵隨杜注隨國今義陽隨縣疏隨國姬姓不知始封為誰哀元年隨侯見經後不知為誰所滅彚纂西魏置隨州今屬湖廣德安府古城在州南今按姓氏書謂為楚所滅有隨氏少師氏瑕傳軍于瑕以待之杜注隨地今按成十六年楚師自鄢陵還及瑕當是此地北戎傳北戎伐齊今按齊境北至無棣今直𨽻滄州以北至永平府蓋皆為戎地二山傳先君獻武廢二山杜注二山具敖也魯獻公名具武公名敖更以其鄉名山七年咸丘經焚咸丘杜注魯地髙平巨野縣南有咸亭彚纂今屬兖州府今按巨野今屬曹州府榖經榖伯綏來朝杜注穀國在南鄉筑陽縣北彚纂今湖廣襄陽府穀城縣治為故筑陽城古榖城在縣北今按後周改筑陽為榖城鄧經鄧侯吾離來朝彚纂輝例曰鄧國義陽鄧縣今湖廣襄陽府東北二十里有鄧城今按鄧國今河南南陽府西南百二十里鄧州是也地理志南陽郡滕縣故國應劭曰鄧侯國是也晉之義陽郡治新野在今鄧州東南七十里故鄧縣屬之若襄陽府襄陽縣東北二十里之鄧城當時雖仍屬鄧縣别是一地為鄧國之南鄙故一統志以鄧州為鄧侯國以襄陽之鄧城為鄧國地豈楚滅鄧後遷其人於此故有此城與鄧城南八里有鄾城為鄾子國桓九年傳云鄧南鄙鄾人杜謂鄾在鄧縣南河水之北是當時鄾城仍屬鄧縣北望鄧之國都鄾正是其南方之邊鄙非以鄾城在鄧城南八里即謂之南鄙也彚纂因襄陽有鄧鄾二城鄧城即在鄾城北遂舍南陽之鄧州以襄陽之鄧城為鄧國誤矣盟向傳盟向求成于鄭杜注二邑名隱十一年王以與鄭郟傳遷盟向之民于郟杜注郟王城彚纂今河南府洛陽縣西有郟鄏陌亦謂之郟山八年沈鹿傳楚子合諸侯于沈鹿杜注楚地彚纂今湖廣安陸府鍾祥縣東六十里有鹿湖池深不可測即其地也漢傳楚子伐隨軍于漢淮之間疏釋例漢一名沔水出武都沮縣東經漢中魏興至南陽東河經襄陽至江夏安陸縣入江淮傳見上疏釋例淮水出義陽平氏縣桐柏山東北經汝隂淮南譙國沛國下邳至廣陵縣入海黃傳黃隨不㑹杜注黃國今弋陽縣彚纂魏置弋陽郡於此今河南汝寧府光州境弋陽城在州東黃城在州西今按光州今直隸河南速杞傳戰於速杞杜注隨地彚纂傳云軍於漢淮之間當在今湖廣德安府應山縣境九年巴傳巴子使韓服告于楚杜注巴國在巴郡江州縣疏楚子與巴姬埋璧則巴國姬姓彚纂隋改江州為巴縣今屬四川重慶府鄾傳鄧南鄙鄾人杜注鄾在鄧縣南沔水之北彚纂後漢志鄧縣有鄾聚今襄陽府襄陽縣東北鄾城是也今按鄧縣今南陽府鄧州也一統志襄陽縣東北二十里有鄧城鄾城在鄧城南里梁傳虢仲芮伯梁伯荀侯賈伯伐曲沃杜注梁國在馮翊夏陽縣彚纂今西安府韓城縣也古少梁城在縣南二十里疏僖十七年梁嬴以國配嬴則梁為嬴姓僖十九年秦滅梁今按韓城今屬同州府荀傳見上杜注國名疏世本荀賈皆姬姓不知誰滅之晉大夫有荀氏賈氏蓋晉滅之以賜大夫彚纂水經注古水出臨汾西又西南徑荀城在絳州西十五里絳州今屬平陽府今按絳州今為直𨽻州此荀國與郇異地漢書臣瓚引汲郡古文晉武公滅荀以賜大夫原氏黯又姓氏書荀侯晉滅之為公族後逝敖為荀氏則中行氏知氏之祖也賈傳見上杜注國名彚纂今平陽府臨汾縣有賈鄉唐書表云唐叔虞少子公明康王封為賈伯即其地今按姓氏書云曲沃滅之十年桃丘經公㑹衛侯于桃丘弗遇杜注衛地濟北東縣阿縣東南有桃城彚纂今山東東昌府東阿西五十里有桃城鋪旁有一丘髙可數仭即桃丘也今按東阿舊屬兖州府今屬泰安府漢東阿縣本齊之柯邑故城在今兖州府陽榖縣東北後漢分東阿置榖城縣今為東阿縣治與晉時東阿異地故桃城所在亦與昔異向又按杜言桃丘衛地非也今東阿在東平州西北七十里陽榖在州西一百四十里桃城在東阿與陽榖之間舊東阿既為齊之柯而陽榖亦為齊邑則桃丘宜屬之齊去衛逺衛不能有其地虞傳虢公出奔虞杜注虞國在河東大陽縣疏譜云虞姬姓周太王之子太伯之弟仲雍是為虞仲嗣太伯之後武王封虞仲之後處中國為西吳後世謂之虞公僖五年晉滅之彚纂唐改大陽曰平陸屬陜州今屬平陽府解州古虞城在縣東北四十里今按姓氏書仲虞君吳傳簡叔達二世武王求得叔逹之子章因而封之于吳别封叔達一子虞仲于虞歷十二世而併于晉解州今為直𨽻州平陸屬之共池傳虞公出奔共池杜注地名闕彚纂今平陸縣西有共池志云虞公出奔地去縣四十里許與讓畔城相近十一年惡曹經齊人衛人鄭人盟于惡曹杜注地闕折經柔㑹宋公陳侯蔡叔盟于折杜注地闕夫鐘經公㑹宋人于夫鐘杜注郕地彚纂今在兖州府寧陽縣盛鄉城春秋郕國其北有夫鐘里闞經公㑹宋公于闞杜注魯地在東平須昌縣東南彚纂今兖州府汶上縣西有闞亭在南旺湖中二傳楚屈瑕將盟二軫杜注二軫二國名彚纂二國今在隨州應山縣境軫傳見上彚纂今在德安府應城縣西鄖傳鄖人軍于蒲騷將與隨絞州蓼伐楚師杜注鄖國在江夏雲杜縣東南有鄖城彚纂水經注溳水徑安陸故城古鄖城也今為安陸縣屬湖廣德安府蒲騷傳見上杜注鄖邑彚纂今在德安府應城縣北三十里絞傳見上杜注國名彚纂今在鄖陽府西北州傳見上杜注州國在南郡華容縣東南彚纂今荆州府監利縣東三十里有州陵城蓼傳見上杜注蓼國今義陽棘陽縣東南湖陽城彚纂今在河南南陽府唐縣南八十里郊郢傳君次于郊郢以禦四邑杜注楚地彚纂今湖廣安陸府治郢州故城是其地也祭傳祭封人仲足杜注祭鄭地陳留長垣縣東北有祭城彚纂今屬直𨽻大名府今按祭封人仲足之邑當在中牟不在長垣說見隱元年十二年曲池經公㑹杞侯莒子盟于曲池杜注魯地魯國汶陽縣北有曲水亭彚纂今在曲阜縣東北四十里源出石門山今按水經注汶水徑魯國汶陽縣北縣北有曲水池亭汶陽故城在今寧陽縣東北榖丘經公㑹宋公燕人盟于榖丘杜注宋地彚纂今在兖州府曹州北三十里今按曹州今為府地近定陶榖丘或是曹地句瀆之丘傳公及宋公盟于句瀆之丘杜注即榖丘也彚纂漢濟隂郡有句陽縣應邵曰即句瀆之丘也今其地名句陽店虛經公㑹宋公于虛杜注宋地彚纂疑在睢州境龜經公㑹宋公于龜杜注宋地彚纂疑在睢州境武父經公㑹鄭伯盟于武父杜注鄭地陳留濟陽縣東北有武父城彚纂水經注濟陽縣故武父城也今在大名府東明縣西南與河南開封府蘭陽縣接界彭傳伐絞之役楚師分涉于彭杜注彭水在新城昌魏縣疏漢釋例云彭水出新城昌魏縣東北至南鄉筑陽縣入彚纂後漢志房陵有筑水即彭水也故昌魏縣在今湖廣鄖陽府房縣西南羅傳羅人欲伐之杜注熊姓國在宜城縣西山中後徙南郡枝江縣彚纂今襄陽府宜城縣西二十里羅川城乃羅故國其在嶽州府平江縣南三十里之羅城與長沙府湘隂縣接界者是後徙處也楚遷之枝江後漢志枝江侯國本羅國是也又自枝江徙長沙今嶽州府平江縣南三十里有羅城長沙府湘隂縣東六十里亦有羅城乃接境處也十三年賴傳楚子使賴人追之杜注賴國在義陽隨縣彚纂後漢志褎信侯國有賴亭故賴國文獻通考賴國在褎信縣元省縣為鎮今在息縣東北其賴亭則在商城縣南息縣商城皆屬汝寧府光州蓋地相接也杜注在義陽隨縣則去光州甚逺不知何據今按隨縣之厲鄉本厲國杜因字音相近意其即為賴也故誤息縣商城今皆屬光州鄢傳及鄢亂次以濟杜注鄢水在襄陽宜城縣入漢疏釋例鄢水出新城沶鄉縣東南經襄陽至宜城縣入漢彚纂今襄陽府宜城縣南有宜城故城即古鄢國也今按水經注鄢水一名夷水盧戎傳羅與盧戎兩軍之杜注南蠻彚纂即今中盧故城在襄陽府南漳縣東五十里荒谷傳莫敢縊于荒谷羣帥囚于冶父杜注荒谷冶父皆楚地彚纂荆州記州東三里有三湖湖東有水名荒谷今在荆州府冶父傳見上彚纂水經注荒谷東岸有冶父城今冶父城在荆州府東十四年渠門傳楚渠門及大逵杜注渠門鄭城門逵道方九軌牛首傳伐東郊取牛首杜注東郊鄭郊牛首鄭邑彚纂今開封府陳留縣西南十一里有牛首城今按水經注叙沙水所徑有牛首亭俗謂之車牛城在斗城東南盧門傳以大宫之椽歸為盧門之椽杜注宋城門十五年牟經邾人牟人葛人來朝杜注牟國今泰山牟縣彚纂今濟南府東二十里有牟城今按牟非在濟南府東也今牟城在泰安府萊蕪縣東二十里牟汶水在縣南門外彚纂濟南府下脫萊蕪縣三字耳葛經見上杜注葛國在梁國寧陵縣東北彚纂今歸德府寧陵縣有葛城在汴河之南僖十七年傳齊桓公夫人葛嬴則葛國嬴姓今按葛城在寧陵縣北十五里故葛伯國也櫟經鄭伯突入于櫟杜注鄭别都也今河南陽翟縣彚纂今開封府禹州也今按鄭櫟邑秦為陽翟縣明省入鈞州萬厯初改為禹州以禹嘗封於此也在鄭都之西南九十里袲經公㑹宋公衛侯陳侯于袲伐鄭釋文袲昌氏反杜注宋地在沛國相縣西南彚纂有袲亭今在江南鳳陽府宿州今按後漢志注袲一名犖十六年向經城向今按向詳見隱二年此年杜無注宣四年杜注東海承縣東南有向城于欽齊乘謂向城鎮在沂州西南一百里者其地近鄫國當時或屬魯此年城者疑是其地莘傳宣姜與公子朔構急子公使諸齊使賊待諸莘杜注衛地陽平縣西北有莘臺彚纂今東昌府莘縣北莘亭故城是也今按水經注莘亭道厄限蹊要自衛適齊之道也十七年黃經公㑹齊侯紀侯盟于黃杜注齊地彚纂路史登之黃縣東南有古黃城本紀邑後入齊案登州府黃縣齊東垂也去魯殊逺疑非㑹盟處今按登之黃城不惟去魯逺去齊紀亦逺必非其地宣八年公子遂如齊至黃乃復是黃為魯至齊所由之地水經注昌國縣有黃山黃阜近青州府之博興則黃地其在此與趡經公㑹邾儀父盟于趡釋文趡翠軌反杜注魯地彚纂當在今兖州府泗水鄒縣之間奚經及齊師戰于奚杜注魯地彚纂今兖州府滕縣南奚公山下有奚邑水經注夏車正奚仲之國也山上有奚仲冡十八年濼經公㑹齊侯于濼杜注濼水在濟南歷城縣西北入齊彚纂今趵突泉即濼水之源也蓋濟水伏流重發處首止傳齊侯師于首止杜注衛地陳留襄邑縣東南有首鄉彚纂今歸德府睢州即襄邑也首鄉在州東南今按此地宜屬宋莊公元年郱經齊師遷紀郱鄑郚釋文郱蒲丁反鄑子斯反郚音吾杜注紀三邑郱在東莞臨胊縣東南彚纂今屬山東青州府鄑經見上杜注北海都昌縣西有訾城彚纂都昌今青州府昌邑縣也有訾亭社在縣西里郚經見上杜注在朱虛縣東南彚纂今青州府安邱縣西南六十里有郚城今按漢為琅邪郡梧城縣單經單伯送王姬公榖送作逆杜注單伯天子卿也單采地疏單者天子畿內地名今按公榖皆云吾大夫之命乎天子者也諸家多從公榖引莊十四年單伯會齊侯宋公衛侯鄭伯于郢文十五年單伯至自齊為證若單伯為魯大夫則單當是魯地魯有單父邑漢為單縣舊屬兖洲府今屬曹州府當是其地二年於餘丘經公子慶父帥師伐於餘丘杜注國名疏公榖皆以於餘丘為邾之别邑左氏無傳正以春秋之㫖未有伐人之邑而不繫國者此無所繫故知是國釋例注闕不知其地蓋近魯小國也禚經夫人姜氏會齊侯于禚釋文諸若反杜注齊邑彚纂傳定九年齊侯致禚媚杏於衛杜注三邑皆齊西界據此當為齊魯衛分界之地三年酅經紀季以酅入于齊杜注紀邑在齊國東安平縣彚纂今青州府臨淄縣東有安平城又有酅亭今按史記田單傳正義曰安平城在臨淄縣東十九里古紀之酅邑也然則酅邑甚近齊又疑東十九里或是九十里與夀光縣相近紀國在夀光縣東南也滑經公次于滑杜注鄭地在陳留襄邑縣北彚纂今歸德府睢州有滑亭四年溠傳令尹鬬祈莫敖屈重除道梁溠釋文溠側嫁反杜注溠水在義陽厥縣西東南入鄖水疏釋例義陽厥西有漈水源出縣北從縣西東南至隨縣入鄖水杜以漈解溠蓋聲相近而字轉耳彚纂今在德安府隨州東南今按水經注溠水出隨縣西北黃山南徑㵐縣西又東南徑隨縣故城西隨縣即今隨州漢汭傳且請為㑹于漢汭而還杜注汭內也謂漢西今按漢汭者漢水入江之處今漢陽府漢陽縣是也五年郳經郳犂來來朝杜注附庸國也東海昌慮縣東北有郳城疏郳之上世出於邾國譜云小邾邾挾之後也夷父顔有功於周其子友别封為附庸居于郳曾孫黎來始見春秋從齊桓尊周室王命為小邾子彚纂今昌慮城在兖州府滕縣東南六十里郳城在縣東六里今按又詳僖七年小邾七年榖經夫人姜氏㑹齊侯于榖杜注齊地今濟北榖城縣彚纂今兖州府東阿縣治故榖城是也今按此榖即齊桓公封管仲邑東漢分東阿置榖城縣今為泰安府東阿縣治姓氏書謂榖為姬姓國齊滅之八年葵丘傳齊侯使連稱管至父戍葵丘杜注齊城臨淄縣西有地名葵丘彚纂據後漢志西安縣有蘧丘里亦名渠丘即古葵丘也今青州府臨淄縣西三十里有西安故城葵丘在其處今按水經注西安縣之渠丘時水所徑齊西之葵丘系水所徑則是二地京相璠曰葵丘在臨淄西五十里若渠丘在西安者齊公孫無知邑昭十一年杜别有注合葵丘為一非也姑棼傳齊侯逰于姑棼杜注齊地彚纂即薄姑也今青州府博興縣東北十五里有薄姑城今按又見昭九年貝丘傳遂田于貝丘杜注齊地樂安博昌縣南有地名貝丘彚纂今青州府博興縣南有貝中聚九年蔇經公及齊大夫盟于蔇杜注魯地琅邪繒縣北有蔇亭彚纂今在兖州府嶧縣東八十里故繒城乾時經及齊師戰于乾時杜注齊地時水在樂安縣界支流旱則涸竭故曰乾時彚纂今樂安故城在青州府博興縣北時水在縣南今按又見襄三年耐洙經浚洙杜注洙水在魯城北下合泗疏釋例曰洙水出魯縣東北西南入洸水下流合泗今按水經注云泗水西南徑魯縣北分為二北為洙瀆南則泗水洙泗之間夫子領徒之所生竇傳殺子糾于生竇杜注魯地彚纂史記作笙瀆賈逵曰句瀆也今兖州府曹州北有句陽古城即句瀆故地今按曹州今為府堂阜傳及堂阜而說之杜注齊地東莞蒙隂縣西北有夷吾亭或曰鮑叔解夷吾縛於此因以為名彚纂今堂阜在青州府蒙隂縣西北今按水經注有堂阜水蒙隂今改屬沂州府十年長勺經公敗齊師于長勺杜注魯地彚纂路史曰成王以商民六族錫魯公有長勺氏尾勺氏此商民所居也宿經宋人遷宿今按宿國本在東平州今邳州宿遷縣疑宋人所遷又鳳陽府宿州地亦屬宋豈後又遷之與郎經齊師宋師次于郎今按今郎近魯國都說見隱元年乘丘經公敗宋師于乘丘杜注魯地彚纂西漢泰山郡有乘丘縣顔師古曰即春秋乘丘也括地志乘丘在瑕丘縣西北三十五里今兖州府滋陽縣西有古瑕丘城今按公子偃自雩門竊出蒙臯比先犯宋師可知乘丘去魯城不逺若曹縣界內有乘丘城去魯逺且其地本漢之濟隂郡乘氏縣非乘丘應邵謂敗宋師在此一統志因之誤矣莘經荆敗蔡師于莘杜注楚地彚纂在今河南汝寧府汝陽縣境談經齊師滅談杜注談國在濟南平陵縣西南彚纂今濟南府歷城縣東南七十里有談城雩門傳公子偃自雩門竊出杜注魯南城門今按水經注魯南門亦曰雩門門南隔水有雩壇十一年鄑經公敗宋師于鄑杜注魯地彚纂當在今兖州府境與元年在都昌西者乃二地十二年蒙澤傳宋萬弒閔公于蒙澤杜注宋地梁國有蒙縣彚纂今河南歸德府商丘縣北有蒙澤縣南二十五里有蒙縣古城蕭傳羣公子奔蕭杜注宋邑沛國蕭縣彚纂今縣屬江南徐州縣北十里有蕭城今按今縣屬徐州府又按此年傳蕭叔大心孔疏云宋蕭邑大夫以此年有功宋人以蕭邑别封其人為附庸又見定十一年亳傳公子御說奔亳杜注宋邑蒙縣西北有亳城彚纂今商丘縣北有大蒙城皇甫謐所謂蒙為北亳是也今按大蒙城在商丘縣北四十里水經注汳水東徑大蒙城北疑即蒙亳也所謂蒙亳為北亳十三年北杏經齊侯宋人陳人蔡人邾人會于北杏杜注齊地彚纂當在今兖州府東阿縣境遂經齊人滅遂杜注遂國在濟北蛇邱縣東北今按水經注云蛇邱縣北無城今遂城在蛇邱西北彚纂今兖州府寧陽縣西北三十里有遂鄉與濟南府肥城縣接界陳氏深曰遂國舜之後柯經公㑹齊侯盟于柯杜注此柯今濟北東阿齊之柯邑猶柷柯今為祝柯彚纂今兖州府東阿縣地今按東阿今屬泰安府十四年鄄經單伯㑹齊侯宋公衛侯鄭伯盟于鄄釋文鄄音絹杜注衛地今東郡鄄城彚纂今山東東昌府濮州東二十里舊城集故鄄城也今按濮州今屬曹州府大陵傳鄭厲公自櫟侵鄭及大陵杜注鄭地彚纂今河南開封府臨潁縣北十里有大陵城今按水經注潁川臨潁縣東北二十五里有巨陵亭古大陵也臨潁縣今屬許州府鄭南門傳內蛇與外蛇鬬于鄭南門中今按水經注南門即時門十六年滑經滑伯杜注滑國都費河南緱氏縣釋文費扶味反又音祕彚纂今河南河南府偃師縣南二十里有緱氏故城古滑國也今按滑姬姓又謂之費滑幽經同盟于幽杜注宋地彚纂當在今河南歸德府考城縣境夷傳晉武公伐夷執夷詭諸杜注夷詭諸周大夫夷采地名今按此年晉伐夷取其地文六年晉搜于夷即此地十八年濟西經公追戎于濟西今按此隱二年盟于潛之戎戎城在曹縣濟水之西權傳楚武王克權杜注國名南郡當陽縣東南有權城彚纂水經注沔水東㑹權口南流徑權城北古之權國也今屬湖廣安陸府今按水經原文云沔水又東石會權口注云權水出章山東南流徑權城北古之權國東南有那口城權水東入于沔那處傳遷權于那處杜注楚地南郡編縣東南有那口城彚纂今在安陸府荆門州東南涌傳閻敖游涌而逸杜注涌水在南郡華容縣今按東漢華容縣今荆州府監利縣地水經注江水又東至華容縣又東涌水注之春秋所謂閻敖游涌而逸者也在今監利縣南十九年津傳大敗于津杜注楚地或曰江陵縣有津鄉彚纂今在荆州府枝江縣黃傳遂伐黃杜注嬴姓國今戈陽縣今按一統志古黃國在河南光州定城廢縣西十二里踖陵傳敗黃師于踖陵杜注黃地彚纂當在今河南汝寧府光州西南境今按光州今為直𨽻州湫傳還及湫杜注南郡鄀縣東南有湫城彚纂今在湖廣襄陽府宜城縣夕室傳鬻拳葬諸夕室杜注地名溫傳出奔溫杜注溫蘇氏邑今按隱十一年桓王以溫與鄭此時仍為周大夫蘇氏之邑二十年燕傳執燕仲父杜注燕仲父南燕伯疏譜亦云南燕伯爵不知所出二十一年弭傳胥命于弭杜注鄭地彚纂當在今河南府禹州密縣境今按密縣今屬許州府圉門傳鄭伯將王自圉門入今按洛陽東南有圉鄉圉門其以此名與虎牢傳王與之武公之略自虎牢以東杜注鄭武公傳平王王與之自虎牢以東後失其地故惠王今復與之虎牢河南成臯縣今按見隱元年制蚌傳虢公為王宫于蚌杜注虢地彚纂在今河南河南府澠池縣界酒泉傳王與之酒泉杜注周邑彚纂今陜西西安府同州有甘泉出匱谷中造酒尤美名酒泉今按同州今升為府附郭大荔縣周既東遷關中之地非周有此酒泉疑别一地二十三年扈經公㑹齊侯盟于扈杜注鄭地在熒陽卷縣西北彚纂後漢志卷縣有扈城亭今開封府原武縣西北扈亭是也今按原武縣今屬懷慶府二十五年聚傳乃城聚而處之杜注晉邑二十六年徐經公㑹宋人齊人伐徐杜注見僖三年絳傳士蒍城絳以深其宫杜注絳晉所都今平陽絳邑縣今按曲沃武公自曲沃徙都于絳即漢之絳縣今絳州之北平陽府太平縣之南二十五里杜此注與成六年新田同未確說見新田二十七年洮經公㑹杞伯姬于洮杜注魯地彚纂今東昌府濮州南五十里有洮城亦作桃水經注云洮城亦曰桃城因桃墟而得名也今按杞國都淳于莊公㑹杞伯姬安得至濮州㑹之杜於昭七年李孫與謝息桃注云魯國卞縣東南有桃墟蓋桃即洮也卞縣今為兖州府泗水縣泗水在曲阜東伯姬自杞來故㑹之城濮經公㑹齊侯于城濮杜注衛地今按說見僖一十八年二十八年郿經築郿公榖皆作微杜注郿魯下邑彚纂京相璠曰夀張西北三十里有故微鄉魯邑也今兖州府東平州西有微鄉城今按夀張故城在東平州州今屬泰安府大戎傳晉獻公取二女于戎大戎狐姬生重耳杜注唐叔子孫别在戎狄者彚纂當在今陜西延安府境今按太原閻若璩著四書釋地云吾府交城縣為狄地舅犯實生於其地余向久遊寓其父子兄弟合為祠廟祭賽甚盛非同他志乘之傅㑹然則舅犯為狐突之子即大戎人其地在交城今山西太原府交城縣在府西南一百二十里本漢晉陽縣之西境非延安府境也小戎傳小戎子生夷吾杜注允姓之戎今按昭九年傳允姓之姦居于瓜州其地在今陜西肅州西五百餘里獻公豈至此娶女杜說誤小戎者大戎之别其地當亦近交城耳驪戎傳晉伐驪戎驪戎男女以驪姬杜注在京兆新豐縣其君姬姓其爵男彚纂今陜西西安府臨潼縣東二十四里有驪戎城今按水經注戲水出麗山東北流北徑驪戎城東蒲傳蒲與二屈君之疆也杜注蒲今平陽蒲子縣彚纂今山西平陽府隰州東北有蒲子故城今按隰州在平陽府西北二百八十里春秋時蒲地今直𨽻山西又有蒲縣亦晉蒲城地二屈傳見上杜注二屈今平陽北屈縣或云二當為北彚纂今平陽府吉州東北二十一里有北屈故城今按吉州在平陽府西二百七十里今直𨽻山西北屈一縣不得言二屈韋昭云屈有南北今河東有北屈則是時復有南屈水經注引汲郡古文曰翟章救鄭次于南屈應邵曰有南故加北桔柣之門傳入于桔柣之門杜注鄭逺郊之門純門傳衆車入自純門杜注鄭外郭門逵市傳及逵市杜注郭外道上市桐丘傳鄭人將奔桐丘杜注詩昌縣東北有桐丘城彚纂今許昌故城在開封府許州東北四十里今按許昌今許州府水經注云洧水東南徑桐丘城今與城而有堤去許昌故城可三十五里二十九年諸經城諸及防杜注諸防皆魯邑諸今城陽縣今按青州府有諸城縣古諸邑也樊傳樊皮叛王杜注樊皮周大夫樊其采地今按樊見隱十一年桓王雖以與鄭此時仍為周采邑三十年鄣經齊人降鄣杜注紀附庸國東平無鹽縣東北有鄣城疏釋例曰劉賈依二傳以為紀之遺邑計紀侯去國至此二十七年則邑不得獨存蓋附庸小國若邿鄟者也彚纂今東平州東六十里有鄣城集即鄣故城也今按紀小國不得有附庸此因昭十九年傳有紀鄣而誤也紀鄣莒邑與此鄣非一地魯濟經公及齊侯遇于魯濟杜注濟水歷齊魯界在齊界為齊濟在魯界為魯濟蓋魯地疏釋例曰濟水自滎陽卷縣東經陳留至濟隂北極髙平東平至濟北東北經濟南至樂安傳昌縣入海今按濟水自梁山東又北經須朐城西又北經微鄉東又北經須昌縣西其地皆在今東平州魯地也是所謂魯濟自東阿清亭又北則為榖城齊地矣山戎經齊人伐山戎杜注山戎北狄今按國語云桓公北伐山戎刜令支斬孤竹韋昭云二國山戎所居按令支今直𨽻永平府撫寧縣故令支城在盧龍縣孤竹今永平府灤州當時山戎伐燕燕告急於齊故桓公伐之見史記胸奴傳燕傳以其病燕故也杜注今薊縣今按此北燕見襄二十八年三十一年郎經築臺于郎今按此郎當為隱九年近魯郊之郎此郎臺據公羊傳即泉臺文十六年有蛇自泉宫出入于國如先君之數因聲姜薨毁泉臺公羊云泉臺者郎臺也未成為郎臺既成為泉臺是郎臺即泉臺也蛇自泉宫出而入國則泉臺在郎其地近國都可知薛經築臺于薛杜注魯地彚纂今兖州府滕縣東南有薛城今按薛國在滕縣南四十里魯豈築臺於其國當是魯地有名薛者耳秦經築臺于秦杜注東平范縣西北有秦亭彚纂今在東昌府范縣南三里今按范縣今屬曹州府三十二年小榖經城小榖傳為管仲也杜注小榖齊邑濟北榖城縣城中有管仲井榖梁傳范寧注小榖魯邑彚纂程氏迥曰齊地别有榖在濟北有管仲井非小榖也今按齊之榖今為東河縣見莊七年夫人姜氏㑹齊侯于榖又莊二十三年公及齊侯遇于榖僖二十八年公以楚師伐齊取榖文十七年公及齊侯盟于榖成五年叔孫僑如會晉荀息于榖哀二十七年傳齊師違榖七里皆齊榖若此年小榖自是魯地曲阜西北有故小穀城項羽嘗為魯公漢髙帝以魯公禮葬項王榖城是也昭十一年楚申無宇曰齊桓公城榖而置管仲趙氏鵬飛曰此年偶有城小榖之事左氏遂取無宇之言合之杜氏因以小榖為榖城其說是梁丘經宋公齊侯遇于梁丘杜注髙平昌邑縣西南彚纂今兖州府城武縣東北三十里有梁丘山山南三十里有梁丘城今按齊有大夫梁丘據蓋以邑為氏城武今屬曹州府莘傳有神降于莘杜注虢地今按一統志河南府盧氏縣虢之莘地盧氏今屬陜州稷門傳能投蓋于稷門杜注魯南城門逵泉傳歸及逵泉而卒杜注魯地彚纂今兖州府曲阜縣南五里逵泉是也閔公元年落姑經公及齊侯盟于落姑杜注齊地彚纂在今兖州府東平州平隂縣界今按平隂縣今屬秦安府耿傳以滅耿滅霍滅魏杜注平陽皮氏縣東南有耿鄉三國皆姬姓彚纂今山西平陽府河津縣東南有古耿城一名耿鄉城今按殷祖乙圯于耿即此河津縣今屬絳州霍傳見上杜注永安縣東北有霍大山彚纂今平陽府霍州西十六里有霍城古霍國也今按霍國文王子叔處所封二年陽經齊人遷陽杜注國名疏世本無陽國不知何姓杜世族譜土地名闕不知所在彚纂今青州府沂水縣有陽都城即陽國也今按沂水縣今屬沂州府水經注沂水南徑陽都縣故城東縣故陽國城今在沂水縣西南按姓氏書謂召康公之後為陽伯齊滅之犬戎傳虢公敗犬戎于渭汭杜注犬戎西戎别在中國者今按穆天子傳天子至于雷首犬戎胡觴天子于雷首之阿雷首山在今山西蒲州府其對河為陜西華隂渭水入河之處是犬戎在渭汭渭汭傳見上杜注渭水出隴西東入河水之隈曲曰汭疏釋例渭水出隴西狄道縣烏鼠同穴山東南經南安天水洛陽扶風始平京兆至𢎞農華隂縣入河今按渭水出今陜西臨洮府渭源縣西烏鼠山東至同州府華隂縣東北入河渭汭者渭水入河之處禹貢渭汭亦同謂汭為水名者非也密傳莒人歸之及密杜注魯地琅邪費縣北有密如亭今按水經注沂水南徑東安縣故城東而南合時密水水出時密山莒人歸共仲于魯及密而死是也東安故城在今沂水縣東南夷傳齊人取而殺之于夷杜注魯地滎澤傳及狄人戰于滎澤杜注此滎澤當在河北疏禹貢沇水入于河溢為滎是滎在江南此時衛都河北故知此滎澤當在河北彚纂與鄭州之滎澤不同共滕傳益之以共滕之民杜注共及滕衛别邑曹傳立戴公以廬于曹杜注衛下邑疏當在河東近楚丘今按詩作漕通典滑州白馬縣衛漕邑戴公廬于曹即此今在河南衛輝府滑縣南二十里白馬城是也清傳鄭人為之賦清人今按清邑名杜氏云中牟縣西有清陽亭水經注以清陽亭即清人城詩清人在彭當是此地中牟縣在開封府西七十里臯落氏傳晉侯使大子申生伐東山臯落氏杜注赤狄别種臯落其氏族今按一統志山西太原府樂平縣東七十里有臯落山一名靈山有東山臯落氏之墟漢臯落因山以名按樂平近潞安府是赤狄地夷儀見僖元年楚丘見僖二年僖公元年聶北經齊師宋師曹師次于聶北救邢杜注郉地彚纂今東昌府聊城縣東北有聶城齊之西界近郉地也今按聶城本作攝又見昭二十年聊攝夷儀經邢遷于夷儀杜注郉地彚纂今直𨽻順德府邢臺縣西有夷儀城元和志云在縣西一百四十里俗訛為隨宜城是也柳經公會齊侯宋公鄭伯曹伯邾人于柳杜注宋地陳國陳縣西北有柳城彚纂陳縣今開封府陳州州境有犖城即柳城也今按水經注謂柳小城在陳郡西南非西北柳在陳州則其地當屬陳非宋地陳侯不與㑹蓋畏楚也陳州今為府犖傳盟于犖謀救鄭也杜注犖即柳也地有二名今按水經注謂之潦城偃經公敗邾師于偃彚纂當在兖州府費縣南虛丘傳公敗邾師于偃虛丘之戍將歸者也杜注邾地疏服䖍云虛丘魯地彚纂當在兖州府費縣界酈經公子友帥師敗莒師于酈杜注魯地汶陽田傳公賜季友汶陽之田及費杜注汶陽田汶水北地汶水出泰山萊蕪縣西入濟疏釋例汶水出泰山萊蕪縣西南經濟北至東平須昌縣入濟彚纂定十年齊人歸鄆歡龜隂田三邑皆汶陽也其地今兖州府寧陽縣境今按水經注蛇水出岡縣東北泰山西流徑汶陽之田齊所侵也自汶之北平暢極目元和志汶陽故城在龔丘縣東北五十四里其城側土田沃饒故魯為汶陽之田龔丘今寧陽也縣本魯闡邑闡見哀八年費傳見上今按費音祕今山東沂州府費縣也故城在今費縣西北二十里今之費治祊城此費與隱元年費不同于欽齊乘謂伯國姬姓魯懿公之孫後為季氏邑與費伯之費合為一非也懿公孫見隱元年郎二年楚丘經城楚丘傳諸侯城楚丘而封衛焉杜注衛邑彚纂朱子詩經集注楚丘在滑州今直𨽻大名府滑縣東六十里隋衛南廢縣即古楚丘城也此楚丘之在北者與戎伐凡伯之地不同今按隋初置楚丘縣後改衛南縣金省入白馬縣明又省入滑縣故楚丘在滑滑縣今改屬河南衛輝府下陽經虞師晉師滅下陽公榖作夏陽杜注下陽虢邑在河東大陽縣彚纂今大陽廢縣在山西平陽府平陸縣東北十五里又三十里為故下陽城今按平陸縣漢為大陽縣東漢置河北縣唐改平陸今屬解州又按虢以國都為上陽故謂河北稍在下者為下陽公榖作夏陽音同傳訛耳夏有大義漢