body:
  text: 春秋地理考實卷二婺源江永撰文公元年綿訾傳衛孔逹侵鄭伐綿訾及匡今案綿訾杜無注傳言伐綿訾及匡則綿訾當與匡相近匡在開州長垣縣衛有訾婁故邑見僖十八年在今滑縣而滑縣與長垣接界則訾宜即訾婁始為邢人所取後則屬之鄭耳綿當别一地亦近匡匡傳見上杜注在潁川新汲縣東北彚纂今開封府扶溝縣西有匡城今案扶溝今屬陳州府以傳考之此年之匡非扶溝之匡也八年晉侯使解陽歸匡戚之田于衛注謂匡本衛邑中屬鄭孔逹伐不能克今晉令鄭還衛及取戚田皆見元年案此則匡與戚相近之邑也一統志大明府開州長垣縣西南十五里有匡城即論語子畏於匡之地隋嘗改長垣為匡城今長垣在開州南一百五十里開州之帝丘當時衛所都而戚城即在開州城北七里故匡與戚本皆衛邑八年晉歸戚田並令鄭歸匡田耳若扶溝之匡去衛逺衛不能有其地杜注誤扶溝之匡為鄭邑見定六年戚經公孫敖會晉侯于戚杜注衛邑在頓丘衛縣西彚纂今大名府開州北七里有古戚城二年彭衙經晉侯及秦師戰于彭衙杜注馮翊郃陽縣西北有彭衙城彚纂在今西安府白水縣東北六十里漢於此置衙縣今按周莊王時秦伐彭戲氏至於華山即此地白水縣今屬同州府垂隴經公孫敖會宋公陳侯鄭伯晉士榖盟於垂隴杜注鄭地滎陽縣東有隴城彚纂京相璠曰滎陽東二十里今在開封府滎澤縣東北汪傳取汪及彭衙而還今案汪當近彭衙三年沈經叔孫得臣會晉人宋人陳人衛人鄭人伐沈杜注國名汝南平輿縣北有沈亭彚纂今河南汝寧府汝陽縣東南六十里有平輿故城沈亭在其地今案汝陽縣今屬汝州王官傳秦伯伐晉濟河焚舟取王官及郊杜注晉地彚纂今平陽府臨晉縣東南七十里王官谷有廢壘即王官城也今按臨晉分屬蒲州府又水經注河東左邑縣西有王官城洓水徑其北故晉人絶秦之辭云伐我洓水俘我王官是王官近洓水也左邑今絳州聞喜縣王官蓋在臨晉之東聞喜之西史記正義引括地志王官故城在同州澄城縣西北六十里非也是時秦師已渡河則王官不得在河西澄城之王官名同而非其地郊傳見上杜注晉地彚纂史記取王官及鄗正義曰鄗音郊當為臨晉平陽間小邑茅津傳遂及茅津濟杜注在河東大陽縣西彚纂今平陽府平陸縣有大陽渡即春秋茅津也有古茅城南對陜州今案古虞國地漢為大陽縣今屬解州水經注陜北對茅城故茅亭亭茅戎邑也津亦取名焉四年邧傳晉侯伐秦圍邧新城杜注秦邑彚纂當在今澄城縣境今按澄城今屬同州府新城傳見上杜注秦邑彚纂今西安府澄城縣東北二十里有古新城地名考曰即梁國之新里也五年六經楚人滅六杜注六國今廬江六縣彚纂今在江南廬州府六安州北今案六安州今為直𨽻州蓼傳楚子燮滅蓼杜注蓼國今安豐縣彚纂今河南汝寧府固始縣東北有蓼城岡其地即古蓼國漢蓼縣今案固始縣今屬河南光州寧傳晉陽處父聘於衛反過寧杜注晉邑汲郡修武縣彚纂今河南衛輝府獲嘉縣西北有修武故城古寧邑秦置縣今案韓詩外傳武王伐紂勒兵於寧改寧曰修武今懷慶府修武縣也衛輝府之獲嘉縣與之接境亦修武地漢武帝置獲嘉縣東魏又置西修武皆寧地周既改寧為修武矣而猶稱寧蓋後又復舊名也衛有寧氏為世卿似食邑于此獲嘉近衛則寧當屬衛又見定元年六年夷傳晉搜于夷杜注晉地今案見莊十六年董傳改搜于董杜注河東汾隂縣有董亭彚纂汾隂今絳州屬平陽府有董澤在聞喜縣東北四十里接絳州界見宣十二年郫傳趙孟使殺諸郫杜注晉地彚纂博物記垣縣有邵郫之厄今懷慶府濟源縣西一百里有郫亭唐置邵原縣於此與山西垣曲縣接界今案又見襄二十三年郫邵七年郚經遂城郚杜注魯邑卞縣南有郚城彚纂今在兖州府泗水縣南董隂傳及董隂杜注晉地刳首傳敗秦伯於令狐至于刳首杜注令狐在河東當與刳首相接彚纂令狐今平陽府猗氏縣地水經注刳首在西三十里當在今滎河臨晉間也今案滎河臨晉今皆屬蒲州府扈經公會諸侯晉大夫盟於扈杜注鄭地滎陽卷縣西北有扈亭今案詳見莊二十三年八年申傳自申至于虎牢之竟杜注鄭地彚纂當在鄭州泛水縣界武城傳秦人伐晉取武城今案漢馮翊郡有武城縣顔師古云即秦伐晉取武城者也當在今陜西同州府境暴經公子遂會雒戎盟于暴杜注鄭地彚纂路史曰暴辛公采地一曰暴隧今案又見成十五年暴隧九年狼淵傳楚子師于狼淵以伐鄭杜注潁川潁隂縣有狼陂彚纂寰宇記謂之狼溝潁隂即今開封府許州今案許州今為府附郭設石梁縣壺丘傳楚侵陳克壺丘杜注陳邑彚纂當在今開封府陳州南境今按水經注壺丘城在新蔡縣故城東南今屬汝寧府當時為陳之南鄙而地不在陳州十年少梁傳晉人伐秦取少梁杜注馮翊夏陽縣彚纂今西安府韓城縣南二十里有少梁城今按韓城今屬同州府北徵傳秦伯伐晉取北徵彚纂路史北徵古徵國漢置徵縣今西安府澄城縣西南二十里有北徵古城今案釋文徵如字又引三蒼云音懲一統志云後誤徵為澄澄城今屬同州府范傳楚范巫矞似杜注矞似范邑之巫今案楚有大夫范山范當是其食邑商傳使為商公杜注楚邑上雒商縣彚纂隋改商州今屬西安府今案商契始封之地商州今直𨽻陜西疑楚成王時楚地未能至商州其使子西為商公或是商密之地見僖二十五年渚宮傳王在渚宮杜注小洲曰渚疏渚宮當郢都之南女栗經及蘇子盟于女栗杜注地名闕厥貉經楚子蔡侯次於厥貉杜注地名闕彚纂當在陳州項城縣今案項城今屬陳州府孟諸傳遂道以田孟諸杜注宋大藪也在梁國睢陽縣東北彚纂今歸德府商邱縣東北有孟諸澤虞城縣北有孟諸臺今案又詳僖二十八年孟諸之麋期思傳期思公復遂為右司馬杜注今弋陽期思縣彚纂期思古蔣國楚滅之漢置縣屬汝南郡隋屬光州兵亂後廢今在固始縣西北七十里麇傳厥貉之會麇子逃歸今案麇國杜無注今湖廣鄖陽府治鄖縣古麇國也又見明年錫穴十一年防渚傳成犬心敗麇師於防渚杜注麇地彚纂闞駰曰防即防陵也今為房縣屬湖廣鄖陽府錫穴傳潘崇復伐麇至于錫穴釋文錫音羊或作錫星歷反杜注麇地彚纂漢錫縣屬漢中郡師古曰即春秋錫穴也隋唐宋皆屬均州明成化中始為鄖陽府治今因之今案鄖陽府治鄖縣也承筐經叔仲彭生會晉郤缺于承筐杜注宋地在陳留襄邑縣西彚纂今歸德府睢州西三十里有故筐城鹹經叔孫得臣敗狄於鹹杜注魯地鄋瞞傳鄋瞞伐齊杜注狄國名防風之後漆姓子駒之門傳埋其首於子駒之門杜注魯郭門長丘傳以敗狄于長丘杜注宋地彚纂今開封府封丘縣東有長邱亭今案水經注濟水徑封邱縣南燕縣之延鄉於春秋為長周首傳埋其首於周首之北門杜注齊邑濟北榖城縣東北有周首亭彚纂水經注謂之盧子城今在東阿縣東北近長清縣界今案東阿今屬泰安府長清屬濟南府耐門傳宋公以門賞耐斑使食其征謂之耐門今案宋城門名夫鍾傳郕大子朱儒自安於夫鍾杜注郕邑今案已見桓十一年十二年郕邽傳大子以夫鍾與郕邽來奔杜注郕邽亦邑今案郕國在兖州府寧陽縣二邑當近其地巢經楚人圍巢杜注吳楚間小國廬江六縣有居巢城彚纂今廬州府巢縣巢湖寰宇記云古居巢城陷處羣舒傳羣舒叛楚杜注羣舒偃姓舒庸舒鳩之屬廬江有舒城舒城西南有龍舒疏世本偃姓舒庸舒蓼舒鳩舒龍舒鮑舒龔彚纂今廬州府舒城廬江二縣之境皆羣舒地宗傳子孔執舒子平及宗子杜注宗巢二國羣舒之屬河曲經晉人秦人戰於河曲杜注在河東蒲坂縣南彚纂今平陽府蒲州城外東南隅有蒲坂故城今案蒲州今為府附郭設永清縣河曲者河南流至華隂曲而東流河曲當在其間竹書紀年秦穆公帥師送公子重耳涉自河曲是也羈馬傳秦伯伐晉取羈馬杜注晉邑彚纂今蒲州南三十六里有羈馬城一名涉丘今案一統志陜西同州郃陽縣有羈馬城謂秦取羈馬在此非也秦取晉邑當在河東故晉人禦之戰于河曲羈馬不得在河西成十三年傳云俘我王官翦我羈馬蓋秦遷其民於河西是以澄城亦有王官郃陽亦有羈馬耳鄆經季孫行父帥師城諸及鄆杜注城陽姑幕縣南有員亭員即鄆也彚纂今青州府沂水縣北鄆城是此為東鄆成四年城鄆為西鄆乃在東平州今按沂水今屬沂州府諸見莊二十九年十三年瑕傳晉侯使詹嘉處瑕以守桃林之塞今按十二年秦復侵晉入瑕及此年之瑕説見僖三十年焦瑕桃林傳見上杜注桃林在𢎞農華隂縣東潼關彚纂地理通釋云自潼關至函谷關歷陜華二州之地俱謂之桃林塞今陜西華隂縣以東河南靈寶縣以西皆是也今案桃林即武王放牛之處水經注引晉地道記桃林在閿鄉南谷中閿鄉縣今屬河南陜州諸浮傳晉六卿相見於諸浮杜注晉地疏當是城外近地繹傳邾文公卜遷于繹杜注邾邑魯國鄒縣北有繹山疏邾都本在鄒縣鄒縣北有繹山徙都於彼山旁山旁當有舊邑邾既遷都於此竟內别有繹邑宣十年公孫歸父帥師伐邾取繹取彼之别邑也彚纂今在兖州府鄒縣東南山陽有邾城今案嶧山在鄒縣南二十二里沓經公如晉衛侯會公於沓杜注地闕棐經公還自晉鄭伯會公于棐杜注鄭地彚纂即棐林路史開封宛陵有棐林林鄉宛陵故城今屬開封府新鄭縣縣東二十五里林鄉城是其地也今案又見宣元年棐林十四年新城經同盟於新城杜注宋地在梁國榖熟縣西彚纂今歸德府商邱縣西南舒蓼傳子孔潘崇將襲羣舒使公子燮與子儀守而伐舒蓼杜注即羣舒今案見十二年又見宣八年廬傳廬戢黎及叔麇誘之杜注今襄陽中廬縣今案一統志云中廬城在襄陽府城南漢為縣隋改曰次廬宋省入南漳今城趾在南漳縣東五十里十五年堂阜傳飾棺置諸堂阜杜注齊魯竟上地今按見莊九年句鼆傳一人門於句鼆杜注魯邑戾丘傳一人門于戾丘杜注魯邑十六年郪丘經公子遂及齊侯盟于郪丘杜注齊地彚纂當在東昌府東阿縣境今案東阿今屬泰安府舊屬兖州府東平州非東昌府也是年公使公子遂納賂于齊侯因及齊侯盟于郪丘其地當近國都豈逺至東阿而與之盟乎公羊作犀丘榖梁作師丘公羊疏作災丘未知孰是泉臺經毁泉臺今案傳有蛇自泉宮出入于國如先君之數因聲薑薨而毁泉臺是泉臺在國外也公羊云泉臺者即臺也未成為郎臺既成為泉臺未知是否築臺于郎見莊三十一年阜山傳楚大飢戎伐其西南至于阜山彚纂湖廣鄖陽府房縣南五十里有阜山大林傳師於大林又伐其東南至於陽丘以侵訾枝杜注大林陽丘訾枝皆楚邑彚纂湖廣荆門州西北有長林城今案荆門州屬安陸府舊有長林縣以長林為大林未知是否陽丘傳注見上訾枝傳注見上彚纂莊子云堯伐叢枝即訾枝也庸傳庸人帥羣蠻以叛楚杜注今上庸縣屬楚之小國今案庸國今鄖陽府竹山縣及竹溪縣也秦置上庸縣百濮傳麇人率百濮聚於選將伐楚杜注百濮夷也疏釋例建寧郡南有濮夷無君長總統各以邑落自聚故稱百濮今案牧誓彭濮人孔傳濮在江漢之間是也晉建寧故城在今湖廣荆州府石首縣當時麇人所率百濮在其南又張平子蜀都賦云於東則左綿巴中百濮所充注云今巴中七姓有濮此又别一濮蓋百濮之散處者耳選傳見上杜注楚地彚纂當在荆州府枝江縣南境阪髙傳楚人謀徙於阪髙杜注楚險地彚纂當在襄陽府西境句澨傳次於句澨杜注楚西界地彚纂當在襄陽府均州西方城傳及庸方城杜注庸地上庸縣東有方城亭彚纂今鄖陽府竹山縣東四十五里有方城是也今案此與僖四年方城異地一統志云方城在竹山縣東三十里又名庸城山上平地四靣險固圍護如城陘隰傳先君蚡冒所以服陘隰也杜注地名疏釋例陘隰與僖四年次於陘為一地潁川召陵縣南有陘亭楚自武王始居江漢之間則蚡冒之時未至中土不應已能越申息服潁川之邑疑非也彚纂荆州府東多溪山之險故名裨鯈魚傳唯裨鯈魚人實逐之杜注庸三邑魚魚復縣今巴東永安縣彚纂四川夔州府奉節縣即古魚復縣以縣東魚復浦得名蜀漢曰永安臨品傳會師於臨品杜注地名彚纂當在襄陽府均州界石溪傳子越自石溪子貝自仭以伐庸杜注石溪仭入庸道仭傳注見上彚纂當在均州界十七年鯈傳將悉敝賦以待於鯈杜注晉鄭之竟邥垂傳周甘歜敗戎於邥垂釋文邥於審反杜注周地河南新城縣北有垂亭彚纂服虔曰邥垂在髙都南今河南府洛陽縣地今案水經注引杜預釋地河南新城縣有邥垂亭此注脫一邥字十八年申池傳公遊於申池杜注齊南城西門名申門齊城無池唯此門左右有池疑此則是彚纂郡國志謂之左右池即泉水源也今青州府臨淄縣西四裔傳舜流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦螭魅杜注渾敦謂歡兜窮竒謂共工檮杌謂鯀按叨餮杜不言三苖缺也疏舜典云流共工于幽州放歡兜於崇山竄三苖於三危殛鯀於羽山孔安國云幽州北裔崇山南裔三危西裔羽山東裔在海中今案括地志故龔城在檀州燕樂縣界故老傳云舜流共工幽州在此地今順天府密雲縣東北塞外地崇山舊在湖廣澧州慈利縣慈利在州西一百六十里慈利西一百八十里明設永定衛今改置永定縣屬澧州崇山在其縣三危詳昭元年三苖羽山詳昭七年宣公元年平州經公會齊侯于平州杜注齊地在泰山牟縣西彚纂今萊蕪縣西有平州城屬濟南府今按萊蕪今屬泰安府濟西經齊人取濟西田杜注故曹地僖三十一年晉文以分魯棐林經宋公陳侯衛侯曹伯會晉師於棐林伐鄭杜注鄭地滎陽宛陵縣東南有林鄉彚纂今林鄉城在新鄭縣東二十五里屬開封府北林傳楚為賈救鄭遇於北林杜注滎陽中牟縣西南有林亭在鄭北彚纂今屬開封府今案水經注林亭去新鄭故城四十許里蓋以南有林鄉亭故謂之北林崇經晉趙穿帥師侵崇杜注崇秦之與國今案殷之崇侯虎國在今陜西西安府鄠縣東雖已滅後又别封崇國也二年大棘經戰於大棘杜注在陳留襄邑縣南彚纂今河南歸德府睢州州西曲棘里有棘城又寧陵縣西南七里有大棘城亦與睢相近今案曲棘與大棘當是二地史記梁孝王世家正義引括地志大棘在寧陵縣西南七十里非七里焦傳遂圍焦杜注晉河外邑彚纂括地志陜縣有故焦城今在河南府陜州城內今案陜州今直𨽻河南又僖三十年注與此小異實一地也隂地傳遂自隂地及諸侯之師侵鄭杜注晉河南山北自上洛以東至陸渾彚纂上洛今西安府洛南縣陸渾今河南府嵩縣其地南阻終南北臨大河所謂河南山北也又河南府盧氏縣東北有隂地城今案盧氏今屬河南府陜州隂地當以盧氏隂地城為是哀四年蠻子赤奔晉隂地人云使謂隂地之命大夫士蔑是隂地自有其邑首山傳宣子田于首山舍于翳桑杜注首山在河東蒲坂縣東南彚纂即首陽山今在平陽府蒲州東南今案蒲州今為府括地志雷首山西起雷首東至吳坂長數百里隨地異名通典云有八名歷山首陽山薄山襄山甘棗山中條山渠豬山獨頭山也翳桑傳見上杜注桑之多蔭翳者今案當是首山間地名桃園傳趙穿攻靈公於桃園三年雒傳楚子伐陸渾之戎遂至於雒觀兵於周疆杜注雒水出上洛冡領山至河南鞏縣入河今案上洛陜西商州也鞏縣屬河南府古洛口在鞏縣近世乃過開封府之泛水縣北入河周疆傳見上今案水經注王城東南門名曰鼎門蓋九鼎所從入也故謂是地為鼎中楚子問鼎於此然則楚子觀兵於周疆而問鼎在王城東南鼎中之地逼近王城矣郟鄏傳成王定鼎於郟鄏杜注今河南也今按郟鄏王城今洛陽縣西河南故城是也城西有郟鄏陌京相璠曰郟山名鄏邑地也郔傳晉侯伐鄭及郔杜注鄭地今案十二年楚子北師次於郔杜注鄭北地與此一地也近邲在鄭州南里傳誘子華而殺之南里杜注鄭地彚纂襄二十六年楚子伐鄭入南里當即此葉傳及葉而死杜注楚地南陽葉縣彚纂今南陽府葉縣南陽三十里有古葉城四年郯經公及齊侯平莒及郯彚纂國名漢置郯縣地理志故郯國也今為郯成縣屬兗州府故郯城在縣西南境今按郯城今屬沂州府向經公伐莒取向杜注莒邑東海承縣東南有向城逺疑也彚纂古承縣在今嶧縣西一里去莒縣逺寰宇志莒州南七十里有向城參會道里差為近之今州屬青州府今按向本近莒之國隱二年莒人入向遂為莒邑于欽齊乘謂向城鎮在沂州西南一百里即承縣東南之向城轑陽傳周伯嬴於轑陽而殺之彚纂漢武帝延和二年封江喜為轑侯即此蒸野傳遂處蒸野將攻王杜注楚邑漳澨傳師于漳澨杜注漳水邊疏釋例漳水出新城洂鄉縣南至荆山東南經襄陽南郡當陽縣入沮彚纂至當陽縣東南五十里與沮水合名合溶渡當陽今屬湖廣安陸府皋滸傳楚子與若敖氏戰於皋滸杜注楚地彚纂路史英六二軫皆皋地皋陶之所封也後皆屬楚今案此釋恐未確鄖傳若敖娶於鄖杜注國名彚纂通典鄖或作鄖今湖廣德安府安陸縣有鄖城古鄖國也今案安陸德安府治夢中傳鄖夫人使棄諸夢中杜注夢澤名江夏安陸縣東南有雲夢城彚纂今德安府雲夢縣治是也今案書地理今釋云漢書地理志南郡華容縣雲夢澤在南荆州藪編縣有雲夢宮又江夏郡西陵縣有雲夢宮水經注雲杜縣東北有雲夢城又夏水東徑監利縣南縣土卑下澤多陂陀西南自州陵東界徑於雲杜沌陽為雲夢之藪杜預去枝江縣安陸縣有雲夢蓋跨川互隰兼包勢廣矣元和志雲夢澤在安陸縣南五十里又云雲夢澤在雲夢縣西七里漢華容今荆州府石首監利二縣地編縣今安陸府荆門州西陵今黃州府蘄州及黃岡麻城二縣雲杜今安陸府京山縣州陵今安陸府沔陽州沌陽今漢陽府漢陽縣枝江今屬荆州府安陸雲夢今屬德安府然則東抵蘄州西抵枝江京山以南青草以北皆為古之雲夢正義所謂雲漢一澤而每處有名者也今見昭三年江南之夢定四年雲中又一統志雲夢縣北有於莬鄉蓋棄令尹子文之處六年邢丘傳赤狄伐晉圍懷及邢丘杜注河內平皋縣彚纂今懷慶府河內縣東南七十里有平皋故城七年萊經公會齊侯伐萊杜注萊國今東萊黃縣彚纂今屬山東登州府縣東南二十里有萊子城向隂傳赤狄侵晉取向隂之禾今案河南懷慶府濟源縣西南有向城向隂其在此與黑壤經公會晉侯宋公衛侯鄭伯曹伯于黑壤彚纂今山西澤州沁水縣西北四十里黑嶺周宇文泰改為烏嶺寰宇記云即春秋晉黑壤也黃父傳盟於黃父杜注即黑壤八年黃經公子遂如齊至黃乃復今案説見桓十七年垂經仲遂卒于垂彚纂當在兗州府平隂縣境今案平隂今屬泰安府舒蓼經楚人滅舒蓼傳楚為羣舒叛故伐舒蓼滅之杜注舒蓼二國名疏舒蓼二國名者蓋轉寫誤當為一國名釋例土地名有舒羣舒舒蓼舒庸舒鳩以為五名則與文五年滅蓼同蓋蓼滅後更復故楚今更滅之劉炫以杜為一國而規之非也彚纂今廬州府廬江縣故舒城是也今案杜於文十四年注云舒蓼即羣舒此言二國非也然二國亦非轉寫之誤劉炫規之不得謂其非此舒蓼與文五年之蓼不同彼蓼在安豐此舒蓼在舒城疏合為一亦誤滑汭傳楚子疆之及滑汭杜注滑水名彚纂當在今廬州府東境吳傳盟吳越而還杜注吳國今吳郡疏譜云吳姬姓周大王之子大伯仲雍之後大伯無子而卒仲雍嗣之武王封其曾孫周章於吳為吳子又别封章弟虞仲於虞自大伯五世而得封十二世而晉滅虞虞滅而吳始大至夀夢而稱王夀夢以上世數可知而不紀其年夀夢元年魯成公之六年夫差十五年獲麟之嵗也二十三年魯哀公之二十二年而越滅吳彚纂吳郡隋蘇州宋置平江郡升平江府元改府為路明曰蘇州府今仍之越傳見上杜注越國今會稽山隂縣疏譜云越姒姓其先夏后少康之庶子也封於會稽自號於越於者夷言發聲也濵在南海不與中國通後二十餘世至於允常魯定公五年始伐吳允常卒子句踐立是為越王越王元年魯定公之十四年魯哀公二十二年句踐滅吳霸中國春秋後七世為楚所破遂微弱矣外傳曰芈姓歸越是越本楚之别封或非夏后之後彚纂隋置吳州尋改越州宋髙宗升為紹興府今仍之平陽經城平陽杜注今泰山有平陽縣彚纂今濟南府新泰縣西北四里平陽故城是也今案新泰今屬泰安府九年根牟經取根牟杜注東夷國也今琅邪陽都縣有牟鄉彚纂今在青州府沂水縣南今案路史根牟曹姓子爵魯宣公滅之又案昭八年大搜於紅自根牟至于商衛革車千乘杜注根牟魯東界彚纂謂在沂水縣南者是也沂水今屬沂州府若青州府安丘縣西南十五里有牟山隋嘗於此置牟山縣後改安丘在青州府東二百里其地非屬莒即屬齊必非魯所取之國魯大搜陳車乘亦必不能至此樂史寰宇記謂根牟國在安丘誤顧炎武引樂史説不能辨正亦疏栁棼傳鄭伯敗楚師於栁棼杜注鄭地十年繹經公孫歸父帥師伐邾取繹杜注與文十三年同彚纂今嶧山在鄒縣東南二十里蓋縣治徙山北也嶧與繹通潁北傳逐楚師於潁北杜注潁水出河南陽城至下蔡入淮疏釋例潁水出河南陽城縣陽乾山東南經潁川汝隂至淮南下蔡縣入淮彚纂案水經云潁水出潁川陽城縣西北少室山又東南過陽翟縣北酈氏注云潁水又徑上棘城西左傳楚師伐鄭城上棘以涉潁者也潁水又徑陽翟縣故城北陽翟今禹州潁北當在禹州之北十一年辰陵經楚子陳侯鄭伯盟於辰陵杜注陳地潁川長平縣東南有辰亭彚纂今開封府陳州西南四十里有辰陵亭故長平城在州西北六十里今案陳州今為府水經注云今辰亭在長平城西北長平城在東南或杜氏之謬誤耳郔傳楚左尹子重侵宋王待諸郔杜注楚地彚纂當在開封府項城縣境今案項城今屬陳州府沂傳令尹蒍艾獵城沂杜注楚邑彚纂當在汝寧府真陽縣境今按真陽今改正陽欑函經晉侯會狄於欑函杜注狄地栗門傳轘諸栗門杜注陳城門夏州傳鄉取一人焉以歸謂之夏州杜注州鄉屬示討夏氏所得也彚纂史記楚考烈王元年秦取夏州即此地理通釋云大江中州也今在湖廣武昌府江夏縣今案夏州蓋在北岸江漢合流之間其後漢水遂有夏名而夏之名義更廣説見昭四年夏汭十二年皇門傳入自皇門今案鄭城門知傳知莊子曰今案荀首為知氏蓋食采於知史記正義云故智城在蒲州虞鄉縣西北四十里古今地名云解縣有智城虞鄉今屬蒲州府解縣今為解州郔傳楚子北師次于郔杜注鄭北地今案見宣三年沈傳沈尹將中軍杜注沈或作寢寢縣也今汝隂固始縣今案固始今屬河南光州沈者令尹孫叔敖食邑也邲經晉荀林父帥師及楚子戰於邲杜注鄭地彚纂今開封府鄭州東六里有邲城今按水經注邲在敖北濟水至此有邲名管傳次於管以待之杜注滎陽縣東北有管城彚纂隋置縣明初省今故城在鄭州北二里敖鄗傳晉師在敖鄗之間杜注二山在滎陽縣西北彚纂滎陽今開封府滎澤縣縣西北有敖山今案元和志敖山在滎澤縣西十五里鄗疑是邑名滎澤傳及滎澤杜注在滎陽縣東今按此即禹貢濟水溢為滎者也今無水滎陽人猶謂其處有滎澤爭舟處傳中軍下軍爭舟今案水經注爭舟之處在卷縣北卷縣故城在今懷慶府原武縣北唐傳告唐惠侯杜注屬楚之小國義陽安昌縣東南有上唐鄉今按晉義陽安昌縣今河南南陽府鎮平縣也又今南陽府唐縣本唐之唐州蓋亦古之唐國董澤傳董澤之蒲杜注澤名河東聞喜縣東北有董池陂彚纂今屬平陽府清丘經晉人宋人衛人曹人同盟於清丘杜注衛地在濮陽縣東南彚纂唐置清丘縣在今大名府開州東南七十里長樂里十三年清傳赤狄伐晉及清杜注一名清原今案清原見僖三十一年十四年晏傳見晏桓子彚纂濟南齊河縣西北二十里有晏城寰宇記謂之晏嬰城十五年潞氏經晉師滅赤狄潞氏杜注赤狄之别種疏狄有赤狄白狄就其赤白之間各自别有種類謂之赤白其義未聞蓋其俗尚赤衣白衣也彚纂今山西潞安府潞城縣即其地也縣東北四十里有古潞城黎氏傳棄仲章而奪黎氏地杜注黎侯國上黨壺關縣有黎亭彚纂今潞安府長治縣西三十里黎侯亭是也又山東東昌府范縣有黎侯城則黎侯失國寓衛時所居之地今案潞安府之長治壺關皆黎國地潞子奪之又有黎城縣在潞安東北本漢潞縣地隋始置縣一統志云黎侯城在縣東北十八里晉立黎侯即此曲梁傳晉荀林父敗赤狄於曲梁杜注今廣平曲梁縣也彚纂今曲梁故城在直𨽻廣平府永年縣東北輔氏傳秦桓公伐晉次於輔氏杜注晉地彚纂今陜西西安府朝邑縣西北十三里有輔氏城今案朝邑今屬同州府稷傳晉侯治兵于稷杜注晉地河東聞喜縣西有稷山彚纂隋置稷山縣今屬平陽府縣南五十里有稷神山山下有稷亭即晉侯治兵處今按稷山縣今屬絳州雒傳及雒杜注晉地瓜衍傳亦賞土伯以瓜衍之地彚纂孝義縣北十里有瓜城屬山西汾州府無婁經仲孫蔑會齊髙固于無婁杜注杞邑彚纂案公羊作牟婁蓋即隱四年莒人伐杞所取之邑此時已為莒邑矣杜注疑有誤十六年甲氏留吁經晉人滅赤狄甲氏及留吁杜注赤狄别種彚纂案胡氏注留吁赤狄之殘邑晉滅赤狄甲氏留吁遂為晉邑謂之純留水經注云絳水經屯留故城即故留吁國也今山西潞安府屯留縣南十三里純留故城是也鐸辰傳及留吁鐸辰杜注留吁之屬彚纂當在潞安府境十七年斷道經公會晉侯衛侯曹伯邾子同盟於斷道杜注晉地彚纂今山西沁州西有斷梁城卷楚傳盟於卷楚杜注即斷道野王傳晉人執晏弱於野王杜注野王縣屬河內彚纂今為懷慶府治苖傳苖賁皇使見晏桓子杜注賁皇食邑於苖地今按詳見襄二十六年十八年蜀傳楚於是有蜀之役杜注魯地泰山西北有蜀亭彚纂在今濟南府泰安州西今案泰安州今為府笙經歸父還自晉至笙杜注魯竟也今案莊九年殺子糾於生竇史記作笙瀆賈逵曰句瀆也今曹州府北有句陽古城笙地其在此與成公元年赤棘經臧孫許及晉侯盟於赤棘杜注晉地茅戎經王師敗績於茅戎杜注戎别種彚纂水經注大陽縣有茅亭故茅戎邑也括地志茅戎在河北縣西二十里當在今平陽府平陸縣界今按公榖史記俱作貿戎古音相近也文三年茅津亦在此平陸今屬解州本漢河東郡大陽縣地東漢置河北縣唐改平陸徐吾氏傳敗績於徐吾氏杜注茅戎之别也疏是茅戎之內聚落之名二年龍傳齊侯伐我北鄙圍龍杜注魯邑在泰山博縣西南今按水經注汶水南徑博縣故城東又西南徑龍鄉故城南博縣在今泰安府泰安縣新築經衛孫良夫帥師及齊師戰於新築杜注衛邑彚纂史記趙成侯及魏惠王遇于葛築或云即新築也今大名府魏縣南二十里有新築城巢丘傳遂南侵及巢丘今按杜無注當近龍在泰安縣界鞫居傳次於鞫居杜注衛地彚纂後漢志封丘有鞫亭即古鞫居也今按封丘縣屬開封府鞍經及齊侯戰于鞍杜注齊地彚纂榖梁曰鞍去齊五百里杜氏通典云鞍在平隂縣東今平隂去臨淄五百里似與榖梁合矣然以左傳考之自始合以至齊敗止為一日之事華不注在濟南城北去平隂二百三十里何以一奔而遽止乎近志云鞍即古之歷下似為得之莘傳師從齊師于莘杜注齊地靡筓傳六月壬申師至於靡筓之下杜注山名彚纂史記晉平公元年伐齊戰於靡下徐廣曰靡當作歷志曰歷山即左傳所謂靡筓之山也今名千佛山在濟南府南十里今按戰於鞍鞍在歷城傳云六月壬申師至於靡筓之下癸酉師陳於鞍則靡筓與鞍非一地史記戰於靡下當作歷下然遂以靡筓為歷山恐非金史云長清有劘筓山劘筓當即靡筓長清縣在濟南府西南七十里山在其縣晉師從西來正與壬申癸酉差一日相合當以金史為是華不注傳齊師敗績逐之三周華不注杜注山名彚纂伏琛云不音跗與詩鄂不韡韡之不同謂花蒂也言此山孤秀如華跗之著於水也今在濟南府城北今按水經注華不注山在歷城東孤峰特立華泉傳丑父使公下如華泉取飲彚纂京相璠曰華不注山下泉水也徐關傳遂自徐關入彚纂今淄川縣有古徐關石窖傳子之石窖杜注邑名濟北盧縣東有地名石窖彚纂隋初為盧縣之長清鎮尋置長清縣今仍之古城在縣東南三十里丘輿傳晉師從齊師入自丘輿擊馬陘杜注皆齊邑彚纂丘輿當在益都縣界馬陘傳注見上彚纂在今益都縣西南今按又詳見襄二十九年弇中袁婁經及國佐盟於袁婁榖梁作爰婁云爰婁去國五十里彚纂張氏洽曰臨淄縣西有袁婁或曰在淄川境上鄍傳公會晉師于上鄍杜注地闕彚纂當在陽榖縣境蓋齊衛境上之邑也陽橋傳楚侵及陽橋杜注魯地彚纂陸澄曰博縣有陽橋今在泰安州西北今按今泰安縣地三年伯牛傳諸侯伐鄭次於伯牛杜注鄭地鄤傳使東鄙覆諸鄤杜注鄭地今按諸侯東侵鄭鄭公子偃使東鄙覆諸鄤則鄤在鄭之東水經注成皋有鄤水成皋在鄭之西北宜非此鄤地丘輿傳敗諸丘輿杜注鄭地棘經叔孫僑如帥師圍棘杜注汶陽田之邑在濟北蛇丘縣彚纂劉昭曰蛇丘縣有棘鄉季氏私考曰今當為肥城縣地今按蛇丘在今泰安府肥城縣南水經注汶水又西溝水注之溝水西南流徑棘亭南引此年圍棘云棘亭南去汶水八十里四年鄆經城鄆今按家氏鉉翁曰鄆有三莒之别邑亦曰鄆九年楚人入鄆是也魯自有二鄆文十二年城諸及鄆此東鄆莒魯所爭者也成十六年公待於鄆此西鄆今此所城者西鄆注見十六年展陂傳許人敗諸展陂杜注許地彚纂今在許州西北今按許州今為府鉏任泠敦傳鄭伯伐許取鉏任泠敦之田彚纂俱在許州境汜祭傳晉伐鄭取汜祭杜注汜祭鄭地成皋縣東有汜水疏知非中牟襄城之汜而以成皋有汜水者以傳為晉取當是鄭之西北界即今之汜水也字書水旁巳為汜水旁巳為汜字相亂也今汜水上源為汜谷彚纂此為二邑汜即成皋之汜祭即中牟之祭亭周祭伯之邑也蓋此時已入於鄭矣今按汜本音凡今汜水縣音祀矣此謂中牟之祭為周祭伯之邑與隱元年注異此祭疑是管城之祭五年榖經叔孫僑如會晉荀首於榖杜注齊地今按見莊七年梁山經梁山崩杜注在馮翊夏陽縣北彚纂詩奕奕梁山水經注河水又南徑梁山原是也夏陽今同州韓城縣屬西安府今按韓城今屬同州府詩之梁山非此梁山説見僖二十四年韓蟲牢經同盟於蟲牢杜注鄭地陳留封邱縣北有桐牢彚纂今桐牢亭在開封府封邱縣北三里六年鄟經取鄟杜注附庸國蠻氏傳晉伯宗伊雒之戎陸渾蠻氏侵宋杜注蠻氏戎别種也河南新城縣東南有蠻城彚纂漢志河南新城縣曰蠻中故蠻之國也今按汝州西南有蠻中聚即戎蠻子國又見昭十六年故絳傳晉人謀去故絳杜注晉復命新田為絳故謂此為故絳今按詳莊二十六年絳郇瑕傳必居郇瑕氏之地杜注郇瑕古國名河東解縣西北有郇城彚纂僖二十四年咎犯與秦晉大夫盟於郇即此今按郇瑕二邑皆在解故曰郇瑕氏杜以為一國非也郇説見僖二十四年瑕説見僖三十年盬傳沃饒而近盬杜注鹽也猗氏縣鹽池是疏盬河東鹽池袤五十一里廣七里盬雖是鹽唯此地之鹽别名為盬也今按猗氏今屬蒲州府新田傳不如新田又晉遷於新田杜注平陽絳邑縣是今按晉既遷新田又命新田為絳水經注謂之絳陽在絳澮之陽南對絳山面背二水括地志新田在絳州曲沃縣南二里今之曲沃縣南也近世太原閻若璩考之曰余親往其地土人呼王官城距故晉城五十里杜氏長於地志之學乃於莊二十六年城絳及此年新田皆注云平陽絳邑縣豈竟為一地乎果為一地不應將遷新田之時名獻公所居曰故絳此説是今考晉之絳縣其故城在今曲沃縣南昭八年杜注虒祁宮在絳西四十里臨汾水今虒祁在曲沃縣西則新田在晉時之絳邑此年注本不誤誤在莊二十六年之注未確耳又案閻氏謂土人呼王官城此王官與文三年成十三年之王官不同澮傳有汾澮以流其惡杜注澮水出平陽絳縣南西入汾繞角傳晉樂書救鄭與楚師遇於繞角楚師還晉師遂侵蔡杜注鄭地彚纂杜佑通典汝州魯山縣東南有繞角城今按繞角在汝州之魯山當是蔡地非鄭地桑隧傳楚公子申公子成以申息之師救蔡禦諸桑隧杜注汝南朗陵縣東有桑里在上蔡西南今按上蔡屬汝寧府朗陵故城在確山縣西南七年馬陵經同盟於馬陵杜注衛地陽平元城縣東南有地名馬陵彚纂隋開皇六年析元城縣地置馬陵縣大業初省今直𨽻大名府治東南十五里有馬陵城州來經吳入州來杜注楚邑淮南下蔡是也彚纂哀二年蔡昭侯自新蔡遷於州來謂之下蔡漢置下蔡縣今夀州北三十里有蔡國城今按夀州屬鳳陽府申呂傳子重請取于申呂以為賞田今按王應麟地理通釋云國語史伯曰當成周者南有申呂漢地理志南陽宛縣申伯國詩書及左氏解不言呂國所在史記正義引括地志云故呂城在鄧州南陽縣西徐廣云呂在宛縣水經注亦謂宛西呂城四嶽受封然則申呂漢之宛縣也案宛縣即今南陽府治南陽縣申見隱元年八年渠丘傳申公巫臣假道於莒與渠丘公立於池上杜注渠丘邑名莒縣有遽里今按此莒之渠邱與齊渠丘異地九年楚子重伐莒圍渠丘即此渠丘也非安丘之渠丘九年蒲經同盟于蒲今按見桓三年銅鞮傳執諸銅鞮杜注晉别縣在上黨今按又見昭二十八年渠丘傳楚子重伐莒圍渠丘彚纂漢北海安丘縣孟康曰古渠丘也晉地道記曰安丘有渠丘亭今屬青州府今按安丘之渠丘屬齊非莒邑也又見莊八年渠丘昭十一年渠丘鄆經楚人入鄆杜注莒别邑也中城經城中城杜注魯邑在東海廩丘縣西南今按晉東海郡有厚丘今海州泳陽縣厚丘在縣北六十里魯地當不能至此而山東東昌府之范縣古廩丘為齊地皆非此經城中城所在榖梁云城中城者非外名也則是魯城之內城耳蓋城其內城則內城以外之民竟外之故非之范注云譏公不務德政恃城以自固不復能衛其人民是也以為邑名誤矣定六年城中城同十年修澤傳子然盟于修澤杜注滎陽卷縣東有修武亭彚纂今在開封府原武縣北今按水經注濟水自滎澤東徑滎陽卷縣之修武亭左傳鄭子然盟於修澤者也桑田傳召桑田巫杜注晉邑今按見僖二年十一年鄄傳王使劉子復之盟於鄄而入杜注周邑鄇田傳晉郤至與周爭鄇田杜注鄇溫别邑河內懷縣西南有鄇人亭彚纂今在懷慶府武陟縣檀傳與檀伯逹封于河彚纂周邑今在懷慶府十二年瑣澤經公會晉侯衛侯於瑣澤杜注地闕今按公羊作沙澤定七年盟於沙傳作瑣公羊亦作沙澤與此年同則瑣澤即沙也注見定七年交剛經晉人敗狄於交剛杜注地闕今按此年之狄白狄也交剛當在河東之地與河西延安府相近十三年費滑傳殄滅我費滑杜注滑國都於費今緱氏縣彚纂水經注休水徑延夀城南緱氏縣治故費滑也今河南府偃師縣南二十里有緱氏故城洓川傳伐我洓川杜注洓水出河東聞喜縣西南至蒲坂入河彚纂今平陽府蒲州東北二十六里有洓水城今按蒲州今為府附郭置永濟縣箕郜傳入我河縣焚我箕郜今按萁説見僖三十二年郜杜無注姓氏書郜分南北南後入晉當是此郜地當近河麻隧傳晉師以諸侯之師及秦師戰于麻隧杜注秦地彚纂在西安府涇陽縣南涇傳師遂濟涇杜注涇水出安定東南經扶風京兆髙陸縣入渭疏釋例曰涇水出安定朝那縣西東南經新平扶風至京兆髙陸縣入渭彚纂漢志涇水出幵頭山在今陜西平涼府西南三十里侯麗傳及侯麗而還杜注秦地彚纂劉伯莊云在涇陽縣境新楚傳迓晉侯于新楚杜注秦地彚纂當在西安府同州朝邑縣境今按朝邑今屬同州府瑕傳成肅公卒于瑕杜注晉地今按水經注河東解縣西南有故瑕城解縣今解州詳見僖三十年訾傳公子班自訾求入于大宮杜注鄭地今按鄭公子班奔許而自訾求入則訾當在鄭南别一地非文元年綿訾之訾十五年暴隧傳楚子侵鄭及暴隧彚纂鄭地路史曰暴辛公采地一曰暴隧周圻內邑是時為鄭所有新石傳鄭子罕侵楚取新石杜注楚邑彚纂當在南陽府裕州葉縣境睢傳出舍于睢上杜注水名今按在歸德府鐘離經會吳于鐘離杜注楚邑淮南縣彚纂晉成帝置鐘離郡唐置鐘離縣明改為臨淮縣又析臨淮地置鳳陽縣今仍之屬江南鳯陽府今按鳯陽府治也十六年武城傳楚子自武城今按見僖六年汝隂傳以汝隂之田求成于鄭杜注汝水之南近鄭地汋陂傳宋將鉏樂懼敗諸汋陂杜注宋地夫渠傳退舍于夫渠杜注宋地汋陵傳敗諸汋陵杜注宋地彚纂今歸德府寧陵縣南二十五里有汋陵城鳴雁傳衛侯伐鄭至於鳴雁杜注在陳留雍丘縣西北彚纂後漢志雍丘有鳴雁亭今白雁亭在杞縣北四十里屬開封府鄢陵經戰于鄢陵杜注鄭地今屬潁川郡彚纂案鄢陵與鄢一地也鄢妘姓之國為鄭武公所滅初仍其故名後改為鄢陵耳今按鄢見隱元年瑕傳楚師還反瑕杜注楚地彚纂水經注肥水徑山桑縣故城南又東積而為陂謂之瑕陂又東南徑瑕城南春秋楚師還及瑕即此城也山桑縣在今夀州蒙城縣此屬鳳陽府今按楚師自鄢陵還荆州不當回逺由今之蒙城水經注誤也桓六年楚武王侵隨使薳章求成軍于瑕以待之當是此瑕邑蓋在今德安府隨州沙隨經公會晉侯齊侯衛侯宋華元邾人于沙隨杜注宋地梁國寧陵縣北有沙隨亭彚纂今沙隨亭在寧陵縣西六里屬歸德府壞隤傳公出于壞隤杜注魯邑督揚傳我師次于督揚杜注鄭東地彚纂案襄十九年諸侯自沂上盟于督揚杜以督揚即祝阿蓋齊之督揚與此不同制田傳諸侯遷于制田杜注滎陽宛陵縣東有制澤彚纂今制城在開封府新鄭縣東北鳴鹿傳以諸侯之師侵陳至於鳴鹿杜注陳國武平縣西南有鹿邑彚纂今鹿邑縣西南有古鹿邑城屬歸德府今按東漢置武平縣隋改鹿邑縣潁上傳諸侯遷于潁上今按潁水之上也今江南潁州府有潁上縣隋置苕丘經晉人執季孫行父舍之於苕丘杜注晉地鄆傳公還待于鄆杜注魯西邑東郡廩丘縣東有鄆城彚纂隋開皇十八年改為鄆城縣今屬兖州府濟寧州今按水經注京相璠曰東郡廪丘縣東八十里有故運城即此城也廪丘隋省入鄆城今改屬曹州府之濮州十七年虛滑傳鄭子駟侵晉虛滑杜注晉二邑滑故滑國為秦所滅時屬晉後屬周髙氏傳衛北宮括侵鄭至於髙氏杜注在陽翟縣西南彚纂今禹州即陽翟縣也屬開封府今按禹州今屬許州府州有髙氏亭戲童傳諸侯伐鄭自戲童至于西洧彚纂襄九年諸侯盟于戲即此也水經注曰泛水出浮戲之山今泛水縣屬開封府曲洧傳見上杜注今新汲縣治曲洧城臨洧水疏釋例云洧水出滎陽密縣西北陽城山東南至潁川長平縣入潁彚纂漢宣帝神爵三年以許縣之汲鄉置新汲縣以河內有汲縣故稱新汲也金置洧川縣今仍之屬開封府柯陵經同盟于柯陵杜注鄭西地汝上傳楚公子申救鄭師于汝上疏釋例云汝水出南陽魯縣大蓋山東北至河南梁縣東南經襄城潁川汝南至汝隂襄信縣入淮彚纂汝水出汝州魯山縣成十六年楚以汝隂之田求成於鄭國語齊桓公伐楚濟汝踰方城則汝上蓋鄭楚之界也貍脤經公孫嬰齊卒于貍脤杜注闕洹傳聲伯夢涉洹杜注洹水出汲郡林慮縣東北至魏郡長樂縣入清水彚纂今林縣西北林慮山洹水所出也屬河南彰德府今按後周分臨彰界置洹水縣後省入大名成安今大名府魏縣古洹水也清傳使國勝告難于晉待命于清杜注陽平樂平縣是彚纂今東昌府堂邑縣東南有清城今按前漢東郡清縣後漢改為樂平隋置堂邑縣此為齊之東境邑蓋齊將討國佐使其子國勝告難於晉因使待命於境上之邑不欲其近國都也東昌彚纂誤作青州今改正舒庸傳舒庸人以楚師之敗也杜注東夷國今按此亦羣舒也蓋在今廬州府巢駕釐虺傳道吳人圍巢伐駕圍釐虺杜注楚四邑彚纂今俱在廬州府境十八年曹門傳鄭伯侵宋及曹門外杜注宋城門朝郟傳遂會楚子伐宋取朝郟杜注宋邑彚纂當在夏邑境城郜傳楚子辛鄭皇辰侵城郜杜注宋邑彚纂當在徐州蕭縣境幽丘傳取幽丘杜注宋邑彚纂當在蕭縣界彭城傳同伐彭城杜注宋邑今彭城縣彚纂項羽都此謂之西楚晉立徐州唐宋元沿革不一明初復為徐州今直𨽻江南省今按徐州今升為府附郭設銅山縣台谷傳晉侯師于台谷以救宋杜注地闕靡角傳遇楚師于靡角之谷杜注宋地虛朾經同盟于虛朾杜注宋地彚纂或云即宋之虛也襄公元年瓠丘傳置諸瓠丘杜注晉地河東東垣縣東南有壺丘彚纂案壺丘亦曰陽壺寰宇志曰古陽壺城南臨大河今絳州垣曲縣東南陽壺城是也屬平陽府今按垣曲今屬絳州鄫經次于鄫杜注鄭地在陳留襄邑縣東南今按襄邑今歸德府睢州故鄫城在州南洧上傳敗其徒兵于洧上杜注洧水出密縣東南至長平入潁彚纂長平在今西華縣屬開封府今按西華今屬陳州府水經注洧水徑新鄭故城中此洧上蓋近鄭都之地呂留傳楚子辛侵宋呂留杜注二縣今屬彭城郡彚纂案呂縣留縣漢屬楚國後漢及晉屬彭城國泗水至呂城積石為梁故曰呂梁徐州北五十里有呂梁城水經注濟水過沛縣東北又東南過留縣北漢張良遇漢髙祖於留即此地也呂縣隋廢留縣唐廢今俱在徐州境今按皆在徐州府犬丘傳鄭子然侵宋取犬丘杜注譙國酇縣東北有犬丘城迂回疑彚纂案犬丘地不近鄭故杜以為疑然是時楚方侵宋取呂留鄭蓋為楚取也今歸德府永城縣西北三十里有犬丘集今按此酇縣在永城音嵯二年東陽傳晏弱城東陽以逼之杜注齊境上邑彚纂今東陽城在青州府臨朐縣東三年鳩兹傳楚子重伐吳克鳩兹至于衡山杜注鳩兹吳邑在丹陽蕪湖縣東彚纂今蕪湖縣東四十里有鳩兹港是也屬江南太平府衡山傳見上杜注在吳興烏程縣南彚纂案烏程乃湖州府附郭縣也去蕪湖甚逺今太平府當塗縣東北六十里有橫山似為近之今按鎮江府丹陽縣亦有衡山今名橫山顧炎武疑即此地駕傳吳人伐楚取駕今按見成十七年長樗經公及晉侯盟于長樗杜注晉侯出其國都與公盟於外疏近城之地雞澤經同盟於雞澤杜注在廣平曲梁縣西南彚纂後漢志曲梁侯國有雞澤即春秋諸侯同盟處也今曲梁故城在直𨽻廣平府東北今按隋於廣平舊縣城置雞澤縣今屬東平府耐傳乃盟于耐外杜注水名彚纂耐水即時水也平地出泉曰耐今按水經注時水出齊城西南二十五里平地出泉即如水也澠水出營城東北徑博昌南界入時水自下通謂之澠又東北至廣饒故城北入淄水齊乘又名耐水又京相璠曰今臨淄唯有澅水西北入沛即地理志如水耐如聲相近然則澅水即耐水蓋以澅與時合得通稱矣又見莊九年乾時曲梁傳亂行于曲梁今按即雞澤地國語雞澤作難丘曲梁作屈梁四年繁陽傳楚師猶在繁陽杜注楚地在汝南鮦陽縣南彚纂今汝寧府新蔡縣北有繁陽亭今按鮦陽之鮦孟康本音紂紅反陸氏釋文引孟康音紂直又反是刪紅反二字而改其音誤矣釋文又云一音童或音直勇反非按鮦為鱧魚今亦有直勇反之音蓋以舌頭呼則音童以舌上呼則紂紅反轉上聲則直勇反皆各隨其方音唯音紂者非蒲圃傳季孫為已樹六檟於蒲圃東門之外杜注場圃名今按定八年陽虎將享季氏于蒲圃即此無終傳無終子嘉父使孟樂如晉杜注山戎國名彚纂秦置無終縣項羽封韓廣為無終王都無終即今順天府玉田縣也縣西有古無終城今按顧炎武曰無終為今之玉田無可疑者然此年無終子使孟樂如晉因魏莊子納虎豹之皮以請和諸戎昭元年晉中行穆子敗無終及羣狄於太原漢書樊噲傳擊陳豨破得綦毋邛尹潘軍於無終廣昌則去玉田千有餘里豈無終之國先在雲中代郡之境後始遷右北平與按顧氏此説是也廣昌即今之廣昌縣漢屬代郡唐為蔚州飛狐縣明復改廣昌屬大同府蔚州今改屬直𨽻保定府易州去玉田之無終逺而史合言之蓋舊時無終之地近廣昌也晉自中行吳敗狄之後漸擴代北之地其後趙氏盡得代地而無終之國乃在右北平猶之昭十二年晉滅肥為漢之真定肥纍縣而遼西復有肥如縣應劭云晉滅肥肥子奔燕燕封於此無終亦此類耳又孔疏見昭元年有窮傳有窮后羿杜注國名彚纂水經注窮水出於安豐昭二十七年楚與吳師遇於窮即此也今在英山縣境今按英山今屬六安州又見昭二十七年然此窮水窮地偶與有窮同名耳非后羿之國也晉地記云河南有窮谷蓋本有窮氏所遷此為近之鉏傳后羿自鉏遷於窮石杜注羿本國名彚纂今大名府滑縣東十五里有鉏城今按滑縣今屬河南衛輝府窮石傳見上今按即窮國地寒傳伯明后寒葉之杜注寒國北海平夀縣東有寒亭彚纂今寒亭在山東萊州府濰縣東北五十里今按鄭樵通志寒亭在濰州東二十三里有鬲傳靡奔有鬲氏杜注國名平原鬲縣彚纂鬲偃姓臯陶之後封於鬲今濟南府德平縣東一里有故鬲城今按鬲城一云在德州北古鬲津河在此斟灌傳使澆用師滅斟灌及斟尋氏杜注二國夏同姓諸侯樂安夀光縣東南有灌亭彚纂今斟灌城在青州府夀光縣東北四十里斟尋杜注北海平夀縣東南有斟亭彚纂今斟城在萊州府濰縣西南五十里過傳處澆于過杜注國名東萊掖縣北有過鄉彚纂郡國志掖縣有過鄉即過國也今為萊州府治戈傳處豷于戈杜注戈國在宋鄭之間狐駘傳敗于狐駘杜注邾地魯國番縣東南有目台亭彚纂今狐駘山在兖州府滕縣東南二十里五年善道經會吳于善道杜注地闕彚纂案阮勝之南兖州記云盱眙本吳善道地秦置盱胎縣許慎曰張目為盱舉目為眙城居山上可以矚逺故曰盱眙今屬鳳陽府泗州城棣傳會于城棣以救之杜注鄭地陳留酸棗縣西南有棣城彚纂寰宇記有南棣城北棣城在陽武縣北十里二棣城之間有博浪河亭即子房擊始皇處也今屬開封府六年棠傳棠人杜注萊邑北海即墨縣有棠鄉彚纂今縣南八十里有甘棠社即古棠鄉也屬萊州府今按顧炎午云棠在平度州境孟子所謂發棠在此即墨為齊大都倉廩在焉亦從此知之七年鄬經公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬杜注鄭地鄵經卒于鄵杜注鄭地八年邢丘經季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘今按見宣六年九年商丘傳陶唐氏之火正閼伯居商丘疏釋例云宋商商丘三名一地梁國睢陽縣也傳曰陶唐氏