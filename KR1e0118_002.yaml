故瀆上承大河於頓丘縣而北出東徑繁陽故城案浮水即澶淵也繁陽故城在內黃縣東北二十七里古頓丘約略在濬縣之南漢元光三年河水徙頓丘東南流既而決瓠子今瓠子故城在開州西南二十五里則澶淵之地當在內黃之南開州之西北也二十一年漆閭丘經邾庶其以漆閭丘來奔杜注二邑在髙平南平陽縣東北有漆鄉西北有顯閭亭彚纂今鄒縣北有漆城即漆鄉也顯閭亭即閭丘今按漢置南平陽縣後省入鄒縣又案水經注引從征記曰今漆鄉東北十里見有閭丘鄉顯閭非也著傳宣子使城著而遂逐之杜注晉邑轘轅傳使候出諸轘轅杜注轘轅關在緱氏縣東南彚纂輿地志其阪有十二曲道將去復還故名今河南府鞏縣西南有轘轅山今按河南通志轘轅山一名萼嶺在登封縣西北三十里左傳轘轅即此鞏縣登封蓋一山跨兩縣也商任經公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任杜注地闕二十二年御傳過御叔杜注御叔魯御邑大夫二十三年朝歌傳齊侯遂伐晉取朝歌杜注屬汲郡彚纂今淇縣即古朝歌也今按淇縣今屬衛輝府朝歌城在縣北關西社殷舊都漢置朝歌縣孟門大行傳入孟門登大行杜注孟門晉隘道大行山在河內郡北彚纂司馬貞曰孟門在朝歌東北大行山地理志在河內郡野王縣西北今河內縣即野王縣今按胡渭禹貢錐指曰凡孟門與大行連舉者皆非吉州之孟門也史記吳起謂魏武侯曰殷紂之國左孟門右大行杜注左傳孟門晉隘道而不言其處所司馬貞注吳起傳云劉氏案紂都朝歌則孟門在其西今言左則東邊别有孟門也其注齊世家則曰孟門在朝歌東蓋據起言以立説今其地實無山以應之齊師自朝歌而西入亦不當反在其東然則孟門者大行隘道之名疑即今輝縣之白陘述征記大行第三陘為白陘在今衛輝府之輝縣齊侯伐晉取朝歌入孟門登大行杜預云孟門晉隘道蓋即所謂白陘也熒庭傳張武軍于熒庭杜注晉地今按平陽府翼城縣東南七十五里有熒庭城水經注紫谷水西徑熒庭城南志云即陘庭也又見桓二年陘庭郫邵傳戍郫邵杜注取晉邑而守之今按懷慶府濟源縣西百里有郫亭縣西百二十里有邵原關唐武德初置邵原縣於此與山西絳州垣曲縣接界垣曲本召公分陜之處漢為垣縣後魏置邵郡後周與唐初為邵州故博物記云垣縣有邵郫之厄即此郫邵也又見文六年郫少水傳封少水今按水經注引京相璠謂即沁水今山西澤州沁水縣是也彚纂云少水即澮水考澮水出絳縣東澮山西南過絳縣南即當時之晉都齊侯豈能至其地而封尸彚纂又云出開封府密縣古鄶城西北此又誤中之誤鄭地之澮與晉地之澮名同實異齊侯所經之地皆在河北未嘗至河南也東陽傳趙勝帥東陽之師以追之杜注東陽晉之山東魏郡廣平以北彚纂今臨清州恩縣西北六十里有東陽城今按山東者大行山以東也魏郡者大名府地也廣平者廣平府地也然而趙勝帥東陽之師當有其處彚纂謂恩縣之東陽城為東陽恐非是當時齊侯自衛伐晉已過孟門大行而趙勝猶帥山東東昌臨清之師以追之逺不相值矣且東昌臨清之地當屬齊晉未必能有也案昭二十二年荀吳略東陽使師偽糴者負甲以息於昔陽之門外遂襲鼓滅之是東陽近鼓國而鼓為今正定府之晉州趙勝所帥師當是此東陽耳雍榆經叔孫豹帥師救晉次于雍榆杜注晉地汲郡朝歌縣有雍城彚纂郡邑志黎陽縣有雍城即古雍榆也今雍榆城在濬縣西南十八里今按濬縣今屬衛輝府鹿門傳臧紇斬鹿門之關以出杜注魯南城東門鑄傳臧宣叔娶于鑄杜注鑄國濟北蛇丘縣所治彚纂今濟南府肥城縣有鑄鄉即漢蛇丘縣治也今按肥城今屬泰安府且于傳遂襲莒門于且于杜注莒邑彚纂今在青州府莒州境今按莒州今屬沂州府夀舒傳期于夀舒杜注莒邑彚纂亦屬莒州蒲侯氏傳先遇莒子于蒲侯氏杜注近莒之邑二十四年陶唐傳自虞以上為陶唐氏杜注陶唐堯所治地太原晉陽縣也今按晉陽今太原府太原縣也一統志云陶唐城在太原府清源縣東南四十里舊注云陶唐氏自涿鹿徙居於此俗謂之姚城豕韋傳在商為豕韋氏杜注豕韋國名東郡白馬縣東南有韋城彚纂隋置韋城縣唐宋因之金廢為鎮今在大名府滑縣東南五十里今按滑縣今屬衛輝府唐杜傳在周為唐杜氏杜注唐杜二國名殷末豕韋國于唐周成王滅唐遷之於杜為杜伯杜今京兆杜縣彚纂秦置杜縣漢改杜陵今杜陵故城在西安府治東南十五里今按一統志太原府太原縣唐城即太原縣治本唐叔虞子徙居之所范傳晉主夏盟為范氏杜注杜伯之子隰叔奔晉四世及士會食邑於范復為范氏彚纂范晉邑戰國時為齊地孟子自范之齊是也漢置范縣屬東郡唐改屬濮州宋以後因之今范縣東南二十五里有古范城今按范縣在濮州東北六十里今屬曹州府其地當為齊邑去晉逺恐晉不能有其地士會所食之范當在山西平陽府境介根傳遂伐莒及介根杜注莒邑今城陽黔陬縣東北計基城是也彚纂漢置計斤縣如淳曰斤音基今膠州西南五里有介根城今按漢志云莒子始起計斤後徙莒膠州今膠州屬萊州府棘澤傳楚子伐鄭門于東門次于棘澤彚纂在今開封府新鄭縣東南今按水經注長社北界有稟水東南徑棘城北左傳所謂次於棘澤者也稟水東注洧水然則棘澤地在長社北今許州府北也宛傳鄭人卜宛射犬吉今按水經注潩水徑長社城北又東南徑逺亭西鄭大夫宛射犬之故邑也長社故屬許州舒鳩傳召舒鳩人杜注楚屬國今按鄭樵云廬州府舒城是荒浦傳楚子師于荒浦杜注舒鳩地郟傳齊人城郟杜注王城也於是榖洛鬭毁王宮齊為王城之今按韋昭國語注云洛水在王城南榖水在王城北東入於瀍至靈王時榖水盛出於王城西而南流合於洛兩水相格有似於鬭而毁王城西南也榖水即澗水事在靈王二十二年當襄公二十三年二十五年棠傳齊棠公之妻杜注棠公齊棠邑大夫今按疑即郵棠見襄十八年孟子發棠亦是此邑弇中傳行及弇中杜注弇中狹道今按臨淄縣西南至古萊蕪有長峪界兩山間踰二百里中通淄河長峪本名馬陘亦名弇中馬陘見成二年泮傳晉侯濟自泮杜注泮闕夷儀經衛侯入于夷儀杜注夷儀本邢地衛滅邢而為衛邑今按見僖元年重丘經諸侯同盟于重丘杜注齊地彚纂寰宇記聊城縣東北有重丘襄二十五年諸侯會盟處聊城今東昌府治案濟南府德州亦有重丘城或云會盟處考經公會諸侯于夷儀同盟于重丘夷儀今順德府地去東昌為近自夷儀涉齊境則其地當在聊城離城傳及離城杜注舒鳩城彚纂今舒城縣境二十六年茅氏傳晉戍茅氏杜注戚東鄙今按戚見文元年圉傳遂伐衛師敗之圉杜注衛地彚纂今大名府開州東有圉城雩婁傳楚子秦人侵吳及雩婁杜注今屬安豐郡彚纂今鳯陽府霍丘縣西南雩婁故城是也今按霍丘今屬潁州府城麇傳至于城麇鄭皇頡戍之杜注鄭大夫守城麇之邑懿氏傳取衛西鄙懿氏六十以與孫氏杜注戚城西北五十里有懿城因姓以名城彚纂今戚城在開州北七里鄐傳晉人與之鄐杜注晉邑邢傳晉人與之邢杜注晉邑今按邢本直𨽻順德府邢臺縣為邢國後狄有之而晉滅狄邢邑遂屬之晉駕傳取駕杜注楚邑今按見成十七年棘傳克棘杜注楚邑譙郡酇縣東北有棘亭彚纂今在歸德府永城縣南苖傳晉人與之苖杜注晉邑彚纂今懷慶府濟源縣西有苗亭今按水經注濝水出王屋西山南徑苖亭西亭故周之苖邑今濝水在濟源縣西是苖亭在縣西也南里傳入南里墮其城杜注鄭邑彚纂今新鄭縣南五里有地名南里樂氏傳涉于樂氏杜注津名彚纂今在新鄭縣境洧水濟渡處也廩丘傳齊烏餘以廩丘奔晉杜注今東郡廩丘故城是彚纂今在東昌府范縣東南七十里羊角傳襲衛羊角取之杜注今廩丘縣所治羊角城是彚纂羊角城一名義城蓋取羊角哀為名在今范縣東南新安村今按左伯桃羊角哀事當出春秋之後羊角城非以是得名其云義城者後人附會耳髙魚傳遂襲我髙魚杜注髙魚城在廩於丘縣東北彚纂唐朱友恭敗朱瑄髙梧胡三省注即髙魚也今兖州府鄆城縣西髙魚鄉是其地今按鄆城今屬曹州府二十七年木門傳託於木門杜注晉邑彚纂榖梁傳曰織絇邯鄲則木門當在邯鄲之境今按邯鄲縣屬直𨽻廣平府一統志謂公子鱄所託木門在河間府舊滄州西北此地為齊燕之境太逺疑非是蒙門傳盟于蒙門之外杜注宋城門崔傳成請老于崔杜注濟南東朝陽縣西北有崔氏城彚纂今在濟南府章丘縣西北二十五里俗呼古城二十八年北燕傳北燕伯杜注燕國今薊州疏譜云北燕姬姓召公奭之後也彚纂薊縣遼改薊北縣又改析津縣今改大興縣今京城東偏即其地也胡傳胡子杜注楚屬國又云歸姓汝隂縣西北有胡城彚纂今潁州是也今按潁州舊屬鳯陽府今升為府附郭設阜陽縣魚里傳至于魚里杜注里名彚纂當在今青州府臨淄縣境嶽傳反陳于嶽杜注里名今按即孟子所謂莊嶽也在齊國中之里朱方傳吳句餘子之朱方杜注吳邑彚纂顔師古曰漢丹徒縣吳朱方也唐為潤州治宋改軍名鎮江徽宗升軍為府明為鎮江府自漢迄明皆以丹徒為附郭今仍之邶殿傳與晏子邶殿杜注齊别都黃崖傳伯有迋勞於黃崖杜注滎陽宛陵縣西有黃水西南至新鄭城西入洧彚纂水經注黃水出大山南黃泉流徑華城西又東南與上水合即春秋所謂黃崖也今黃水在新鄭縣東二十里二十九年揚傳霍揚韓魏杜注揚屬平陽郡今按一統志平陽府洪洞縣春秋時揚侯國晉滅之以賜羊舌肸漢置揚縣隋改洪洞縣故揚城在縣東南十八里又見昭二十八年揚氏及二十二年揚弼鄘傳為之歌邶鄘衛疏自紂城而北謂之邶南謂之鄘彚纂今邶城在衛輝府東北鄘城在新鄉縣西今按衛輝府新鄉縣西南三十二里有古鄘城康傳吾聞衛康叔武公之德如是今按康叔始食采於康後徙封衛括地志云故康城在許州陽翟縣西北三十五里陽翟今許州府禹州豳傳為之歌豳杜注周之舊國在新平漆縣東北彚纂鄭氏詩譜云豳屬扶風恂邑案漆縣今邠州恂邑今三水邠州東北有豳亭豳谷三水有豳城皆是也今按邠州舊屬西安府今直𨽻陜西在府西北三百五十里三水縣在州東屬之鄶傳自鄶以下無譏焉今按鄭氏詩譜云祝融氏名黎其後八姓惟妘姓檜者處其地孔疏云黎弟吳回復居火正為祝融吳回生陸終陸終生子六人四曰會人世本會人即檜之祖也王肅云武王封祝融之後於濟洛河潁之間為檜子又案詩經傳説彚纂云朱子集傳其於鄭也曰桓公武公定平王於東都亦為司徒又得虢鄶之地乃徙其封而施舊號於新邑是為新鄭説與鄭氏合及敘檜世系則曰周衰為鄭桓公所滅而遷國焉又與鄭譜異矣考國語桓公為司徒問於史伯因史伯之對乃東寄帑與賄虢鄶受之十邑皆有寄地事在幽王八年至十一年而桓公死幽王之難是桓公時特有滅檜之謀耳周室既東武公繼桓公為平王司徒遂得虢檜之地而遷國焉則檜實滅於武公之時桓公襲檜之説雖本韓非要當以國語為信鄶在今許州府密縣見僖三十三年鄶城綿傳晉人城綿而置旃今按當是綿上見僖二十四年三十年平畤傳成愆奔平畤杜注周邑墓門傳自墓門之瀆入杜注鄭城門羊肆傳伯有死於羊肆杜注市列斗城傳既而葬諸斗城杜注鄭地名彚纂今開封府陳留縣南三十五里有斗城今按水經注涉水徑陽夏縣故城西又東南徑斗城西酸棗傳及酸棗杜注陳留縣彚纂今開封府延津縣是縣北十五里有古酸棗城任傳羽頡出奔晉為任大夫杜注任縣今屬廣平郡彚纂今任縣屬直𨽻順德府縣東南有古任縣三十一年陽州傳使帥師以伐陽州杜注魯地彚纂在東平西北齊魯境上之邑也今按東平州今屬泰安府銅鞮宮傳今銅鞮之宮數里杜注晉離宮延州來傳延州來季子杜注延州來季札邑疏延延陵州來邑名並食二邑故連言之今按檀弓稱延陵季子延陵即延也晉置延陵縣宋熙寧中省為鎮在鎮江府丹陽縣南三十里季札後又封州來注見昭二十七年及哀十年是年吳未滅州來而趙文子已稱延州來季子者史家之辭其實當稱延陵季子也春秋地理考實卷二
