body:
  text: 春秋地理考實卷三婺源江永撰昭公元年虢傳遂㑹于虢杜注鄭地今按故東虢國也見隱元年三苗傳虞有三苗杜注三苗饕餮放三危者今按吳起云三苗之國左洞庭右彭蠡史記正義云今江州鄂州岳州也江州今江西九江府鄂州今湖廣武昌府岳州今岳州府此所指太廣胡渭謂三苗今為岳州府地也舜竄其君及民于三苗之地水經注云三危山在敦煌縣南括地志云在沙州燉煌縣東南四十里漢敦煌唐分為瓜沙二州今為嘉峪關外廢沙州衞地觀扈傳夏有觀扈杜注觀今頓丘衞縣扈在始平鄠縣彚纂后啟五庶分封於衞是為五觀隋置觀城縣屬魏州元屬濮州今仍之古觀國城在縣西州今鄠縣北有古鄠城屬陜西西安府今按觀城今屬曹府濮州姺邳傳商有姺邳杜注二國商諸侯邳今下邳縣彚纂竹書紀年商外壬元年姺人邳人叛即此今按下邳即今邳州屬徐州府徐奄傳周有徐奄杜注二國嬴姓彚纂案徐偃王為周所滅後封其子宗為徐子莊二十六年三國伐徐是也成王伐淮夷遂踐奄因以封周公蓋周公已封於武王時而成王以奄地益之也今志言曲阜舊城即古奄地或言奄城在縣東二里濮傳吳濮有釁杜注今建寧郡南有濮夷彚纂案晉建寧郡在今雲南界杜蓋極言其所至也今按晉建寧郡故城在今石首縣非雲南界也又見文十六及昭十九年雒汭傳館於雒汭杜注雒水名河南鞏縣南水曲流為汭彚纂夏書太康五弟須于洛汭即此也水經注洛水入河之處清濁異流亦名什谷隋置洛口倉於此閨門薫隧傳私盟于閨門之外實薰隧杜注閨門鄭城門薰隧門外道名大鹵經晉荀吳帥師敗狄于大鹵榖梁中國曰太原夷狄曰大鹵杜注太原晉陽縣今按晉陽今太原府太原縣大原傳見下杜注即大鹵也無終傳晉中行穆子敗無終及羣狄于大原杜注無終山戎疏釋例土地名以北戎山戎無終三名為一北平有無終縣計無終在太原東北二千許里逺就太原來與晉戰不知其何故蓋與諸戎近晉者相率而來也今按無終本國近代郡之廣昌説見襄四年曠林傳居於曠林杜注地闕商丘傳遷閼伯于商丘杜注宋地疏釋例云宋商商丘三名一地梁國睢陽縣也彚纂明嘉靖二十四年置商丘縣為歸徳府附郭今仍之大夏傳遷實沈于大夏杜注今晉陽縣彚纂即太原也汾洮傳宣汾洮杜注二水名彚纂僖十六年狄侵晉渉汾即此汾也後漢志聞喜有洮水水經注涑水逕聞喜縣周陽邑與洮水合今聞喜縣屬平陽府今按聞喜今屬絳州沈姒蓐黄傳沈姒蓐黄實守其祀杜注四國臺駘之後犫櫟郟傳城犫櫟郟杜注犫縣屬南陽郟縣屬襄城櫟今河南陽翟縣三邑本鄭地彚纂犫史記沛公與秦南陽守莊齕戰於犫東即此今河南汝寧府魯山縣東南有犫縣故城是其地郟二世元年陳勝將鄧龍居郟即此也今屬汝寧府汝州今按魯山郟縣今皆屬汝州汝州直𨽻河南櫟見桓十五年大厖常儀靡傳以大厖與常儀靡奔齊杜注莒二邑彚纂當在莒州北境二年中都傳執諸中都杜注晉邑在西河介休縣東南彚纂今山西汾州府平遥縣西北十二里有中都古城西南至介休五十里今按一統志中都城有二一在介休東北五十里一在太原府榆次縣東十五里俱云晉執陳無宇於此非也無宇致少姜於晉榆次與平遥介休皆非所經之地水經注沁水篇云光溝水逕中都亭南又南逕中都亭西注于沁水地在野王縣今為懐慶府河内縣中都當在此正為齊適晉所經之地三年州田傳賜女州田杜注州縣今屬河内郡彚纂案州本周邑隱十一年王以予鄭是時又屬晉莒傳齊侯田于莒杜注齊東竟今按昭十年桓子請老于莒當亦是此邑江南之夢傳王以田江南之夢杜注楚之雲夢跨江南北疏雲夢一澤而每處有名者子虚賦云雲夢者方八九百里則此澤跨江南北每處存名焉今按胡渭曰雲夢經傳諸書有合稱者有單稱者單稱雲稱夢特省文耳雲可該夢夢亦可該雲故杜注宣四年夢中云夢澤名江夏安陸縣東南有雲夢城則夢在江北注定四年雲中云入雲夢澤中所謂北南之夢則雲在江南注昭三年江南之夢云椘之雲夢跨江南北則南雲北夢單稱合稱無所不可絶無江北為雲江南為夢之説自唐太宗詔改禹貢雲夢土作乂改為雲土夢作乂後人因謂雲在江北夢在江南而古注棄如塵羮矣又見宣四年夢中定四年雲中四年四嶽傳四嶽杜注東嶽岱西嶽華南嶽衡北嶽恒疏釋例云東嶽泰山奉髙縣泰山也南嶽長沙湘南縣衡山也西嶽𢎞農華隂縣西南華山也北嶽中山曲陽縣西北恒山也書傳多云五嶽此傳云四嶽者中岳嵩髙即太室下别言之故此云四嶽也今按漢地理志岱山在泰山郡博縣西北今山東泰安府泰安縣東北有博縣故城山在府治北五里即泰山地理志京兆華隂縣南有太華山在今陜西同州府華隂縣南八里地理志衡山在長沙國湘南縣東南今在湖廣衡州府衡山縣地理志恒山在常山上曲陽縣西北今在直𨽻定州曲陽縣西北三塗傳三塗杜注在河南陸渾縣南彚纂水經注伊水歴崖口山峡也翼崖深髙壁立如闕伊水逕其下歴峡北流即古三塗山也在今河南河南府嵩縣今按水經注山在陸渾縣故城東南八十里陽城傳陽城杜注在陽城縣東北彚纂今河南府登封縣北三十八里俗名車嶺山是也大室傳大室杜注在陽城縣西南疏即嵩髙也爾雅釋山云嵩髙為中岳彚纂戴延之曰嵩髙三十六峰東曰太室西曰少室今嵩髙山在河南登封縣北十里荆山傳荆山杜注在新城沶鄉縣南彚纂禹貢荆及衡陽惟荆州荆河惟豫州則荆山乃二州之界也今在湖廣襄陽府南漳縣西南中南傳中南杜注在始平武功縣南彚纂亦作終南今在西安府長安縣南五十里雍錄終南山横亘關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去八百里連緜峙據其南者皆此一山冀之北土傳冀之北土杜注燕代今按燕今直𨽻北邊代今山西代州及朔平府諸處鈞臺傳夏啟有鈞臺之享杜注河南陽翟縣南有鈞臺陂彚纂金置鈞州以鈞臺得名今河南府禹州是也州城北關外有鈞臺遺址今按明萬厯三年避御名鈞改為禹州今屬許州府景亳傳商湯有景亳之命杜注河南鞏縣西南有湯亭或言亳即偃師彚纂今河南府偃師縣南二十里有景山商頌陟彼景山即此史記正義曰湯即位徙西亳西亳即偃師景亳當主偃師為是孟津傳周武有孟津之誓彚纂即盟津也隱十一年王以盟予鄭即此岐陽傳成有岐陽之蒐杜注岐山在扶風美陽縣西北彚纂漢之美陽在今武功縣境今岐山縣正在武功之西彼時未有縣故岐山在其境也後周始置岐山縣今屬陜西鳳翔府酆宫傳康有酆宫之朝杜注酆在始平鄠縣東彚纂括地志鄠縣東三十五里有豐宫今屬陜西西安府顔師古謂靈臺鄉在豐水上是也今按一統志豐宫在鄠縣東五里文王作邑于豐時所居塗山傳穆有塗山之㑹杜注在夀春東北彚纂水經注荆塗二山相連為一脈禹以桐柏之流汜濫為害鑿山為二以通之今在鳳陽府懐逺縣東南八里武城傳王田于武城疏楚武城在南陽宛縣北今按見僖六年仍緡傳夏桀為仍之㑹有緡叛之杜注仍緡皆國名今按有仍見哀元年僖二十三年齊侯伐宋圍緡緡為宋邑疑即夏時侯國黎傳商紂為黎之蒐東夷叛之杜注黎東夷國名鄢傳遷賴于鄢杜注楚邑今按見桓十三年著丘傳莒亂著丘公立今按疑是莒地名棘傳吳伐楚入棘櫟麻杜注皆楚東鄙邑譙國酇縣東北有棘亭今按見襄二十六年櫟傳見上杜注汝隂新蔡縣東北有櫟亭彚纂今汝寧府新蔡縣北二十里有野櫟店即古櫟城也若鄭之櫟邑則河南陽翟縣與此不同麻傳見上彚纂魏收志碭郡安陽縣治麻城索隱襄城縣有麻城未知孰是案今徐州碭山縣有安陽城即故麻城以楚之東鄙言之安陽之説為是今按湖廣黄州府有麻城縣漢之西陵地或因古有麻邑而名是為楚之東鄙吳伐楚入歸徳永城之棘次入汝寧新蔡之櫟又轉南而入黄州之麻地望相近於是楚沈尹射奔命於夏汭夏汭在武昌江夏與黄州麻城亦相近矣若碭山之麻城其地或屬宋夏汭傳楚沈尹射奔命于夏汭杜注漢水曲入江今夏口也彚纂應劭曰夏水冬竭夏流故謂之夏荆州記夏口入江處謂之夏汭蓋夏水之尾也漢末謂之夏口亦曰漢口亦曰沔口沔之下流為漢夏水亦㑹三水共出此口也章懐太子曰夏口實在江北唐置鄂州而夏口之名移於江南沔水入江之名亦止謂漢口矣今在湖廣武昌府江夏縣今按楚莊王討陳夏氏鄉取一人以歸謂之夏州地近漢水於是漢水遂有夏名凡夏汭夏口夏首夏侯及漢之江夏郡縣皆以此立名應劭謂夏水冬竭夏流故謂之夏非也漢大川豈有冬竭者乎庚宗傳穆子去叔孫氏及庚宗杜注魯地彚纂今兗州府泗水縣有庚宗亭丘蕕傳田于丘蕕杜注地名五年大庫之庭傳以攻諸大庫之庭杜注魯城内有大庭氏之虚於其上作庫今按昭十八年大庭氏之庫即此庫也疑此年文誤倒耳塞關傳殺諸塞關之外杜注齊魯界上闗寧風傳投其首於寧風之棘上杜注齊邑汜莵氏傳鄭伯勞子蕩于汜勞屈生于莵氏杜注皆鄭地彚纂僖二十四年王適鄭處于汜即此寰宇記莵氏城在開封府尉氏縣西北四十里索氏傳子大叔勞諸索氏杜注河南成臯縣東有大索城彚纂今滎陽東北三十里有京城大索城在京城西二十里其東北四十里為小索城圉傳韓起反鄭伯勞諸圉杜注鄭地名彚纂漢置圉縣後魏曰圉城縣周顯徳二年征淮南駐師於圉城鎮即此今在杞縣南五十里今按杞縣在開封府東一百里韓起自楚反晉鄭勞諸圉其地當近鄭都不得經杞縣之圉疑非是防兹經莒牟夷以牟婁及防兹來奔杜注城陽平昌縣西南有防亭姑幕縣東北有兹亭彚纂今平昌故城在安丘縣西南六十里青州府諸城縣西北有姑幕故城兹亭在其境蚡泉經叔弓帥師敗莒師于蚡泉杜注魯地瑣傳越大夫常夀過帥師㑹楚子于瑣杜注楚地彚纂當在今夀州霍丘縣東今按霍丘今屬潁州府繁揚傳薳射以繁揚之師㑹于夏汭今按繁楊在新蔡縣見襄四年鵲岸傳吳人敗諸鵲岸杜注廬江舒縣有鵲尾渚彚纂今江南太平府繁昌縣西南大江中有鵲州蓋自銅陵鵲頭山至三山為鵲尾故江曰鵲江岸曰鵲岸羅汭傳楚子以馹至于羅汭杜注羅水名今按此楚之東境别有羅水非故羅國之水也萊山傳次于萊山今按當在楚東境南懐汝清傳薳射帥繁揚之師先入南懐楚師從之及汝清杜注皆楚界彚纂應在今江淮間坁箕之山傳楚子遂觀兵于坁箕之山彚纂今江南無為州巢縣南三十七里有踟蹰山輿地志以為即坁箕山也六年柤傳從鄭伯以勞諸柤杜注鄭地今按當近鄭都豫章傳師于豫章而次于乾谿彚纂當在江北淮水南今按定四年吳伐楚舍舟於淮汭自豫章與楚夾漢杜注云豫章漢東江北地名是在江北也後移之於江南漢髙帝六年分淮南國置豫章郡治南昌今為江西南昌府非古之豫章也杜注又詳見昭十三年乾谿傳見上杜注在譙國城父縣南楚東境彚纂今鳳陽府亳州東南有乾谿與城父村相近即漢之城父縣也今按亳州今屬江南潁州府房鍾傳吳人敗楚師于房鍾杜注吳地彚纂當在今夀州蒙城縣界今按蒙城今屬潁州府七年虢傳齊侯次于虢杜注燕竟彚纂當在今直𨽻河間府滄州境濡上傳盟于濡上杜注濡水出髙陽縣東北至河間鄚縣入易水疏髙陽無此水未知杜注何所據彚纂宋分髙陽地置順安軍金為安州元以後因之濡上當在今直𨽻安州任丘之間鄚縣在今任丘縣境今按漢地理志濡水出涿郡故安縣東南流至范陽縣合易水杜注誠與志不合故安城在今保定府之易州范陽今順天府涿州也又按水經注濡水出故安縣西北窮獨山東南流於容城縣西北大利亭東南合易水容城今屬保定府亦近涿州然則濡上當在今容城及涿州之間而保定之安州與河間之任丘皆非其地章華之宫傳為章華之宫杜注章華南郡華容縣彚纂今荆州府監利縣東五里有華容城章華臺傳楚子成章華之臺杜注臺今在華容城内彚纂今監利縣北六十里有章華臺成傳晉人來治杞田季孫將以成與之杜注成孟氏邑本杞田今按成見桓六年在兗州府寧陽縣當為故郕國地似非杞田此因晉人來治杞田孟僖子從公在外季孫遂欲以孟氏之邑與之耳此年晉人為杞取成其後成仍為孟氏邑桃傳吾與子桃杜注魯國卞縣東南有桃虚今按兗州府汶上縣東北四十里有桃鄉城即襄十七年齊侯伐我北鄙圍桃者此年謝息遷桃當是此地而卞縣之桃虚為泗水縣地乃莊二十七年公㑹杞伯姬于洮洮或作桃耳又説見下萊柞萊柞傳辭以無山與之萊柞乃遷于桃杜注萊柞二山今按謝息言桃無山而季氏以萊柞與之水經注引應劭十三州記云大山萊蕪縣魯之萊柞邑萊蕪在魯之北與汶上縣東北四十里之桃鄉相去不逺以此證之可知桃是桃鄉非桃虚羽山羽淵傳昔堯殛鯀于羽山其神化為黄熊以入于羽淵杜注在東海祝其縣西南彚纂今兗州府沂州東南一百里有山髙四里周廣八里其西為羽淵今按禹貢蒙羽其藝胡渭云漢志祝其縣南有羽山杜注左傳亦云在祝其縣西南縣之故城在今贑榆縣界而隋志朐山縣有羽山元和志云羽山在朐山縣西北一百里又云在臨沂縣東南一百十里與朐山縣分界朐山今海州臨沂今沂州也近志郯城縣東北亦有羽山接贑榆界齊乗云羽山舊在朐山縣東北九十里今屬沂州在東南百二十里時郯城未復故在州境也諸説不同要之此山在沂州之東南海州之西北贑榆之西南郯城之東北實一山跨四州縣之境也明一統志云在贑榆縣之西北八十里則誤矣説者皆以此山為舜殛鯀處山下有羽潭即左傳所謂羽淵者也按此地太近非荒服放流之宅孔安國傳云羽山東裔在海中今登州府蓬莱縣有羽山寰字記云在縣東十五里即殛鯀處有鯀城在縣南六十里以近殛鯀之地而名此與孔傳謂在海中者合當從之蓬萊新志云羽山在縣東南三十里八年魏榆傳石言于晉魏榆杜注晉地彚纂服䖍曰魏邑榆州里名今太原榆次縣西北有榆次故城通典曰晉魏榆邑也今按水經注亦謂榆次即魏榆虒祁宫傳於是晉侯方築虒祁之宫杜注虒祁地名在絳西四十里臨汾水彚纂今在平陽府曲沃縣西水經注汾水逕虒祁宫北有故梁截汾水中凡三十柱柱挳五尺蓋晉平公時物也紅經蒐于紅杜注魯地沛國蕭縣西有紅亭遠疑彚纂蕭縣今屬江南徐州本宋地去魯為逺今按徐州今為府又按後漢郡國志沛國有紅縣蓋即紅亭注引地道記謂大蒐在此非也魯之南不得至徐州根牟商衞傳大蒐于紅自根牟至於商衞革車千乗杜注根牟魯東界琅邪陽都縣有牟鄉商宋地魯西竟接宋衞地今按根牟見宣九年九年夷城父傳楚公子弃疾遷許于夷實城父杜注時改城父為夷故傳實之城父縣屬譙郡彚纂今鳳陽府亳州東南七十里有城父故城今按亳州今屬潁州府州來淮北之田傳取州來淮北之田以益之疏釋例云州來淮南下蔡縣汝水之南也淮北之田淮水北田則州來邑在淮南邑民有田在淮北也許國盡遷于夷夷田少故取以益之今按州來見成七年夷濮西田傳以夷濮西田益之杜注以夷田在濮水西者與城父人彚纂水經注夏肥水上承沙水東南逕城父縣故城春秋所謂夷田在濮水西者也蓋濮水亦稱沙水閻田傳周甘人與晉閻嘉爭閻田彚纂杜注以閻嘉為晉閻縣大夫則閻當屬晉左氏載甘人與嘉爭則閻蓋與甘相近之地今按閻又見定四年有閻之土甘在洛陽見僖二十四年隂戎傳率隂戎伐潁杜注陸渾之戎彚纂陸渾故城在河南府嵩縣北二十里僖二十二年秦晉遷陸渾之戎于伊川是也今按陸渾近隂地故曰隂戎隂地見宣二年潁傳見上杜注周邑今按潁水出河南府登封縣潁邑當在登封境魏駘芮岐畢傳魏駘芮岐畢吾西土也杜注駘在始平武功縣所治釐城岐在扶風美陽縣西北彚纂今武功縣屬西安府乾州古釐城在縣南八里明置邰城驛于此今按駘即后稷始封于邰之地乾州今直𨽻陜西武功屬之今鳳翔府有岐山縣魏芮見桓三年異見僖二十四年蒲姑商奄傳蒲姑商奄吾東土也杜注樂安傳昌縣北有蒲姑城彚纂史記作薄姑今青州府博興縣東南十五里有薄姑故城今按商奄見定四年巴濮楚鄧傳巴濮楚鄧吾南土也疏土地名云巴巴郡江州縣也楚南郡江陵縣也鄧義陽鄧縣也建寧郡南有濮夷地然則巴楚鄧中夏之地濮為逺夷耳今按巴見桓九年濮為江漢間之濮夷見文十年六年及昭十九年楚見桓二年鄧見桓七肅慎燕亳傳肅慎燕亳吾北土也杜注肅慎在𤣥莵北三千餘里疏土地名云燕今薊縣也亳是小國闕不知所在蓋與燕相近亦是中國也唯肅慎為逺夷彚纂韋昭曰肅慎去扶餘千里孔疏𤣥莵在遼東北金為上京㑹寧府今屬盛京今按燕見襄二十八年亳無考史記秦本紀寧公與亳戰亳王奔戎皇甫謐曰西戎之國也或謂亳指此蓋西周之北土也姑備一説瓜州傳先王居檮杌于四裔以禦魑魅故允姓之姦居于瓜州杜注言檮杌略舉四凶之一下言四裔則三苗在其中允姓隂戎之祖與三苗俱放三危者瓜州今敦煌今按見襄十四年戲陽傳卒于戲陽杜注魏郡内黄縣北有戲陽城今按内黄屬直𨽻大名府郎囿經築郎囿今按郎見隱元年及九年地有逺近未知此郎囿在何地十年稷傳戰于稷杜注稷祀后稷之處彚纂六國時齊有稷下館在今青州府臨淄縣古臨淄城西莊傳又敗諸莊杜注六軌之道今按此莊為齊城街里名即孟子所謂莊嶽鹿門傳又敗諸鹿門杜注齊城門莒傳而請老于莒杜注齊邑今按見昭三年棘傳而反棘焉杜注子山故邑齊國西安縣東有㦸里亭彚纂後漢志作棘里今臨淄縣西北有棘里亭夫于傳而與之夫于杜注濟南於陵縣西北有于亭彚纂今於陵城在長山縣南二十里屬濟南府郠傳取郠杜注莒邑彚纂當在沂水縣界今按沂水今屬沂州府十一年比蒲經大蒐于比蒲按杜無注祲祥經仲孫貜㑹邾子盟于祲祥杜注地闕彚纂當在兗州府滋陽縣境泉丘傳泉丘人有女杜注魯邑彚纂當在今兗州府寧陽泗水間清丘之社傳盟于清丘之社按杜無注厥憖經季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憖杜注地闕岡山傳用隱大子于岡山疏必是楚地之山也不羮傳楚子城陳蔡不羮釋文羹音郎杜注襄城縣東南有不羮城定陵西北有不羹亭彚纂不羮有二開封府襄城縣東南者西不羹也南陽府舞陽縣北者東不羮即定陵之不羮亭也今按襄城今屬許州府榖傳齊桓公城榖而寘管仲焉杜注城榖在莊三十二年今按榖為齊邑見莊七年若莊二十二年所城之小榖非所以寘管仲也渠丘傳齊渠丘實殺無知杜注今齊國西安縣也齊大夫雍廪邑今按西安縣故城在臨淄縣西三十里渠丘當是公孫無知之邑齊僖公寵之以大邑是以致亂而雍廪殺之非雍廪之邑也雍廪者饔人耳未必有邑十二年陽經齊髙偃帥師納北燕伯于陽傳作唐杜注陽即唐燕别邑中山有唐縣彚纂今直𨽻保定府唐縣東有漢唐縣故城春秋時曰陽也坻傳有肉如坻杜注山名澠傳有酒如澠杜注澠水出齊國臨淄縣北入時水今按水經注時水出齊城西南二十五里澠水出營城東北逕博昌南界入時水自下通謂之澠又東北入淄水孔子曰淄澠之水合易牙嘗而知之謂斯水矣鮮虞傳假道於鮮虞杜注白狄别種在中山新市縣彚纂今直𨽻真定府新樂縣西南有新市故城俗名新城舖其地有鮮虞亭史記索隱曰中山古鮮虞國姬姓也今按如索隱説則鮮虞似非白狄别種真定府今改正定府新樂屬本府之晉州昔陽傳遂入昔陽杜注肥國都樂平沾縣東有昔陽城彚纂今山西太原府平定州有昔陽城元和志謂之夕陽城也案樂平去新樂㡬三百里參之道里疑太廻逺今藁城西南亦有昔陽亭水經注謂之鼓聚與新樂接壤且其地為肥國都劉炫所謂肥鼓竝在鉅鹿昔陽即是鼓都在鮮虞東南似較杜説為的今按漢地理志鉅鹿下曲陽應劭曰晉荀吳滅鼔今鼔聚昔陽亭是也是鼓聚昔陽亭為一地杜於十五年釋鼓注不誤此年注誤劉炫規之是也孔疏强為之辯今不錄藁城今屬正定府晉州隋分藁城地置昔陽縣尋改為鼓城縣唐以後因之元於鼓城縣置晉州明省鼓城入晉州然則昔陽者今正定府之晉州鼓子之國也非肥都此年荀吳入之而未滅至十五年乃取之肥傳滅肥杜注肥白狄也鉅鹿下曲陽縣有肥累城彚纂魏收志藁城有肥累即此城也今在藁城縣西南七里今按肥累漢縣也晉既滅肥肥子奔燕封之於肥如今為直𨽻永平府盧龍縣郊傳絞奔郊杜注周邑潁尾傳次于潁尾杜注潁水之尾在下蔡西彚纂潁尾潁水入淮處也漢志陽城山潁水所出東至下蔡入淮在今江南潁上縣與夀州接界謂之潁口水經注云潁水又東西逕鄭城東又東南入淮即春秋潁尾也今按下蔡即州來在夀州鄭城即潁上故城在今潁上縣南潁上今屬潁州府十三年中犫傳王奪鬭韋龜中犫杜注邑名今按當為楚邑固城息舟城傳圍固城克息舟城而居之杜注息舟楚邑城之堅固者今按顧炎武云固城息舟城乃二城之名鄧傳奉蔡公召二子而盟于鄧杜注潁川召陵縣西南有鄧城今按蔡朝吴奉蔡公召子干子晳盟于鄧此鄧當近蔡國故杜注同桓二年非南陽之鄧州也潁川召陵今許州府郾城縣魚陂傳次于魚陂杜注竟陵縣城西北有甘魚陂彚纂戰國䇿冷向曰楚北有符離之塞南有甘魚之口是也今在湖廣安陸府景陵縣西北今按景陵即竟陵而景陵縣今改天門屬安陸府沔陽州戰國䇿本作南有符離之塞北有甘魚之陂訾梁傳師及訾梁而潰按杜無注夏傳王沿夏杜注漢别名今按説見昭四年夏汭棘闈傳遇諸棘闈杜注棘里名闈門也疏吴語云楚王將入于棘闈棘闈不納孔晁曰棘楚邑闈門也案襄二十六年傳言吳伐楚克棘昭四年傳言吳伐楚入棘以棘為邑或是也今按疏所引棘杜云譙國酇縣東北今在歸徳府永城縣南此傳上文云王沿夏將入鄢則已及今漢陽將入荆州府之境去彼棘逺矣棘闈當别是一地訾傳塟子干千訾按杜無注豫章傳吴人敗諸豫章杜注定二年楚人伐吳師于豫章吳人見舟于豫章而潛師于巢以軍楚師于豫章又柏舉之役吳人舍舟于淮汭而自豫章與楚夾漢此皆當在江北淮水南蓋後徙在江南豫章今按又説見昭六年平丘經公㑹劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘杜注在陳留長垣縣西南彚纂漢置平丘縣晉廢今故城在開封府陳留縣北九十里良傳晉侯㑹吴子于良杜注下邳有良故城今按下邳今邳州也屬江南徐州府良城在州城北六十里東漢置縣唐省邾傳治兵于邾南按杜無注著雍傳晉荀吳自著雍以上軍侵鮮虞按當為晉地又見襄十年皆一地也中人傳及中人杜注中山望都縣西北有中人城彚纂西漢志皆云中山唐縣有中人亭蓋唐縣本自望都分置也今屬直𨽻保定府房傳靈王遷許胡沈道房申于荆焉杜注汝南有吳防縣即防國彚纂今汝寧府遂平縣西有吳房城漢書地理志汝南郡吳房孟康曰本房子國楚靈王遷房於楚吴王闔閭弟夫槩奔楚楚封於此為堂谿氏以封吳故曰吳房案漢晉志皆作吴房杜注作吴防必傳寫誤也今按史記項羽紀封揚武為吳防侯則房防古通用十四年宗丘傳楚子使然丹簡上國之兵於宗丘杜注上國在國都之西西方居上流故謂之上國宗丘楚地彚纂當在今荆州府歸州境今按歸州今屬宜昌府十五年鼓傳晉荀吳帥師伐鮮虞圍鼓杜注鼓白狄之别鉅鹿下曲陽縣有鼓聚彚纂下曲陽故城在今真定府晉州西晉州治即鼓國漢志所謂鼓聚也以鼓山而名今按鼓鮮虞之别非白狄之别也晉州今屬正定府又見昭十二年昔陽密須傳密須之鼓杜注姞姓國也在安定隂密縣彚纂今隂密故城在陜西平凉府靈臺縣西五十里闕鞏傳闕鞏之甲杜注闕鞏國所出鎧十六年戎蠻傳使然丹誘戎蠻子嘉殺之杜注河南新城縣東南有蠻城彚纂後漢志新城有鄤聚古鄤聚今名蠻中水經注汝水自梁縣東逕麻解城北故鄤鄉城也蠻麻聲近故誤耳章懐太子曰蠻中聚在梁縣東南今河南南陽府汝州西南有蠻城楚其處年也今按汝州今直𨽻河南蠻中聚俗呼麻城又見成六蒲隧傳齊師至於蒲隧杜注徐地下邳取慮縣東有蒲如陂彚纂今在鳳陽府虹縣北甲父傳賂以甲父之鼎杜注古國名髙平昌邑縣東南有甲父亭彚纂昌邑城今在兗州府金鄉縣西北四十里桑山傳有事于桑山今按鄭山十七年三塗傳請有事于雒與三塗杜注山名在陸渾南今按又見昭四年棘津傳晉荀吳帥師渉自棘津杜注河津名彚纂水經注河水逕東燕故城北則有濟水北來注之有棘津之名亦謂之石濟津故南津也今在衞輝府胙城縣北今按彚纂所引即僖二十八年晉侯自南河濟侵曹伐衞者也棘津在衞輝府汲縣南七里此年晉荀吳將滅陸渾託言祭洛與三塗帥師涉自棘津汲縣去河南府陸渾地甚逺又非所由之道雖欲使陸渾人弗知亦不應如此廻逺且九月丁卯渉棘津庚午遂滅陸渾相距僅三日豈能如此神速是以杜注但言河津名水經注謂河至燕縣有棘津之名引晉侯荀吴二事證棘津恐誤服䖍云棘津猶孟津也似近之甘鹿傳其衆奔甘鹿杜注周地彚纂今河南府宜陽縣有鹿蹄山甘水所出疑甘鹿以此得名水經注鹿蹄山在陸渾故城西北以傳文證之似亦可據長岸經楚人及吳戰于長岸杜注楚地彚纂今江南太平府當途縣西南三十里有西梁山與東梁山夾江相對如門之闢亦曰天門山郡國志天門山一名蛾眉山春秋楚獲吳乗舟餘皇處也十八年大庭氏之庫傳梓慎登大庭氏之庫以望之杜注大庭氏古國名在魯城東魯於其處作庫髙顯故登以望氣疏炎帝神農氏一曰大庭氏今按又見昭五年大庫之庭鄅經邾人入鄅杜注鄅國今琅邪開陽縣彚纂水經注開陽在祊之東南沂水逕其南故鄅國也今兗州府沂州北十五里有開陽故城今按沂州今為府附郭設蘭山縣析白羽傳遷許于析實白羽杜注於傳時白羽改為析今按析見僖二十五年十九年隂傳楚工尹赤遷隂于下隂杜注隂縣今屬南鄉郡彚纂今湖廣襄陽府光化縣西漢水西岸有古隂縣城即下隂邑也郹陽傳郹陽封人之女奔之杜注察邑彚纂當在新蔡境蟲傳宋公伐邾圍蟲杜注邾邑彚纂當在濟寧州東境濮傳楚子為舟師以伐濮杜注南夷也彚纂案百濮叛楚杜注夷也昭元年趙孟曰吳濮有釁杜注建寧郡南有濮夷此年楚子伐濮杜注南夷三注不同而約言其地當在楚之西南境今按文十六年麇人率百濮伐楚麇為今之鄖陽百濮蓋與之相近牧誓孔傳云濮在江漢之間然則其地在楚之西北境耳又説見文十六年城父傳若大城城父而寘大子焉杜注城父今襄城城父縣今按城父俱當作父城漢地理志潁川郡父城縣也水經注汝水又東南與龍山水㑹水出龍山北流逕父城縣故城東楚平王大城父城以居太子建故杜預曰即襄城之父城縣也又按一統志故父城在今汝州東南父城保應國亦在此因昭九年許遷于夷實城父此年傳與杜注俱訛作城父不知城父在譙郡父城在襄城郡杜注原有别也父城近葉之方城故費無極之讒言曰建與伍奢將以方城之外叛若城父在今潁州府去方城逺矣彚纂失考正又説見僖二十四年應紀鄣傳莒子奔紀鄣杜注莒邑也東海贑榆縣東北有紀城彚纂寰宇記云在縣東北七十五里今山東莒州即江南贑榆縣界也時門傳鄭大水龍鬭于時門之外洧淵杜注鄭城門也今按鄭之南門洧淵傳見上杜注洧水出滎陽密縣東南至潁川長平入潁彚纂今洧水自密縣東流逕新鄭縣南門又東㑹溱水謂之雙洎河即洧淵也二十年鄸經曹公孫㑹自鄸出奔宋杜注曹邑彚纂在今兗州府曹州北今按曹州今為府鄄傳奪之司㓂與鄄杜注豹邑今按見莊十四年平壽傳衞侯在平壽杜注衞下邑蓋獲之門傳公孟有事于蓋獲之門外杜注衞郭門死鳥傳公如死鳥杜注衞地彭水傳公入與北宫喜盟于彭水之上今按彭水當近衞都詩清人在彭彭為河上之邑彭水其以此名與鬼閻傳其徒與華氏戰于鬼閻杜注潁川長平縣西北有閻亭彚纂今開封府陳州西華縣東北閻倉亭城是也今按西華今屬陳州府聊攝傳聊攝以東杜注齊西界也平原聊城縣東北有攝城彚纂今聊城屬東昌府今按攝又見僖元年聶北水經注引京相璠曰聊城縣東北三十里有故攝城今此城去聊城二十五里許按一統志古聊城在今聊城縣西北攝城在博平縣西南二十里愽平亦屬東昌在聊城之東姑尤傳姑尤以西杜注齊東界也姑水尤水皆在城陽郡東南入海彚纂姑水即登州府黄縣之大姑河尤水即萊州府掖縣之小姑河沛傳齊侯田于沛杜注澤名今按水經注時水至梁鄒城入于沛則沛亦近齊國都之水名遄臺傳晏子侍于遄臺今按水經注薄姑城内有髙臺齊景公飲于臺上即於是臺也在今青州府慱興縣東北晏子言蒲姑氏因之蓋指其所在之地也萑蒲澤傳取人于崔蒲之澤杜注萑蒲澤名彚纂疑即中牟澤周禮所謂圃田澤跨中牟洧川尉氏界今按水經注役水逕中牟澤即鄭太叔攻萑蒲之盗於是澤也又圃田見僖三十三年原圃二十一年横傳禦諸横杜注梁國睢陽縣南有横亭今按睢陽今商丘縣水經注睢陽縣西南有横城世謂之光城盧門傳華氏居盧門杜注宋東城南門南里經宋華亥向寧華定自陳入于宋南里以叛杜注宋城内里名彚纂在今商丘縣境舊墉桑林門傳宋城舊墉及桑林之門而守之杜注舊墉故城也桑林城門名今按湯嘗禱雨于桑林殷之樂有桑林之舞故宋以此名城門廚傳廚人濮曰杜注宋廚邑大夫鴻口傳齊師宋師敗吳師于鴻口杜注梁國睢陽縣東有鴻口亭彚纂今在歸徳府商丘虞城二縣界揚門傳公自揚門見之杜注睢陽正東門名楊門新里傳遂敗華氏于新里杜注華氏所取邑赭丘傳與華氏戰于赭丘杜注宋地彚纂後漢志陳國長平縣有赭丘城應在今開封府陳州西北境今按華氏以南里叛南里在宋城内救宋之師戰于赭丘其地蓋近國都故下文云大敗華氏圍諸南里則赭丘去南里不逺也長平之赭丘乃水經注洧水所逕地在陳鄭之間去宋逺同名耳非其地二十二年壽餘傳敗齊師于壽餘杜注莒地稷門傳盟于稷門之外杜注齊城門也今按蓋以稷下名門稷注見昭十年昌間經大蒐于昌間今按括地志昌平山在泗水縣南六十里有昌平鄉故山為名然則昌間其在泗水縣與北山傳王田北山杜注洛北芒也彚纂芒山一作邙山一曰平逢山亦曰郟山亦曰太平山今在河南府城洛陽縣東北連偃師孟津鞏三縣界今按汲冢周書作雒觧云周公作大邑成周于土中城方千七百二十文郛方七十里南繋於洛水北因於郊山即此山也榮錡氏傳崩于榮錡氏杜注河南鞏縣西有榮錡澗彚纂今屬河南府東陽傳荀吳畧東陽杜注晉之山東邑魏郡廣平以北今按馬融云晉地自朝歌以北至中山為東陽又見襄二十三年昔陽傳使師偽糴者負甲以息于昔陽之門外杜注故肥子所都今按昔陽鼓都非肥都也詳見昭十二及十五年郊要餞傳師郊要餞之甲杜注三邑周地領傳及領杜注周地劉傳劉子如劉今按隱十一年杜注云河南緱氏縣西北有劉亭今在偃師縣揚傳劉子奔揚杜注周邑彚纂路史曰宣王子曰尚父幽王封之曰楊侯其地平陽楊氏縣漢之河東縣也今山西平陽府洪洞縣東有揚城案傳云壬戌劉子奔揚癸亥如劉劉今偃師劉亭是揚邑距偃師不出百里外當即僖十一年揚拒泉臯之揚而非山西之揚侯國也平畤傳奔于平畤杜注周地京傳子朝奔京今按子朝奔京杜無注彚纂亦無釋豈以注釋在隱元年乎隱元年之京在滎陽為鄭邑不屬周當非子朝所奔考諸傳王師敗績于前城前城人敗陸渾于社晉大夫濟師渡伊洛取前城軍其東南王師軍于京楚因以伐京而子朝奔郊則京邑近前城在伊水之南洛陽之西南也圃車傳遂如圃車今按周地當近鞏縣之皇皇經劉子單子以王猛居于皇杜注河南鞏縣西南有黄亭彚纂後漢志湟水即皇也水經注洛水合於谿泉又東濁水注之即湟水也京相璠曰黄亭在訾城北三里今屬河南府前城傳以王師敗績于前城杜注子朝所得邑彚纂服䖍曰前讀為泉即泉戎地在伊闕南水經注伊水自新城又北逕前亭西即傳之前城也今按水經注引京相璠曰今洛陽西南五十里伊闕前亭東圉傳伐東圉杜注洛陽東南有圉鄉彚纂周地有東圉西圉東圉即圉鄉也在洛陽縣東南九州之戎傳晉籍談苟躒帥九州之戎杜注陸渾戎十七年滅屬晉州鄉之屬也五州為鄉王城經劉子單子以王猛入于王城杜注郟鄏即今河南縣彚纂括地志曰故王城一曰河南城本郟鄏周公所築自平王以下十二王皆都此至敬王乃遷都成周至赧王又居王城也在今河南府洛陽縣城内西偏社傳前城人敗陸渾于社杜注周地彚纂黄河自偃師界入鞏縣洛水入之有五社渡又為五社津光武遣耿弇等軍五社備滎陽以東即此隂傳帥師軍于隂今按疑即平隂見後二十三年侯氏傳于侯氏彚纂疑即緱氏今按緱氏今在偃師縣谿泉傳于谿泉杜注鞏縣西南有明谿泉彚纂水經注洛水又東明樂泉注之水出南原下五泉竝導故世謂之五道泉即古明谿泉也汜傳王師軍于汜今按此當為西汜開封府汜水縣今音祀古音凡與河南府鞏縣接界解傳于解杜注洛陽西南有大解小解彚纂後漢書洛陽大解城在今洛陽縣南其小觧城在縣西南也任人傳于任人按亦周邑京楚傳王師軍于京楚杜注子朝所在今按當在近京邑之地二十三年郊經晉人圍郊杜注周邑鄩傳郊鄩潰杜注河南鞏縣西南有地名鄩中彚纂括地志鄩城在鞏縣西南五十八里水經注云蓋周大夫鄩肸之舊邑也平隂傳晉師在平隂杜注今河隂縣彚纂平隂古為津濟處漢置平隂縣魏改曰河隂寰宇記平隂故城東有平川謂之河隂川今故城在河南府孟津東一里澤邑傳王師在澤邑彚纂賈逵曰澤即翟泉也翼傳邾人城翼杜注邾邑今按見隱元年離姑傳還將自離姑杜注邾邑彚纂今在費縣故武城之南箕傳乃館諸箕今按當近西河之箕見僖三十三年雞父經吳敗頓胡沈蔡陳許之師于雞父杜注楚地安豐縣南有雞備亭彚纂今鳯陽府壽州西南六十里有安豐故城雞備亭又在其城西南訾傳單子取訾杜注在河南鞏縣西南彚纂路史曰訾有二西訾在洛東訾在鞏此西訾也今按洛無訾城東西訾皆在鞏縣路史誤今按東訾見後二十四年牆人直人傳劉子取牆人直人杜注皆子朝邑彚纂牆一作嗇路史曰嗇廧也今河南府新安縣東北有白牆村疑是其處尹傳王子朝入于尹杜注尹氏之邑彚纂今山西汾州有尹吉甫墓即古尹城也今按子朝從京八尹從尹入王城皆在周地若山西汾州府距河南逺其地屬晉雖有尹吉墓當非東周尹氏之邑也水經叙洛水逕宜陽縣故城南注云洛水又東共水入焉水北出長石山其西有共谷共水出焉南流得尹谿口水出西北尹谷疑尹氏邑以尹谿尹谷得名然則尹邑在宜陽與阪道尹道傳單子從阪道劉子從尹道伐尹今按皆周邑左巷傳王子朝入于王城次于左巷杜注近東城唐傳尹辛敗劉師于唐杜注周地彚纂後漢志洛陽有唐聚在今洛陽縣東西闈傳取西闈杜注周地蒯傳攻蒯杜注河南縣西南蒯鄉是也彚纂晉地道記曰河南縣西南有蒯亭今在洛陽縣西南狄泉經天王居于狄泉杜注洛陽城内大倉池水也時在城外彚纂定元年城成周乃繞之入城内也亦曰翟泉在洛陽縣東故洛陽城中今堙今按又見僖二十九年翟泉三川傳周之亡也其三川震杜注謂幽王時也三川涇渭洛也地動岸崩郹傳楚太子建之母在郹杜注郹陽也彚纂蔡邑應在今新蔡境今按郹陽見昭十九年薳澨傳乃縊于薳澨杜注楚地彚纂在今湖廣安陸府京山縣今按胡渭曰司馬薳越縊於蓬澨今左傳本非薳澨蓋以上有薳字而誤郢傳楚囊瓦為令尹城郢今按楚文王自丹陽遷都于郢今荆州府城北十里紀南城是也後子囊將死遺言謂子庚必城郢及平王時囊瓦遂城之今府城東北三里故郢城是也二十四年鄔傳王子朝入于鄔杜注緱氏西南有鄔聚今按見隱十一年乾祭傳士伯立于乾祭杜注王城北門瑕杏傳王子朝之師攻瑕及杏杜注敬王邑今按此瑕别是一地非解州之瑕也東訾傳與之東訾杜注鞏縣西南訾城是也彚纂後漢志鞏有東訾今名訾城在鞏縣西南四十里俗名訾店以有西訾故言東以别之圉陽傳王及圉陽而還杜注楚地二十五年闞傳叔孫昭子如闞今按見桓十一及定元年長府傳公居于長府杜注官府名今按即論語魯人為長府臺傳平子登臺而請今按見定十二年武子臺沂上傳請待于沂上以察罪杜注魯城南自有沂水大沂水出蓋縣南至下邳入泗疏土地名此沂水出魯國魯縣西南入泗水今按此小沂水即論語浴乎沂之沂水經注出魯城東南尼丘山流逕魯城南又至城西南與泗水合陽州經公孫于齊次于陽州杜注齊魯竟上邑彚纂今兗州府東平州東北有陽州城是也案襄三十一年齊閭丘嬰伐陽州杜注魯地定八年公侵齊門于陽州蓋陽州本屬魯而後為齊有也今按東平州今屬泰安府野井經齊侯唁公于野井杜注濟南祝阿縣東有野井亭彚纂今在齊河縣東濟河北岸今按齊河屬濟南府曲棘經宋公佐卒于曲棘杜注陳留外黄縣中有曲棘里宋地彚纂當在今開封府杞縣境今按水經注外黄縣有渠水為宋之曲棘里故宋之别都也又宣二年戰于大棘彚纂謂睢州西曲棘里有棘城則曲棘又在睢州亦相近也郈傳奔郈杜注在東平無鹽縣東南彚纂漢志無鹽縣有郈鄉今兗州府東平州東四十里有郈城今按東平州今屬泰安府桐汝傳伏諸桐汝之間杜注里名州屈傳楚子使薳射城州屈按杜無注茄傳復茄人焉按杜無注丘皇傳城丘皇按杜無注訾傳遷訾人焉按杜無注卷傳季然郭卷杜注卷城在南陽葉縣南彚纂後漢志葉有卷城水經注汝水東南流逕建城東建當作卷即葉縣之卷城也今南陽府葉縣西南有建城故城即其地二十六年曲棘傳子猶言于齊侯曰君若待于曲棘疏曲棘宋地齊侯欲納魯君當是從齊向魯必不逺渉宋地土地名齊地無曲棘十年傳桓子召子山而反棘焉此即彼棘也本無曲字涉上卒于曲棘誤加曲耳今按此説得之齊地之棘為棘里亭在臨淄見昭十年淄傳伐齊師之飲馬于淄者杜注淄水出泰山梁父縣西北入汶彚纂水經注淄水逕梁父縣故城南又西南逕柴縣故城北世謂之柴汶漢梁父縣在今泗水縣北四十里今按此淄水為柴汶非臨淄之淄水經注淄水逕柴縣故城北之後云又逕成邑北春秋成人伐齊師飲馬於斯水者也炊鼻傳師及齊師戰于炊鼻杜注魯地今按戰于成地當在今寧陽縣境尸氏傳劉人敗王城之師于尸氏杜注尸在鞏縣西南偃尸城彚纂漢志偃師有尸鄉殷湯所都今河南府偃師縣西南有新蔡鎮即古尸鄉春秋時之尸氏殷西亳也故亦名亳城今按襄十一年之亳城公榖作京城疑非此地説見襄十一年鄟陵經公㑹齊侯莒子邾子杞伯盟于鄟陵杜注地闕今按鄟陵其即成六年魯所取之鄟乎當為魯之東鄙地近鄆施谷傳王城人劉人戰于施谷今按周地見後萑谷渠傳七月己巳劉子以王出庚午次于渠杜注周地彚纂案即周陽渠也在今河南府洛陽縣劉澄之永初記言城西有陽渠周公制之是也亦謂之九曲瀆褚氏傳王宿于褚氏杜注洛陽縣南有褚氏亭彚纂後漢志洛陽有褚氏聚今在洛陽縣東萑谷傳王次于萑谷杜注周地彚纂案後漢書孫堅進軍大谷距洛九十里其谷連亘至潁陽縣何進設八闗大谷其一也周之萑谷施谷其支徑耳胥靡傳王入于胥靡杜注周地本鄭邑彚纂今河南府偃師縣東南四十里有胥靡城滑傳王次于滑杜注周地本鄭邑今按詳莊十六及成十三年闕塞傳使女寛守闕塞杜注洛陽西南伊闕口也彚纂今洛陽縣南闕塞山是今按水經注伊水東北逕前亭西又北過伊闕中昔禹疏以通水兩山相對望之若闕伊水歴其間北流春秋闕塞是也胡渭云闕塞亦曰龍門山一名闕口山又名鍾山在洛陽縣西南三十里莒傳隂忌奔莒以叛杜注周邑圉澤傳遂軍圉澤杜注周地彚纂即東圉之澤也今在洛陽縣東境隄上傳次于隄上杜注周地成周經天王入于成周杜注今洛陽今按吕氏祖謙曰漢河南縣即郟鄏武王遷九鼎周公營以為都是為王城洛誥所謂卜澗水東瀍水西帷洛食者也漢洛陽縣周公營下都以遷殷頑民是為成周洛誥所謂卜瀍水東亦惟洛食者也平王東遷定都於王城子朝之亂其餘黨多在王城敬王畏之徙都成周胡渭曰王城即郟邑漢為河南縣其故城在今洛陽縣西北下都即成周漢為洛陽縣河南郡治其故城在今洛陽縣東北二十里二城東西相去四十里而今洛陽縣居其中隋大業初營新都始移二縣於都城内今又省河南入洛陽也彘傳居王于彘今按彘城在今山西平陽府霍州漢為彘縣二十七年潛傳帥師圍潛杜注楚邑在廬江六縣西南彚纂今江南廬州府霍山縣東北三十里有灊城今按霍山今屬六安州延州來傳使延州來季子聘于上國杜注季子本封延陵後復封州來故曰延州來今按説見襄三十一年按趙汸左傳補註曰釋例土地名延州來闕杜意謂吳地别有州來按十三年吳滅州來十九年楚人城州來則州來未為吳有可知二十三年吳伐州來楚薳越以諸侯之師救州來師敗二君滅楚師大奔二十四年吳更滅巢及鍾離則州來自薳越不能救卒為吳有可知矣然則季子所封不必别有其地按趙氏所考者是至哀二年蔡遷于州來而州來為蔡都矣窮傳與吳師遇于窮疏釋例土地名窮闕彚纂水經注窮水出安豐縣窮谷即楚與吳師遇處在今鳳陽府霍丘縣西今按霍丘今屬潁州府縣西南有安豐故城縣西有窮水而彚纂於襄四年注云窮水在英山縣境沙汭傳及沙汭而還杜注沙水名彚纂水經注汴沙到浚儀而分汴東注沙南流至義城縣西南入於淮謂之沙汭楚東地也義城故城在今懐逺縣東北鍾吾傳公子燭庸奔鍾吾杜注小國彚纂漢志東海郡司吾應劭曰左傳執鍾吾子今江南邳州宿遷縣西北有司吾城今按邳州宿遷今皆屬徐州府且知傳公徒敗于且知杜注近鄆地二十八年乾侯經公如晉次于乾侯杜注在魏郡斥丘縣晉竟内邑彚纂闞駰曰地多斥鹵故曰斥丘今直𨽻廣平府成安縣東南有斥丘古城今按一云斥丘故城在成安縣西春秋晉乾侯也漢書顔師古注乾音干言其地水常涸也鄔傳司馬彌牟為鄔大夫杜注太原鄔縣彚纂今鄔城故址在太原府介休縣東北二十七里今按介休今屬汾州府祁傳賈辛為祁大夫杜注太原祁縣彚纂今太原府祁縣東南八里有古祁城平陵傳司馬烏為平陵大夫彚纂案平陵亦曰大陵今太原府文水縣東北二十里有大陵故城今按戰國時趙改大陵漢因之後魏置受陽縣隋改曰文水梗陽傳魏戊為梗陽大夫杜注在太原晉陽縣南彚纂漢志榆次縣有梗陽鄉今太原府清源縣南有梗陽城案清源本漢榆次縣地隋分置清源縣故梗陽在清源境今按又見襄十八年塗水傳知徐吾為塗水大夫杜注太原榆次縣彚纂漢志榆次縣有塗水鄉今塗水故城在太原府榆次縣西南二十里馬首傳韓固為馬首大夫彚纂元和郡縣志馬首故城在壽陽縣東南十五里今屬太原府今按壽陽本馬首邑漢為榆次縣之東境晉始置壽陽縣舊屬太原府今以平定州為直𨽻州壽陽屬之盂傳孟丙為盂大夫杜注太原盂縣彚纂案兩漢志盂縣孟丙邑即今太原府盂縣也今按盂本仇猶國晉滅之以為盂縣戰國趙為源仇城漢置盂縣舊屬太原府今屬平定州銅鞮傳樂霄為銅鞮大夫杜注上黨銅鞮縣彚纂今山西沁州西南有銅鞮故城平陽傳趙朝為平陽大夫杜注平陽平陽縣彚纂古平陽即堯所都今故城在平陽府臨汾縣西南楊氏傳僚安為楊氏大夫杜注平陽楊氏縣彚纂今古陽城在平陽府洪洞縣南二里又名危城村是也今按又見襄二十九年楊及二十二年揚二十九年鄻傳王子趙車入于鄻以叛杜注周邑飂傳昔有飂叔安杜注古國也彚纂漢志南陽郡湖陽縣故廖國也師古曰廖音力救反左氏傳作飂其音同耳湖陽故城在今河南南陽府唐縣南今按又見桓蓼十一年鬷川傳封諸鬷川杜注鬷水上夷皆董姓魯縣傳懼而遷于魯縣杜注今魯陽也彚纂今河南汝寧府魯山縣西北有魯陽故城今按魯山今屬汝州窮桑傳遂濟窮桑杜注地在魯北彚纂即少皥之虚也今按窮桑在魯城北少皥氏自窮桑登帝後徙于曲阜汝濱傳晉趙鞅荀寅帥師城汝濱杜注晉所取陸渾地彚纂陸渾今嵩縣汝水在縣南三十年養傳逆吳公子使居養彚纂今開封府陳州沈丘縣東有養城是其地也今按沈丘今屬陳州府胡田傳取于城父與胡田以與之杜注故胡子之地三十一年適歴經季孫意如㑹晉荀躒于適歴杜注晉地夷潛六傳吳人侵楚伐夷侵潛六杜注皆楚邑彚纂夷在今亳州故潛城六城在今壽州俱屬鳳陽府今按潛在六安州之霍丘注見昭二十七年六當即故六國今為六安州注見文五年皆非壽州地也濫經黒肱以濫來奔杜注東海昌慮縣彚纂今昌慮故城在兗州府滕縣東南定公元年大陸傳魏獻子田于大陸杜注禹貢大陸在鉅鹿縣北嫌絶逺疑此田在汲郡吳澤荒蕪之地彚纂案吳澤陂懐慶修武縣北一名太白陂即三橋陂也今按水經注大陸即吳澤寗傳還卒于寗杜注今修武縣近吳澤疏寗即修武也彚纂今修武縣治西有修武故城水經注修武故寗也韓詩外傳武王伐紂勒兵於寗更名寗曰修武今按又見文五年邳傳奚仲遷于邳杜注下邳縣今按見昭元年壞隤傳䘮及壞隤今按魯邑見成十六年闞傳季孫使役如闞公氏將溝焉杜注闞魯羣公墓所在也季孫惡昭公欲溝絶其兆域不使與先君同傳塟昭公于墓道南孔子之為司冦也溝而合諸墓杜注明臣無貶君之義今按魯羣公墓在汶上縣南旺湖闞亭在南旺湖中見桓十一年程恂曰今昭公墓猶有溝合故迹二年桐傳桐叛楚杜注小國廬江舒縣西南有桐鄉彚纂今江南安慶府桐城縣北有古桐城即古桐國也與廬江縣接三年平中傳鮮虞人敗晉師于平中杜注晉地拔經仲孫何忌及邾子盟于拔杜注地闕彚纂或曰當在兗州府境今按傳言盟于郯似是今沂州府郯城縣之地郯見宣四年郯傳盟于郯修邾好也杜注郯即拔也今按説見上四年中山傳中山不服杜注中山鮮虞今按鮮虞亦曰中山自是中國姬姓國杜謂白狄别種非也至戰國時為一小國今直𨽻之定州曲陽及正定府之靈壽藁城等縣皆中山地鮮虞見昭十二年臯鼬經公㑹諸侯盟于臯鼬杜注繁昌縣東南有城臯亭彚纂水經注潁水逕臨潁縣又東南逕澤城北即古城臯亭今在開封府臨潁縣界今按繁昌城在臨潁縣西北魏置縣東晉時流民流入春榖僑立繁昌縣今屬江南太平府非此繁昌也臨潁今屬許州府封父傳封父之繁弱杜注古諸侯也彚纂漢置封丘縣今屬開封府縣治安西坊西北有封父亭商奄傳因商奄之民杜注商奄國名今按奄國名都於曲阜成王滅之以其地封魯商奄謂商時之奄國也少皥之虚傳封于少皥之虚杜注曲阜也在魯城内彚纂帝王世紀云少皥邑於窮桑以登帝位徙於曲阜今曲阜故城有少皥陵武父傳自武父以南杜注衞北界今按武父城在大名府東明縣境見桓十二年圃田傳及圃田之北竟杜注鄭藪名今按見僖三十三及昭二十年有閻之土傳取于有閻之土以共王職杜注衞所受朝宿之邑蓋近京畿今按昭九年周甘人與晉閻嘉爭閻田是閻地近甘甘在河南府洛陽縣則有閻之土亦當近其地相土之東都傳取于相土之東都以㑹王之東蒐杜注為湯沐邑王廵守以助祭泰山殷虚傳封于殷虚杜注朝歌也彚纂今河南衞輝府淇縣北五里有殷墟橋是其地夏虚傳封于夏虚杜注大夏今太原晉陽也容城經許遷于容城今按水經注容城即華容縣今荆州府監利縣地柏舉經蔡侯以吳子及楚人戰于柏舉彚纂名勝志云麻城縣東北三十里有柏子山縣東南有舉水柏舉之名蓋合柏山舉水而得之其説未知何據案傳文子常濟漢自小别至于大别又三戰而陳於柏舉是在漢之東北矣其地應在麻城境也今按麻城屬湖廣黄州府傅遜謂河南西平縣本柏子國以此釋柏舉誤矣豫章傳自豫章與楚夾漢杜注漢東江北地名今按説見昭六及十二年大隧直轅冥阨傳還塞大隧直轅冥阨杜注三省漢東之隘道彚纂道鑑地理通釋曰義陽三闗左傳大隧即黄峴直轅冥阨乃武陽平靖也黄峴今名九里關在信陽軍南百里武陽在今大寨嶺信陽軍東南九十里平靖今名行者陂信陽軍南七十五里案魏置義陽郡義陽有三闗之塞義陽在宋為信陽軍今信陽州是也屬河南汝寧府今按胡渭曰應山縣北有義陽三闗一曰平靖闗一曰黄峴闗又名百鴈闗一曰武陽闗又名澧山闗即古之大隧直轅冥阨也大隧即武陽直轅即黄峴冥阨即平靖也按此與通釋小異蓋三闗自西而東平靖在西黄峴在中武陽在東左傳所舉者自東而西故大隧在東直轅在中冥阨在西宜如胡氏所配也應山縣屬湖廣徳安府隨州在汝寧府信陽州之南信陽州唐為申州唐元和志云平靖闗在應山北六十五里北至申州九十里東至百鴈闗百六十里百鴈闗在應山北九十里北至申州九十里東至澧山闗百里澧山闗在應山東北一百三十里北至申州一百五十里此里至更為詳悉又按西頭之𡨕阨或作黽史記春申君傳踰黽隘之塞而攻楚楚世家涉黽塞而待秦之倦戰國䇿填黽塞之内而投己乎黽塞之外是也又作鄳戰國䇿塞鄳阨吕覽淮南九塞鄳其一是也漢置鄳縣今為汝寧府信陽州羅山縣黽鄳皆音盲城口傳塞城口而入杜注三隘道之總名武城傳武城黒謂子常今按一統志信陽州東北二十五里有武城蓋武城黒之邑小别大别傳乃濟漢而陳自小别至于大别杜注禹貢漢水至大别南入江然則此二别在江夏彚纂小别山名今在湖廣漢陽府漢川縣北一名甑山大别山名今在漢陽府漢陽縣東北一名魯山今按胡渭云孔疏謂小别當在大别之東子常從小别與吳戰退而至大别明自東而漸西也按自豫章與楚夾漢謂吳軍漢東楚軍漢西也子常濟漢而陳自小别至于大别言其師衆為長陳自西及東若此其逺也小别當在大别之西孔疏正相反今二别相去一百二十餘里清發傳吳從楚師及清發杜注水名彚纂水經注溳水南逕石岩山北亦謂之清水晉鎮南將軍劉宏遣牙將皮初敗張昌於清水即清發也今湖廣德安府安陸縣城西八十里有石門山即石岩山溳水逕其下今按元和志安陸縣溳水故清發水也西北自隨縣流入注于沔雍澨傳敗諸雍澨彚纂今安陸府京山縣西南有三澨春秋之雍澨其一也睢傳涉睢杜注睢水出新城昌魏縣東南至枝江縣入江是楚王西走彚纂今湖廣安陸府當陽縣北一里有沮水相傳即楚昭王西涉處息傳左司馬戎及息而還杜注汝南新息也今按新息河南光州之息縣雲中傳楚子涉睢濟江入于雲中杜注雲夢澤中所謂江南之夢疏土地名南郡枝江縣有雲夢城江夏安陸縣東南亦有雲夢城或曰南郡華容縣東南有巴丘湖江南之夢也郢都在江北睢東王走西涉睢又南濟江乃入于雲中知此在江南昭三年王與鄭伯田江南之夢謂此也言江南之夢則江北亦有夢矣今按傳遜曰雲中雲夢澤中蓋江北之夢在今德安府考睢漢二水皆入江楚子涉睢而西復還入睢由睢而入江遶吳其之南而北濟以入鄖自鄖而奔隨也觧以為江南之夢非胡渭曰吳師自東來故昭王自郢西走至枝江縣界涉睢濟江而南東行入雲中杜注以為江南之夢則雲中在江南明甚沈存中謂奔鄖時自江南涉江而北至雲誤矣方吳之勝楚也循江北岸而西昭王若東走則遺之禽矣迨入郢處宫之後始可從東道奔鄖耳涉睢是西行濟江乃南渡所入之雲中必不在江北也按胡氏之説是前已言涉睢此又云涉睢者接前文非兩次涉睢也又見宣四年夢中昭三年江南之夢五年東野傳季平子行東野杜注季氏邑彚纂蓋東野及房皆近費之地房傳還未至卒于房今按此房當即近費之防見隱元年顧炎午謂防房二字史記漢書多通用也稷傳而自稷㑹之杜注楚地彚纂當在南陽府桐柏縣境沂傳大敗夫槩王于沂杜注楚地軍祥傳敗吳師于軍祥杜注楚地彚纂當在隨州西南堂谿傳夫槩王奔楚為堂谿氏彚纂楚地水經注濯水出汝南吳房縣吳房西北有堂谿城即此也吳房本房子國楚封夫槩於此故曰吳房今汝寧府遂平縣西吳房故城北有堂谿城又見昭十三年房麇傳吳師居麇杜注地名彚纂今湖廣岳州府巴陵縣東有麇城今按當是楚滅麇後遷麇人於此公壻之谿傳又戰于公壻之谿杜注楚地名成臼傳王之奔隨也將入于成臼杜注江夏竟陵縣有臼水出聊屈山西南入漢彚纂今漢陽府漢川縣有臼水亦名臼子河西南與漢水合今按漢竟陵縣石晉改為景陵今安陸府天門縣也在府東南二百餘里水經注漢水又東逕石城西又東南與臼水合吳入郢昭王奔隨濟于成臼謂是水也石城即今安陸府治鍾祥縣而鍾祥亦兼有竞陵地然則成臼水在安陸府之東南而漢川之臼子河非其地脾洩傳國于脾洩杜注楚地彚纂近郢都當在今荆州府境六年匡傳公侵鄭取匡今按此匡為鄭邑當是陳州府扶溝縣之匡城注見文元年豚澤傳舍于豚澤今按衞地馮傳鄭伐馮滑胥靡負黍狐人闕外杜注鄭伐周六邑彚纂東觀漢記曰魏之别封曰華侯華侯孫長卿食采於馮城即此負黍傳見上杜注陽城縣西南有負黍亭彚纂今河南登封縣有負黍聚一曰黄城是也狐人傳見上彚纂後漢志潁隂縣有孤宗鄉古狐人亭也在今開封府詳州臨潁縣今按縣屬許州府闕外傳見上彚纂即伊闕外之邑也在今河南府洛陽縣南闕塞山下今按闕塞見昭二十六年緜上傳趙簡子逆而飲之酒于緜上今按僖二十四年緜上杜注西河介休縣顧炎午云樂祁自宋如晉其路豈出於西河介休今翼城縣西亦有緜山俗謂之小緜山近曲沃當必是簡子逆樂祁之處此説當是襄十三年晉侯蒐于緜上以治兵亦是其地也又説見僖二十四年姑蕕傳天王處于姑蕕杜注周地七年儀栗傳周儋翩入于儀栗以叛杜注周邑窮谷傳單武公劉桓公敗尹氏于窮谷今按周地亦如萑谷施谷之類見昭二十六年鹹經齊侯鄭伯盟于鹹杜注衞地今按在今開州近衞都見僖十三年沙經齊侯衞侯盟于沙杜注陽平元城縣東北有沙亭彚纂晉太和五年秦王猛圍鄴慕容垂自沙亭屯内黄是也在今元城縣東𤨏傳乃盟于𤨏杜注𤨏即沙也彚纂晉地道記元城縣有𤨏陽城今按沙公羊作沙澤與成十三年𤨏澤同當是一地八年榖城傳單子伐榖城杜注在河南縣西彚纂後漢志河南郡榖城湟水出今洛陽縣西有榖城故城水經注城西臨榖水故名今按榖澗二源至新安而合流通謂之澗東遷後謂之榖經榖城縣西簡城傳單子伐簡城彚纂周有簡師父簡城蓋其采地也孟傳劉子伐孟彚纂周邑今懐慶府河内縣西北有䢴臺鎮古孟國也水經注京相璠曰野王西北三十里有故䢴城䢴臺是也今按即隱十一年王所取於鄭之䢴大行傳卒于大行杜注晉東南山今按見襄二十三年州傳乃止諸州杜注晉地今按見隱十一年及昭三年瓦經公㑹晉師于瓦杜注衞地東郡燕縣東北有瓦亭彚纂水經注酸瀆水自燕城東逕滑臺城又東南逕瓦亭南今直𨽻大名府滑縣東南瓦亭岡集古瓦亭也今按滑縣今屬河南衞輝府鄟澤傳晉師將盟衞侯于鄟澤杜注自瓦還就衞地盟曲濮經衞侯鄭伯盟于曲濮杜注衞地彚纂蓋濮水曲折之處猶言河曲汾曲也在今山東東昌府濮州境今按濮州今屬曹州府蒲圃傳將享季氏于蒲圃而殺之今按魯東門外地見襄四年十九年上東門傳帥成人自上東門入杜注魯東城之北門棘下傳又戰于棘下杜注魯城内地名九年萊門傳伐陽闗陽虎使焚萊門杜注陽闗邑門中牟傳晉車千乗在中牟杜注今滎陽有中牟縣廻逺疑非也彚纂索隱曰此中牟當在河北非鄭之中牟也正義蕩隂縣西有牟山中牟蓋在其山之側今河南彰徳府湯隂縣西有中牟城在牟山下正當衞走邯戰之道是其地也今按晉為趙氏之邑佛肸以中牟叛即此中牟水經注以滎陽中牟為是誤矣五氏經齊侯衞侯次于五氏杜注晉地彚纂蓋晉大夫邯鄲午之私邑今直𨽻廣平府邯戰縣西有五氏城亦曰寒氏城禚媚杏傳齊侯致禚媚杏于衞杜注三邑皆齊西境彚纂媚當在濟南禹城縣杏當在東昌博平縣今按禚見莊二年十年夾谷祝其傳公㑹齊侯于祝其實夾谷杜注夾谷即祝其也按服䖍云東海祝其縣彚纂地理志濟南淄川縣西南三十里有甲山亦名夾山一名祝山上有夾谷臺為定公㑹齊侯處案齊魯兩君相㑹不應去齊若此之近去魯若北之逺今萊蕪縣有夾谷峪名勝志以為萊兵刼魯侯處庶㡬近之今按夾谷有三一謂夾谷即祝其今江南海州贑榆縣是其地贑榆志云祝其故城在縣南五十里夾谷山西南十五里此祝其既非一地而地又太逺且偏二則淄川之夾山祝山又有齊太近魯太逺之疑萊蕪夾谷一統志亦竝載之顧炎午云水經注萊蕪縣城在萊蕪谷舊説云齊靈公滅萊萊民播流此谷邑落荒蕪故曰莢蕪夾谷之㑹齊侯使萊人以兵刼魯侯是㑹於此地故得萊人非召之東萊千里之外也不可泥祝其之名而逺求之海上矣鄆讙龜隂田經齊人萊歸鄆讙龜隂田杜注三邑皆汶陽田泰山博縣北有龜山隂田在其北也彚纂博縣今之泰安州州境無龜山今龜山在新泰縣之西南泗水縣之東北蓋與泰安州相接也今按新泰今屬泰安府泗水屬兗州府鄆見成十六年讙見桓三年邯鄲傳衞侯伐邯鄲午于寒氏杜注廣平縣也彚纂今直𨽻廣平府邯鄲縣西南有邯鄲故城即俗名趙王城是也寒氏傳見上杜注即五氏宿傳駟赤先如宿杜注東平無鹽縣故宿國彚纂隱元年及宋人盟于宿即此安甫經齊侯衞侯鄭游速㑹于安甫杜注地闕十一年蕭經宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛杜注宋邑疏蕭叔大心者宋蕭邑大夫平宋亂立桓公宋人以蕭邑封叔為附庸宣十二年楚滅之復為宋邑今按見莊十二年十二年郊傳衞公孟彄伐曹克郊杜注曹邑彚纂當在兗州府曹縣界今按曹縣今屬曹州府武子臺傳登武子之臺今按水經注曲阜上有季氏宅宅有武子臺今雖崩夷猶髙數丈姑蔑傳敗諸姑蔑彚纂魯地隱元年盟于蔑即此括地志姑蔑故城在泗水縣東四十五里今屬兗州府故城在縣治東南黄經公㑹齊侯盟于黄今按黄齊地此即桓十七年盟于黄宣八年公子遂如齊至黄乃復之黄也詳見桓十六年十三年垂葭郹氏經齊侯衞侯次于垂葭傳實郹氏杜注垂葭改名郹氏髙平鉅野縣西南有郥亭彚纂今屬兗州府濟寧州今按鉅野今屬曹州府河内傳鋭師伐河内杜注今河内汲郡彚纂漢置河内郡晉分置汲郡治汲縣今為衞輝府治蛇淵囿經築蛇淵囿彚纂水經蛇水又西逕鑄城西左傳所謂蛇淵囿也京相璠曰濟北有蛇丘城城下有水魯囿也今蛇丘故城在濟南府肥城縣南晉陽傳吾舍諸晉陽杜注趙鞅邑今按秦置晉陽縣為太原郡治所歴代因之宋移太原郡治於陽曲縣而晉陽為其屬縣明改為太原縣在府治西南四十五里十四年於越經於越敗吳于檇李杜注越國也今按於發聲檇李經見上杜注吳郡嘉興縣南醉李城彚纂今屬浙江嘉興府檇李城在縣南四十五里陘傳卒于陘去檇李七里牽經公㑹齊侯衞侯于牽杜注魏郡黎陽縣東北有牽城彚纂路史内黄西南三十里有故牽城今故牽城在内黄之西南濬縣之北二縣屬直𨽻大名府濬縣為漢黎陽與内黄縣接壤今按濬縣今屬衞輝府脾上梁間傳公㑹齊侯衞侯于脾上梁之間杜注即牽洮經齊侯宋公㑹于洮杜注曹地今按見僖八年盂傳大子蒯聵獻盂于齊杜注邑名今按蓋衞東境之邑莒父經城莒父及霄彚纂魯邑案莒係以父魯人語音如梁父亢父剛父是也今莒州地霄經見上彚纂魯邑在今莒州境潞傳晉人敗范中行氏之師于潞今按故赤狄潞子之地也見宣十五年百泉傳又敗鄭師及范氏之師于百泉彚纂衞地在今衞輝府輝縣西北蘇門山下衞源也一曰百門陂亦曰百門泉十五年老丘傳鄭罕達敗宋師于老丘杜注宋地彚纂今河南陳留縣北四十五里有老丘城渠蒢經齊侯衞侯次于渠蒢傳作蘧挐今按謀救宋當為宋地哀公元年夫椒傳吳王夫差敗越于夫椒杜注吳郡吳縣西南太湖中椒山彚纂通典包山一名天椒山即西洞庭山也今在蘇州府吳縣西南㑹稽傳保于㑹稽杜注上㑹稽山也在㑹稽山隂縣南彚纂水經注㑹稽之山古防山也亦謂之茅山又曰棟山周禮所謂揚州之鎮也在今紹興府㑹稽縣東南十二里有仍傳歸于有仍今按昭四年夏桀為仍之㑹杜注仍國名虞傳逃奔有虞杜注舜後諸侯也梁國有虞縣彚纂今歸徳府虞城縣南三里有故虞城本舊縣址古虞國也今按禹封商鈞之地綸傳而邑諸綸杜注虞邑彚纂今虞城縣東南三十里有故綸城是也棘蒲傳伐晉取棘蒲彚纂晉地今趙州城中有棘蒲社今按趙州在正定府南一百十里今為直𨽻州二年絞傳伐邾將伐絞杜注邾邑彚纂當在兗州府滕縣境句繹經叔孫州仇仲孫何忌及邾子盟于句繹杜注邾地疏案十四年小邾以句繹來奔此云邾地蓋國竟相近所屬無常若莒魯爭鄆之等彚纂今在兗州府鄒縣境戚傳晉趙鞅納衞大子于戚宵迷陽虎曰右河而南必至焉杜注是時河北流過元城界戚在河外今按大名府治元城縣府南一百六十里為開州戚城在州城北七里禹河本不至此杜言是時遇元城者定王五年河徙非禹時故道故也鐵上經晉趙鞅帥師及鄭罕達帥師戰于鐵杜注鐵在戚城南傳登鐵上杜注鐵丘名彚纂今開州有戚城其南為王合里即鐵丘也三年啟陽經季孫斯叔孫州仇帥師城啟陽杜注今琅邪開陽縣彚纂今沂州北十五里有開陽故城本鄅國後屬魯名啟陽也今按沂州今為府又見昭十八年鄅四年負函傳左司馬敗申公壽餘葉公諸梁致蔡於負函杜注此蔡之故地人民楚因以為邑彚纂當在今信陽州今按信陽州今屬汝寧府繒關傳致方城之外于繒闗杜注楚地今按當在南陽府裕州方城在裕州見僖四年梁霍傳為一昔之期襲梁及霍杜注梁河南梁縣西南故城梁南有霍陽山皆蠻子邑也今按河南汝州西南四十五里有梁縣故城霍陽故縣在汝州東南二十里霍山下水經注又有霍陽聚蠻氏傳單浮餘圍蠻氏今按見成六年隂地傳蠻子赤奔晉隂地今按隂地邑在盧氏縣説見宣二年下文使謂隂地之命大夫士蔑謂晉大夫守隂地者杜以晉河南山北自上洛以東至陸渾皆為隂地而以命大夫為别縣監尹非也豐析傳司馬起豐析與狄戎以臨上雒杜注析縣屬南鄉郡析南有豐鄉皆楚邑彚纂今河南府淅川縣西南有豐鄉城其地與鄖陽相按今淅川縣及内鄉縣之西北境皆析地也又見僖二十五及昭十八年莵和傳左師軍于莵和杜注莵和山在上洛東彚纂今西安府商州東有莵和山通襄漢之道按商州今直𨽻陜西倉野傳右師軍于倉野杜注在上洛縣彚纂今商州東南有倉野聚今按水經注丹水自倉野又東歴莵和山胡渭云今商州南百四十里有倉野聚少習傳將通于少習以聽命杜注商縣武闗也彚纂武闗在商州東少習山下故亦名少習今按水經注云丹水歴莵和山又東南逕商縣南歴少習出武闗少習楚通上洛阨道文𨽻曰武闗在淅縣西一百七十里胡渭云武闗在商州東南一百八十里九州之戎傳士蔑乃致九州之戎杜注九州戎在晉隂地陸渾者今按又見昭二十二年三户傳以畀楚師于三户杜注丹水縣北有三户亭彚纂漢桓帝河間孝王子傅封三户亭侯即此今南陽府淅川縣西南有三户城今按水經注又云丹水又東南淅水注之又東南逕三户城又逕丹水縣故城西南胡渭云今内鄉縣西南有三户城臨傳趙稷奔臨杜注晉邑彚纂今真定府臨城縣東有臨城故城春秋晉臨邑漢之房子縣也今按臨城今屬趙州郉傳國夏伐晉取郉任欒鄗逆畤隂人盂壺口杜注八邑晉地今按郉見隱五年襄二十六年任傳見上今按見襄三十年欒傳見上杜注在趙國平棘縣西北彚纂今欒城縣及趙州北境皆古欒邑地屬真定州今按欒城今屬正定府趙州今為直𨽻州又見桓三年鄗傳見上杜注鄗即髙邑縣也彚纂今真定府柏鄉縣北故城鎮即故鄗城地晉髙邑也今按趙州有鄗邑縣柏鄉縣皆鄗邑地也逆畤傳見上彚纂水經注濡水回湍曲復亦謂之曲逆水春秋齊國夏伐晉取曲逆是也酈道元以逆畤為曲逆矣今曲逆故城在直𨽻保定府完縣東南二十里隂人傳見上今按地無考盂傳見上今按當為太原孟縣見昭二十八年壺口傳見上杜注潞縣東有壺口闗彚纂在今山西潞安府黎城縣東北太行山口俗名吾兒谷是也柏人傳納荀寅于柏人杜注晉邑今趙國柏人縣也彚纂今直𨽻順德府唐山縣西有柏人故城今按柏人後魏改曰柏仁金改為唐山五年毗經城毗今按地無考杜云備晉也則當在魯西境中牟傳趙鞅伐衞遂圍中牟今按中牟當為湯隂之中牟見定九年中牟常屬晉趙氏矣而此時屬衞豈因佛肸叛而中牟遂屬衞與萊傳寘羣公子于萊杜注齊東鄙邑彚纂今登州府黄縣東南有萊子城是也六年邾瑕經城邾瑕杜注任城亢父縣北有邾婁城彚纂今在濟寧州南十里莊傳戰于莊今按見昭十年大冥傳昭王攻大冥卒于城父杜注陳地彚纂當在陳州項城縣境今按項城今屬陳州府萊門傳出萊門而告之故杜注魯郭門今按定九年萊門杜注陽闗邑門蓋同名耳賴傳使胡姬以安孺子如賴杜注齊邑句竇之丘傳囚王豹于句竇之丘今按齊地即襄十九年二十一年句瀆之丘也桓十二年句瀆之丘又名榖丘蓋異地駘傳使毛遷孺子于駘杜注齊邑殳冒淳傳塟諸殳冐浮杜注齊地彚纂路史殳成國一名冐澤七年鄫經公㑹吳于鄫杜注今琅邪鄫縣今按見僖十四年范門傳伐邾及范門杜注邾郭門茅傳成子以茅叛杜注髙平西南有茅鄉亭彚纂在今兗州府金鄉縣西北四十里今按又見僖二十四年繹傳邾衆保于繹杜注邾山也在鄒縣北彚纂郭璞曰繹山純石積構連屬如繹絲然今繹山一名邾嶧山在鄒縣東南二十里蓋古時縣治在山南而今徙於山北也今按又見文十三年宣十年負瑕傳囚諸負瑕杜注魯邑髙平南平陽縣西北有瑕丘城彚纂在今兗州府滋陽縣西二十五里鄫衍傳若夏盟于鄫衍杜注即鄫也黍丘傳築五邑于其郊曰黍丘揖丘大城鍾䢴杜注梁國下邑縣西南有黍丘亭彚纂下邑即今之夏邑也屬河南歸徳府黍丘亭在縣西南揖丘傳見上彚纂當在今曹縣界大城傳見上彚纂當在今曹州界今按曹州今為府鍾傳見上彚纂當在今定陶縣界䢴傳見上彚纂當在今定陶縣界八年東陽傳吳師克東陽而進杜注魯邑彚纂吕氏春秋夏孔甲逰於東陽即此也在兗州府費縣西南七里今名陽關鎮今按七里當作七十里見顧炎午日知録五梧傳舍于五梧杜注魯邑彚纂今費縣西有五梧城今按哀二十五年五梧杜注魯南鄙蠶室傳舍于蠶室杜注魯邑彚纂或曰今滕縣東三十里有蠶母山是也案春秋滕不屬魯亦當在費縣西北境夷傳公賓庚公甲叔子與戰于夷今按閔二年齊人殺哀姜于夷亦是此地當在費縣西也庚宗傳舍于庚宗今按見昭四年泗上傳遂次于泗上今按今泗水縣也闡經齊人取讙及闡杜注在東平剛縣北彚纂漢志剛縣故闡城今兗州府寧陽縣本魯闡邑地故剛城在縣東北三十五里今按水經注洸水出東平上承汶水於岡縣西闡亭東爾雅汶為闡加水作灛潞傳子姑居于潞以察之杜注齊邑彚纂當在齊之郊外九年雍丘經宋皇瑗帥師取鄭師于雍丘杜注雍丘縣屬陳留郡彚纂今開封府杞縣治䢴溝傳吳城䢴溝通江淮釋文䢴音寒杜注於䢴江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵韓江是今按宋口又作末口胡渭曰吳越春秋吳將伐齊自廣陵闕江通淮亦曰渠水漢置江都縣有渠水首受江北至射陽入湖是也又名中瀆水水經注中瀆水首受江於江都縣縣城臨江昔吳將伐齊自廣陵東南築䢴城城下掘深溝謂之韓江亦曰䢴溟溝自廣陵出山陽白馬湖逕山陽城西又東謂之山陽浦又東入淮謂之山陽口是也山陽本漢射陽縣晉改山陽縣射陽湖在縣東南八十里縣西有山陽瀆即古䢴溝其縣北五里之北神堰即古末口也吳自哀九年溝通江淮之後十年伐齊十一年又伐齊十二年㑹魯于槖臯十三年㑹晉于黄池國語云夫差告勞於周曰余沿江泝淮闕溝深水出於商魯之間其所沿泝者非䢴江至末口之道蓋即禹貢揚州之貢道耳䢴溝之開杜注但云通糧道其水未必能深廣觀隋開皇中山陽瀆既開而猶不勝戰艦則吳人所乗餘皇戈船之類不可由此瀆明矣故哀十年公㑹吳伐齊左傳云徐承帥舟師將自海入齊齊人敗之吳師乃還十三年黄池之役於越入吳國語云越師沿海泝淮以絶吳路嚮使伐齊由䢴溝則徐承何獨帥舟師汎海其自㑹而歸越師欲絶其路亦必泝江而不泝淮矣故知吳人沿江泝淮仍用禹貢之貢道也十年鄎傳伐齊南鄙師于鄎杜注齊地犂傳於是乎取犂及轅杜注犂一名隰濟南有隰隂縣彚纂或曰齊大夫隰氏之采邑也今濟南府臨邑縣西有漯隂故城本齊犂邑水經注漯水逕漯隂縣故城北縣故犂邑今巨漯亭是也今按漯水之漯説文本作濕與隰相似隰隂者漯隂之誤而隰氏采邑之説則又因誤而附㑹也轅傳見上杜注祝阿縣西有轅城彚纂漢置瑗縣屬平原郡水經注瑗即轅也今濟南府禹城縣西北有瑗城今按瑗城一云在禹城西南又按傳下文云毁髙唐之郭今禹城西四十里有髙唐城是相接也賴傳毁髙唐之郭侵及賴而還今按地近東昌府之髙唐州也十一年清傳國書髙無㔻帥師伐我及清杜注齊地濟北盧縣東有清亭彚纂盧縣今長清縣也今按長清屬濟南府隋置縣因界内清水為名黨氏溝傳俟于黨氏之溝杜注朝中地名今按莊三十二年公築臺臨黨氏則近公宫有黨氏郊傳師及齊師戰于郊今按此戰近魯城故經書帥師伐我不言四鄙檀弓云戰于郎以此知近郊有郎邑稷曲傳齊師自稷曲杜注郊地名泗傳陳瓘陳莊涉泗今按泗水經魯城北及西艾陵經齊國書帥師及吳戰于艾陵杜注齊地今按史記春申君傳正義曰艾陵在兗州博縣南六十里博縣今泰安府泰安縣也博傳公㑹吳子伐齊克博至于嬴杜注博嬴齊邑也二縣皆屬泰山彚纂漢置博陽縣金升為泰安州今故城在濟南府泰安州東南今按今為泰安府嬴傳見上今按見桓三年犂傳寘于犂杜注衞邑今按漢書東郡有黎縣孟康曰詩黎侯國蓋黎侯失國寓於衞時之邑也犂與黎通城在今東昌府范縣境外州傳或淫于外州杜注衞邑城鉏傳與之城鉏杜注宋邑今按見哀二十五年巢傳使處巢死焉杜注衞地彚纂寰宇記巢亭在襄邑縣南二十里今歸德府睢州巢亭是也鄖傳濱于鄖杜注衞地少禘傳塟于少禘杜注衞地十二年槖臯經公㑹吳于槖臯杜注在淮南逡遒縣東南彚纂今江南廬州府巢縣東北六十里有柘臯鎮漢之槖臯縣春秋吳邑也鄖經公㑹衞侯宋皇瑗于鄖杜注發陽也廣陵海陵縣東南有發繇口彚纂今江南揚州府如臯縣東立發壩古發陽也亦名古鄖彌作傳宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫杜注隙地閒田凡六邑頃丘傳見上玉暢傳見上彚纂杞縣東北三十里有玉帳或云古玉暢案杞縣為春秋宋地北與陳留接壤傳曰宋鄭之間或即是也嵒傳見上今按後宋平元之族奔鄭鄭人為之城嵒戈錫宋向巢伐鄭取錫遂圍嵒鄭罕達救嵒取宋師仍以六邑為虚戈傳見上今按襄四年處豷于戈杜注云戈在宋鄭之間則為寒浞子豷之故國也錫傳見上彚纂地名路史商末錫畤子斯在宋鄭之間鄭人滅之以處宋元公之孫十三年黄池經公㑹晉侯及吳子于黄池杜注陳留封丘縣南有黄亭近濟水彚纂國語夫差起師北征闕為深溝於商魯之間北屬之沂西屬之濟以㑹晉公午于黄池沂水出蓋縣臨樂山入于泗而濟水在封丘縣南是時夫差既通江淮遂帥舟師自淮入泗自泗入沂復穿魯宋之境連屬水道有不通者鑿而通之以達於封丘之濟杜氏所謂近濟水也今黄池在開封府封丘縣東南泓傳自泓上觀之杜注水名今按吳地之水姑蔑傳彌庸見姑蔑之旗杜注越地今東陽大末縣彚纂越地西至于姑蔑即此秦置太末縣今衢州府龍游縣也今按姑蔑城在龍游縣穀溪之南而衢州府之西安常山江山開化亦皆太末地也户牖傳及户牖杜注陳留外黄縣西北東昏城是彚纂今東昏故城在開封府蘭陽縣東北今按北直大名府之東明縣亦東昏地也十四年大野傳西狩于大野杜注在髙平鉅野縣東北大澤是也彚纂元和志大野澤一名鉅野今兗州府嘉祥縣西有獲麟堆蓋嘉祥本鉅野分置也句繹續經小邾射以句繹來奔杜注地名今按説見哀二年檀臺傳公與婦人飲酒于檀臺今按史記正義檀臺在臨淄縣東一里通鑑齊湣王斮狐喧于檀衢胡三省注引此年檀臺意檀衢為通檀臺之衢路也弇中傳失道于弇中杜注弇中狹路今按見襄二十五年豐丘傳適豐丘杜注陳氏邑郭關傳殺諸郭闗杜注齊闗名舒州續經齊陳恒執其君寘于舒州彚纂史記田常執簡公於徐州崔駰曰即春秋舒州也案舒州今兗州府滕縣東南薛城是後漢郡國志云薛城在春秋之季曰徐州竹書紀年云邳遷于薛改名徐州亦曰舒州今按徐與舒古音雖相通然此舒州非薛城之徐州也當時滕薛未亡陳恒安得寘其君於此張守節史記正義云徐州齊之西北界上地名在渤海郡東平舒縣此説最是東平舒在今順天府大城縣界此齊之極北與燕界者也齊之履北至無棣漢時無棣與東平舒竝屬渤海郡則齊之北境可至東平舒矣又史記齊威王曰吾臣有黔夫者使守徐州則燕人祭北門趙人祭西門此徐州亦音舒州正是東平舒接燕而近趙之地故燕趙畏之而祭門若黔夫守薛城之徐州去燕趙甚逺燕趙何為而祭門此事理之尤明者是時陳恒將弑君故寘諸極逺之界而幽之胡三省註通鑑黔夫之事不能考正顧炎武又强解祭門事皆誤邵子皇極經世書舒州事明朱隱老註引史記正義東平舒之説今亦當從之鞌傳魋先謀公請以鞌易薄杜注鞌向魋邑逢澤傳迹人來告曰逢澤有介麇焉杜注地理志言逢澤在滎陽開封縣東北逺疑非疏漢書地理志臣瓚案汲郡古文梁惠王廢逢忌之藪以賜民今浚儀縣有逢忌陂是也宋都睢陽去開封四百餘里故杜以逺疑蓋宋都之旁别有逢澤也彚纂今開封府祥符縣南有蓬池與尉氏縣接壤古逢澤也今按祥符之逢池亦去宋逺疑非古逢澤蓋宋有大澤藪曰孟豬在虞城縣北十里周廻五十里與商丘縣相接逢澤或孟豬旁别名漢初梁孝王大治宫室築東苑方三百里則孟豬逢澤皆在其中孟豬之故跡已失則逢澤亦不可考求之於開封非也丘輿傳卒于魯郭門之外阬氏𦵏諸丘輿杜注泰山南城縣西北有輿城彚纂今兗州府費縣西輿城是也今按杜注南城當作南武城十五年輸傳武伯伐成不克遂城輸今按蓋近成之地桐汭傳楚子西子期伐吳及桐汭杜注宣城廣徳縣西南有桐水出白石山西北入丹陽湖今按廣徳縣今江南廣德州也桐水出州西南白石山西北流經建平縣南又西北入江寧府髙淳縣界注丹陽湖良傳及良而卒杜注吳地今按此良疑近吳國都地未必是昭十三年下邳之良城冠氏傳齊為衞故伐晉冠氏杜注陽平館陶縣今按東昌府冠縣館陶縣皆冠氏地也冠氏故城在冠縣北十六年平陽傳衞侯飲孔悝酒于平陽杜注東郡燕縣東北有平陽亭彚纂今大名府滑縣東南有韋城韋城南有平陽城亦曰平陽亭水經注云廪延南故城即平陽享是也今按滑縣今屬河南衞輝府城父傳自城父奔宋今按當作父城見昭十九年白傳使處吳竟為白公杜注楚邑汝隂襃信縣西南有白亭今按東漢析郾縣置褒信縣在今河南光州息縣東北息縣東有白公城慎傳吳人伐慎杜注汝隂慎縣也彚纂今鳳陽府潁上縣西北有慎城水經注云潁水逕慎縣故城是其地今按潁上今屬江南潁州府頯黄傳王孫燕奔頯黄氏杜注吳地彚纂在今寧國府境十七年笠澤傳越子伐吳吳子禦之笠澤彚纂禹貢震澤厎定即笠澤也爾雅謂之具區今蘇州府吳縣西南太湖是也今按水經注松江上承太湖更逕笠澤在吳南松江左右國語越伐吳吳禦之笠澤越軍江南吳軍江北者也笠澤疑是今之平望湖非震澤太湖昆吾之觀傳見人登昆吾之觀杜注衞有觀在古昆吾之虚今濮陽城中彚纂案濮陽今大名府開州州西南有濮陽城古顓頊之墟曰帝丘夏時為昆吾氏所居城中有昆吾臺亦曰昆吾城也今按括地志昆吾臺在濮陽縣西百步周圍五十歩髙二丈按昆吾者祝融之孫陸終第二子名樊夏時為伯始國於濮陽後遷於許故昭十二年楚子云皇祖伯父昆吾舊許是宅戎州傳公登城以望見戎州杜注戎邑彚纂今兗州府曹縣有楚丘故城漢置己氏縣以戎州己氏而名也今按曹縣今屬山東曹州府此楚丘城即隠七年戎伐凡伯之處然傳云公登城以望見戎州又云公自城上見己氏之妻髪美皆謂衞城蓋衞之城外有己氏人居之謂之戎州非謂衞侯登衞城能望見曹縣之戎州也杜注與彚纂辭不别白則觀者惑矣潞傳執般師以歸舍諸潞杜注齊邑今按見哀八年䝉傳公㑹齊侯盟于蒙杜注在東莞蒙隂縣西故蒙隂縣也彚纂今屬青州府今按蒙隂今屬沂州府之莒州發陽傳發陽之役杜注鄖也見十二年十八年鄾傳巴人伐楚圍鄾杜注楚邑彚纂今襄陽府襄陽縣東北有鄾城古鄾子國後屬楚今按詳見桓九年十九年𠖇傳追越師至𠖇杜注越地東夷傳楚沈諸梁伐東夷今按當是甌越之地温台濱海之處敖傳三夷男女及楚師盟于敖杜注從越之夷三種敖東夷地三夷傳見上今按當是温台寧波三府地二十年艾傳出居于艾杜注吳邑豫章有艾縣彚纂今艾城在江西南昌府寧州西二十一年顧傳公及齊侯邾子盟于顧杜注齊地彚纂商頌韋顧既伐即此顧也今東昌府范縣東南五十里有顧城舟道傳請除館于舟道杜注齊地二十二年甬東傳越滅吳請使吳王居甬東杜注越地㑹稽句章縣東海中洲也彚纂句章今浙江寧波府慈谿鎮海二縣地海中洲即舟山今之定海縣也縣東三十里有翁山一名翁洲即春秋之甬東二十三年英丘傳齊人伐我英丘今按英丘晉地齊取之犂丘傳戰于犂丘杜注隰也彚纂今濟南府臨邑縣有犂丘亭今按即哀十年之犂也哀二十七年傳云隰之役亦謂此隰本是漯水之漯説見哀十年二十五年蒲傳將適蒲杜注晉邑彚纂史記衞靈公曰蒲衞之所以待晉楚也蓋衞邑而與晉相近者也今大名府長垣縣故蒲城是今按今長垣縣治即衞蒲邑見桓二年鄄傳將適鄄杜注齊界上邑今按當為濮州故鄄城見莊十四年泠傳將適泠杜注近魯邑城鉏傳請適城鉏杜注近宋邑彚纂今大名府滑縣東有鉏城水經注云濮陽西南有鉏丘城是也今按滑縣今屬衞輝府二十六年空澤傳公逰于空澤杜注宋邑彚纂在今歸徳府虞城縣東水經注所謂獲水又東南逕空桐澤北是也連中傳卒于連中杜注館名彚纂名勝志連中館在空澤後遺杜髙二丈俗呼連塜者是空桐傳奉公自空桐入如沃宫杜注梁國虞縣東南有地名空桐彚纂今虞城縣空桐澤有空桐亭沃宫傳見上杜注宋都内宫名盧門桐門傳得夢啟北首而寢于盧門之外已為烏而集于其上咮加于南門尾加于桐門杜注盧門宋東門桐門北門唐盂傳六子在唐孟杜注地名二十七年駘上傳且言邾田封于駘上今按疑是狐駘山之駘見襄四年狐駘平陽傳盟于平陽杜注西平陽疏宣八年城平陽注云泰山有平陽縣此年平陽西平陽也髙平南有平陽縣彚纂髙平漢侯國故城在今兗州府鄒縣西南其西有平陽城漢所置南平陽縣也留舒傳及留舒違榖七里杜注齊地彚纂今兗州府東阿縣西南有留舒城水經注云東阿魚山上有柳舒城是也與東平州接壤今按東阿今屬泰安府濮傳及濮杜注濮水在陳留酸棗縣傍河東北經濟隂至髙平入濟陵阪傳公游于陵阪今按魯地春秋地理考實卷三
