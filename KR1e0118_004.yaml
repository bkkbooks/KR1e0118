body:
  text: 春秋地理考實卷四婺源江永撰王朝列國興廢説見傳説彚纂今考訂加注王朝興廢説周姬姓黃帝之苗裔后稷之後也后稷封於邰今武功縣也今屬陜西乾州左傳作駘見昭九年史或作斄明一統志云武功縣西南二十里有斄城及夏之衰后稷之子不窋失其官竄於西戎夏之衰韋昭謂啓子太康時括地志曰不窋故城在慶州𢎞化縣今慶陽府安化縣也安化慶陽府治不窋城在府境內府東三里有不窋塜不窋之孫公劉徙居邠今邠州東北有豳亭三水縣西有古豳城皆是也邠州在西安府西北三百五十里古西戎地公劉居之漢之漆縣也舊屬西安府今為直𨽻州三水屬之本作豳州唐太宗以字似幽改為邠公劉傳九世至太王國語周靈王太子晉曰后稷始基靖民十五王而文始平之韋昭據周本紀釋十五王云謂后稷不窋鞠陶公劉慶節皇僕差弗毁隃公非髙圍亞圍公祖太王王季文王也夫稷契同時契至湯四百餘年而十匹世稷至文王約千年猶止十五世何以相差迥别如此蓋周之世次雖周人亦有傳訛矣據世本自公劉歷慶節皇僕差弗毁隃公非辟方髙圍侯牟亞圍雲都太公祖紺諸盩十有二世而生古公亶父較史記多辟方侯牟雲都諸盩四世至文王猶止十九王蓋不窋之後公劉之前猶或有缺軼也去邠邑於岐山之陽今岐山縣也岐山縣屬鳳翔府一統志云武功縣西北有周城太王邑於岐山之下即此文王受命作邑於豐今西安府鄠縣南有酆城武王克商而有天下定都於鎬鎬在豐水之東豐在豐水之西相去二十五里平王遷都王城今洛陽縣西河南故城是也敬王又遷成周今洛陽縣東洛陽故城是也洛陽屬河南府二故城東西相去四十里平王四十九年魯隱公立敬王三十九年獲麟之嵗也後九王二百二十年而赧王為秦所滅附考惠周考王封其弟揭於王城是為周桓公傳之威公公武公文君秦滅之遷於􅓆狐是為西周西周惠公别封少子班於鞏以奉王於成周襲父諡為惠公傳之其子傑秦復滅之遷於陽人聚是為東周東周王前後建都之殊者以鎬京為西周對洛邑為周也二公封邑之殊者又於洛邑二城內以王城為西周對成周為東周也列國興廢説魯姬姓侯爵周文王第四子周文公旦所封也周公有大勳勞於天下位冡宰留相天子乃封其長子伯禽為魯侯都於曲阜今山東兗州府曲阜縣是也伯禽十三世傳至隱公息姑元年春秋託始於此又二百四十有二年為哀公蔣之十四年西狩獲麟春秋以終後九君至頃公讎為楚所滅蔡姬姓侯爵武王同母弟叔度所封也武王克商封叔度於蔡今汝寧府上蔡縣是也上蔡縣在府治汝陽縣之北四十五里古蔡國城在汝陽上蔡二縣之界漢置上蔡縣平侯徙新蔡今新蔡縣是也楚靈王滅蔡平王復封平侯廬於是徙新蔡在汝寧府東五十里昭侯又徙州來謂之下蔡是時州來屬吳昭侯請於吳而遷之以避楚也今壽州北三十里有蔡國城即下蔡也壽州屬鳳陽府宣侯二十八年魯隱公立成侯十年魯哀公十四年也後為楚所滅曹姬姓伯爵武王同母弟叔振鐸所封也武王克商封叔振鐸於曹今兗州府定陶縣是也定陶在曹州東南五十里今升曹州為府定陶屬之叔振鐸生太伯脾脾後九世桓公終生即位桓公三十五年魯隱公元年也魯哀公八年曹伯陽為宋所滅孟子時有曹交乃鄒君族人鄒亦姓曹趙岐謂曹君之弟誤也衛姬姓侯爵武王同母少弟康叔封之後也武王封康叔於衛先封於康而後改封於衛也今衛輝府淇縣東北朝歌城是也文公遷楚丘其故城在今滑縣東舊屬直𨽻大名府今改屬河南衛輝府成公又遷帝丘今開州有顓頊城是也開州屬大名府桓公十三年魯隱公即位出公十二年魯哀公十四年也其後貶號曰君止有濮陽之地秦二世廢其君角為庶人滕姬姓侯爵周文王子叔繡所封今滕縣是也在兗州府東南魯隱公七年始見滕侯卒其後書子蓋時王所黜也漢地理志滕封三十一世為齊所滅孔氏穎達及諸家多因之戰國䇿則謂滕滅於宋通鑑通考皆云宋滅滕未知孰是姑並存之晉姬姓侯爵周武王少子唐叔虞之後也成王封叔虞於唐始都於翼今平陽府翼城縣是也按晉之始封説者皆謂太原晉陽縣今太原府太原縣也其縣治為唐城其地有晉水唐叔虞之子燮父因改曰晉若翼城者在平陽府南後世所徙而此以為始都於翼未知何據考一統志翼城縣東二十五里有唐城堯之裔封此周遷其子孫於杜為唐杜氏傳云成王滅唐而封太叔意所滅之唐在翼城則所封之唐亦在翼城然滅唐封唐事雖相因而叔虞始封自是太原之唐城非翼城也杜氏譜云燮父孫成侯徙都曲沃穆侯徙都絳是自成侯已後始由太原而南遷平陽絳即翼也一統志云翼城春秋時絳邑後更曰翼漢為絳縣地然則傳謂晉為翼者自穆侯始耳唐叔子燮父為晉侯因太原有晉水故改曰晉若燮父己居翼則無由改國名矣傳十世至昭侯昭侯封其叔父文侯之弟成師於曲沃是為桓叔曲沃者今之聞喜縣也今屬絳州又今之曲沃縣後魏所置一統志謂成師所封者誤也昭侯傳至哀侯為桓叔之孫武公所滅武公徙居絳在今絳州之北今為直𨽻州景公又自絳徙新田今在曲沃縣南縣屬平陽府鄂侯二年魯隱公立定公三十一年魯哀公十四年也又六世韓魏趙三分晉地遷其君靖公俱酒為家人鄭姬姓伯爵周厲王少子友之後也宣王二十二年封友於鄭在西都畿內棫林之地或作咸林者誤漢屬京兆曰鄭縣今華州是也華州舊屬西安府今升同州為府以華州屬之歷代有鄭縣元省入華州故城在州西北三里幽王之難友寄帑於虢鄶之間虢今汜水及榮陽縣鄶今新鄭及密縣因取二國之地武公取之在濟西洛東河南潁北四水間謂之新鄭今開封府新鄭縣是也今升許州為府新鄭屬之莊公二十二年魯隱公即位聲公二十年魯哀公十四年也後為韓所滅韓滅鄭徙都之今開封府鄭州吳姬姓子爵按國語云命圭有命固曰吳伯不曰吳王是吳本伯爵因其僭王故曰吳子非子爵也周太王長子太伯奔荆蠻以避季歷居於梅里今無錫縣也屬常州府一統志故泰伯城在無錫縣東南四十里梅里平墟自泰伯以下至王僚二十三君皆都於此太伯卒仲雍嗣立後十七世至壽夢始稱王其後闔閭築大城而都之即今蘇州府治也魯成公六年壽夢見經夫差十五年獲麟之嵗也魯哀公二十二年為越句踐所滅燕姬姓伯爵周同姓召公奭之後也武王封召公於薊號為北燕所以别於南燕今順天府大興縣是也穆侯七年魯隱公即位獻公十二年魯哀公十四年也後六世易王立傳王號者六世至燕王喜為秦所滅齊薑姓侯爵太公望之後也其先四嶽佐禹平水土有功虞夏間封於吕商末太公起漁釣為文武師封營丘曰齊侯漢地志云臨淄師尚父所封臣瓚謂臨淄即營丘也今青州府昌樂縣漢為營陵縣地隋置營丘縣一志謂昌樂縣東南五十里營丘社即太公受封之地又於臨淄縣注云本齊營丘地漢置營陵縣為北海郡治蓋二縣相近皆營丘案齊曽徙薄姑後復都臨淄詩所云王命仲山甫城彼東方即其事也今臨淄縣屬青州府薄姑即博興縣也僖公九年魯隱公立簡公四年魯哀公十四年也後三君一百有二年康公貸卒由氏遂並齊秦嬴姓伯爵出自顓頊裔孫女修子大業生大費與禹平水土佐舜調馴鳥獸賜姓嬴是為伯翳即伯益也伯翳十九世非子為周孝王主馬汧渭間馬大蕃息孝王封為附庸而邑之秦今秦州清水縣故秦城是也屬鞏昌府又鳳翔府隴州南三里有秦城一統志云非子所封按此地本漢之汧源縣非子之曽孫曰秦仲死於西戎其孫襄公討西戎有功平王東遷賜以岐豐之地列為諸侯寧公徙平陽今郿縣西有平陽故城屬鳳翔府後魏改郿縣為平陽德公徙雍今鳳翔縣也鳳翔府治獻公徙櫟陽今臨潼縣也屬西安府臨潼北五十里有櫟陽城一云在西安府咸寧縣渭水之北孝公徙咸陽今咸陽縣也西安府北五十里文公四十四年魯隱公立悼公十一年魯哀公十四年也後九世孝公用商鞅以耕戰霸秦其子惠文君自號為王傳武王昭襄王孝文王莊襄王至始皇並天下自立為皇帝二世而亡楚芈姓子爵出自顓頊孫重黎為髙辛氏火正能光融天下命曰祝融其弟吳回嗣為祝融生陸終陸終生六子最少者季連季連之苗裔鬻熊為周文武師成王時封鬻熊曽孫熊繹於荆蠻胙以子男之田其地居丹陽徐廣宋忠皆曰在南郡枝江縣今屬荆州府一統志云丹陽在荆州府歸州東七里熊繹始封於此後又移枝江亦曰丹陽歸州今屬宜昌府其後都郢楚文王時今江陵縣是也荆州府治北十里紀南城昭王徒鄀水經注謂之鄢郢今在宜城縣西南楚鄢郢漢改宜城縣今屬襄陽府秦拔鄢郢楚保陳城即故陳國也今陳州府其最後徙壽春即今壽州是也屬鳳陽府武王十九年魯隱公立惠王八年魯哀公十四年也惠王而下有簡聲悼肅宣威懷頃襄考烈幽哀貞芻十二王而秦滅之宋子姓公爵出自商王帝乙之長庶子啓食采於微謂之微子周武王誅紂立其子武庚武庚以三監畔成王誅之乃更封微子為宋公以奉湯祀禮樂車服悉如商舊作賓王家漢地理志梁國睢陽縣故宋國微子所封今歸德府商丘縣是也穆公和七年魯隱公立景公三十六年魯哀公十四年也後至王偃稱王圖伯而齊魏楚共滅其國杞姒姓伯爵武王克商求夏禹苗裔得東樓公封杞以奉禹祀杜氏預曰杞國本都陳留雍丘縣桓六年淳于公亡國杞似并之遷都淳于杞始封在雍丘春秋之前已國於青州而近莒或由周王改封之又遷緣陵襄二十九年又遷淳于今開封府杞縣即雍丘也淳于廢城在安丘縣東北屬濟南府緣陵故城在昌樂縣東南屬青州府東樓公十四傳至武公武公二十九年魯隱公立閔公六年獲麟之嵗也後為楚所滅陳媯姓侯爵出自帝舜之後封於有虞虞幕裔孫閼父為周武王陶正能利器用王賴之以元女大姬下嫁其子滿而封諸陳使奉虞帝祀今陳州是也舊屬開封府今為陳州府桓公二十三年魯隱公立閔公二十一年魯哀公十四年也後三年楚惠王使公孫朝滅陳薛任姓侯爵黃帝之後奚仲封於薛今滕縣南四十里有薛城屬兗州府隱十一年滕薛來朝始見經莊三年書薛伯卒蓋時王所黜也孔氏穎達陸氏淳皆曰小國無紀世不可知亦不知為誰所滅薛當是齊所滅滕文公云齊人將築薛是已取其地也齊為田嬰田文之食邑邾曹姓子爵出自陸終第五子晏安之後武王克商封其苗裔曹挾於邾為附庸今魯國鄒縣是也今屬兗州府自挾至儀父十二世始見春秋魯隱公元年儀父會盟于蔑北杏之會附從齊桓進爵為子莊十六年經書邾子克卒即儀父也哀公十年邾子益來奔後為楚所並莒嬴姓杜譜作嬴姓世本作己姓文八年傳穆伯奔莒從己氏則世本為是子爵出在少昊之後武王封兹輿期於莒今莒州是也屬青州府莒君無諡而有號文獻通考以季他為厲公非也自兹輿期十一世至兹平父始見於春秋莒君皆以地為號兹亦是地名見昭五年共公庚輿而下微不復見後四世而楚滅之小邾曹姓子爵出自邾挾之後夷父顔有功於周周封其子友於郳為附庸莊公五年友之曽孫黎來始朝魯杜注東海昌慮縣東北有郳城今昌慮故城在滕縣東南屬兗州府齊小白霸郳君附從進爵為子始列諸侯謂之小邾子孔氏穎達陸氏淳皆曰穆公之孫惠公以下春秋後六世而楚滅之許薑姓男爵與齊同祖武王封四嶽之苗裔文叔於許今許州是也今為許州府春秋時國小而近鄭為鄭所逼成十五年遷葉今南陽葉縣是也昭九年遷夷實城父今亳州東西七十里有城父故城屬鳳陽府十八年遷析實白羽今南陽府鄧州內鄉縣是也定四年遷容城應劭曰容城即華容城今監利縣也屬荆州府或曰容城在葉縣西未知孰是孔氏穎達曰自文叔至莊公十一世始見春秋元公子結元年獲麟之嵗也戰國初楚滅之春秋地理考實卷四
